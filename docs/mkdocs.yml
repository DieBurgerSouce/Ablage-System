# MkDocs Configuration - Ablage-System OCR

# Site Information
site_name: DieBurgerSouce - Ablage-System
site_description: Enterprise-grade German document processing with GPU-accelerated OCR
site_author: DieBurgerSouce Team
site_url: https://docs.dieburgersouce.de/ablage-system

# Repository
repo_name: DieBurgerSouce/Ablage-System
repo_url: https://github.com/DieBurgerSouce/Ablage-System
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2026 DieBurgerSouce Team

# Theme Configuration
theme:
  name: material
  language: de
  favicon: assets/favicon.png
  logo: assets/logo.png

  # Color Scheme
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  # Features
  features:
    - navigation.instant        # Instant loading
    - navigation.tracking       # URL updates on scroll
    - navigation.tabs           # Top-level sections as tabs
    - navigation.tabs.sticky    # Tabs always visible
    - navigation.sections       # Expand sections in sidebar
    - navigation.expand         # Expand all sections by default
    - navigation.indexes        # Section index pages
    - navigation.top            # Back to top button
    - search.suggest            # Search suggestions
    - search.highlight          # Highlight search terms
    - search.share              # Share search results
    - toc.follow                # TOC follows scroll
    - toc.integrate             # TOC integrated into sidebar
    - content.code.copy         # Copy button for code blocks
    - content.code.annotate     # Code annotations
    - content.tabs.link         # Link content tabs

  # Icons
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

# Plugins
plugins:
  - search:
      lang:
        - de
        - en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'

  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true

  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      timezone: Europe/Berlin
      locale: de

  - awesome-pages

  - macros:
      include_dir: docs/snippets

  - tags:
      tags_file: tags.md

# Extensions
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: true
      permalink_title: Link zu diesem Abschnitt
      toc_depth: 3

  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: DieBurgerSouce
      repo: Ablage-System
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
      base_path: docs/snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: false

# Extra CSS and JavaScript
extra_css:
  - stylesheets/extra.css
  - stylesheets/custom.css

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/custom.js

# Extra Configuration
extra:
  # Version
  version:
    provider: mike
    default: stable

  # Social Links
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DieBurgerSouce
      name: GitHub
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/u/dieburgersouce
      name: Docker Hub
    - icon: fontawesome/solid/envelope
      link: mailto:oss@dieburgersouce.de
      name: Email

  # Alternate Languages
  alternate:
    - name: Deutsch
      link: /de/
      lang: de
    - name: English
      link: /en/
      lang: en

  # Analytics (optional)
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX

  # Consent (GDPR)
  consent:
    title: Cookie-Einwilligung
    description: >
      Wir verwenden Cookies, um die Dokumentation zu verbessern und die Nutzung zu analysieren.
      Mit Ihrer Einwilligung helfen Sie uns, die Dokumentation weiter zu optimieren.
    actions:
      - accept
      - reject
      - manage

  # Status
  status:
    new: Neu hinzugefügt
    deprecated: Veraltet

