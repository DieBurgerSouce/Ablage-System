version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ablage-postgres
    environment:
      POSTGRES_DB: ablage_system
      POSTGRES_USER: ablage_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_MAX_CONNECTIONS: 100
      POSTGRES_SHARED_BUFFERS: 256MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ablage_admin -d ablage_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ablage-network

  # Redis for Cache and Queue
  redis:
    image: redis:7-alpine
    container_name: ablage-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ablage-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: ablage-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_DEFAULT_BUCKETS: documents,processed,backups
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ablage-network

  # FastAPI Backend Application
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ablage-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://ablage_admin:${DB_PASSWORD:-changeme}@postgres:5432/ablage_system
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: INFO
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
    volumes:
      - ./app:/app/app:ro
      - uploads:/app/uploads
      - outputs:/app/outputs
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - ablage-network

  # Celery Worker with GPU Support
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ablage-worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 --pool=solo
    environment:
      DATABASE_URL: postgresql+asyncpg://ablage_admin:${DB_PASSWORD:-changeme}@postgres:5432/ablage_system
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      LOG_LEVEL: INFO
    volumes:
      - ./app:/app/app:ro
      - uploads:/app/uploads
      - outputs:/app/outputs
    depends_on:
      - postgres
      - redis
      - minio
      - backend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - ablage-network

  # Nginx Frontend Server
  frontend:
    image: nginx:alpine
    container_name: ablage-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./infrastructure/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ablage-network

  # Prometheus Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: ablage-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ablage-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: ablage-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: Europe/Berlin
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - ablage-network

  # Loki for Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: ablage-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - ablage-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads:
  outputs:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  ablage-network:
    driver: bridge
