# Docker Compose - Complete Production Stack
# Ablage-System OCR - Enterprise Document Processing
# Created: 2024-11-22
# Philosophy: "Feinpoliert und durchdacht"

version: '3.8'

services:
  # ============================================================================
  # DATABASE - PostgreSQL 16
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ablage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ablage_ocr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=de_DE.UTF-8"  # German locale for proper sorting
      TZ: Europe/Berlin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ablage_ocr"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ablage-network

  # ============================================================================
  # CACHE & QUEUE - Redis 7
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: ablage-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ablage-network

  # ============================================================================
  # OBJECT STORAGE - MinIO
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: ablage-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_DOMAIN: minio.local
      MINIO_SERVER_URL: http://minio:9000
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ablage-network

  # ============================================================================
  # BACKEND API - FastAPI
  # ============================================================================
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: ablage-backend
    restart: unless-stopped
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ablage_ocr
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_POOL_SIZE: 20
      DB_MAX_OVERFLOW: 40

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0

      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"  # TLS disabled for internal network

      # Application
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_WORKERS: 4
      LOG_LEVEL: INFO

      # Security
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 15

      # OCR
      OCR_DEFAULT_BACKEND: auto
      OCR_DEFAULT_LANGUAGE: de
      GPU_ENABLED: "true"

      # GDPR
      GDPR_RETENTION_DAYS: 2555  # 7 years
      GDPR_DELETE_AFTER_DAYS: 30
      GDPR_EXPORT_EXPIRY_DAYS: 30

    volumes:
      - ./app:/app/app:ro
      - ./Static_Knowledge:/app/Static_Knowledge:ro
      - ./Dynamic_Knowledge:/app/Dynamic_Knowledge
      - /tmp:/tmp
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ablage-network

  # ============================================================================
  # CELERY WORKER - GPU Accelerated (OCR Processing)
  # ============================================================================
  worker-gpu:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: ablage-worker-gpu
    restart: unless-stopped
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ablage_ocr
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}

      # Celery
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2

      # GPU
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      CUDA_VISIBLE_DEVICES: 0

      # Application
      LOG_LEVEL: INFO
      WORKERS: 1
      CONCURRENCY: 1
      POOL: solo

    volumes:
      - ./app:/app/app:ro
      - ./Skills:/app/Skills:ro
      - ./Static_Knowledge:/app/Static_Knowledge:ro
      - ./Dynamic_Knowledge:/app/Dynamic_Knowledge
      - /tmp:/tmp
    depends_on:
      - redis
      - postgres
      - backend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ablage-network

  # ============================================================================
  # CELERY WORKER - CPU Only (Pre/Post-Processing)
  # ============================================================================
  worker-cpu:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker-cpu
    container_name: ablage-worker-cpu
    restart: unless-stopped
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ablage_ocr
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}

      # Celery
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2

      # Application
      LOG_LEVEL: INFO
      WORKERS: 4
      CONCURRENCY: 4
      POOL: prefork

    volumes:
      - ./app:/app/app:ro
      - ./Skills:/app/Skills:ro
      - ./Static_Knowledge:/app/Static_Knowledge:ro
      - ./Dynamic_Knowledge:/app/Dynamic_Knowledge
      - /tmp:/tmp
    depends_on:
      - redis
      - postgres
      - backend
    networks:
      - ablage-network

  # ============================================================================
  # MONITORING - Prometheus (Optional)
  # ============================================================================
