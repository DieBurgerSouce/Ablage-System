version: '3.8'

services:
  # PostgreSQL Database (Data-Network only - kein externer Zugriff in Production)
  postgres:
    image: postgres:16-alpine
    container_name: ablage-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ablage_system}
      POSTGRES_USER: ${POSTGRES_USER:-ablage_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD muss gesetzt sein}
      POSTGRES_MAX_CONNECTIONS: 100
      POSTGRES_SHARED_BUFFERS: 256MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5434:5432"  # Port 5434 (5433 von Hyper-V reserviert)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ablage_admin} -d ${POSTGRES_DB:-ablage_system}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped
    networks:
      - data-network

  # Redis for Cache and Queue (Data-Network only)
  redis:
    image: redis:7-alpine
    container_name: ablage-redis
    # SECURITY: REDIS_PASSWORD muss in .env gesetzt sein! Leer = unsicher
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6380:6379"  # Nur localhost in Production!
    healthcheck:
      # SECURITY FIX: Redis Healthcheck mit Passwort-Authentifizierung
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    restart: unless-stopped
    networks:
      - data-network

  # MinIO Object Storage (Data-Network only)
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: ablage-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER muss gesetzt sein}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD muss gesetzt sein}
      MINIO_DEFAULT_BUCKETS: documents,processed,backups
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"  # Nur localhost in Production!
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped
    networks:
      - data-network

  # ClamAV Antivirus Scanner (Data-Network für Security Scanning)
  clamav:
    image: clamav/clamav:1.4
    container_name: ablage-clamav
    environment:
      # Automatische Updates deaktivieren (manuell via Cron)
      CLAMAV_NO_FRESHCLAMD: "false"
      # Daemon-Konfiguration
      CLAMD_STARTUP_TIMEOUT: 1800  # 30 Minuten für Datenbank-Download
    volumes:
      - clamav_data:/var/lib/clamav
    ports:
      - "127.0.0.1:3310:3310"  # Nur localhost - ClamAV Daemon Port
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "3"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 300s  # 5 Minuten für initialen DB-Download
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G  # ClamAV braucht viel RAM für Signaturen
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped
    networks:
      - data-network

  # FastAPI Backend Application (Backend + Data Networks)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ablage-backend
    environment:
      # Vault Configuration (secrets loaded from Vault when enabled)
      # SECURITY FIX: Default auf true geändert für Production-Sicherheit
      VAULT_ENABLED: ${VAULT_ENABLED:-true}
      VAULT_ADDR: https://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_SECRET_PATH: ablage-system
      VAULT_MOUNT_POINT: secret
      VAULT_CACERT: /app/certs/ca.crt
      # Database (Secrets aus .env)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ablage_admin}:${DB_PASSWORD:?DB_PASSWORD muss gesetzt sein}@postgres:5432/${POSTGRES_DB:-ablage_system}
      # Redis (mit optionalem Passwort)
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      # MinIO (Secrets aus .env)
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER muss gesetzt sein}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD muss gesetzt sein}
      # Security
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY muss gesetzt sein}
      # Non-secret configuration
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./app:/app/app:ro
      - ./infrastructure/vault/config/certs:/app/certs:ro
      - uploads:/app/uploads
      - outputs:/app/outputs
      - backups:/var/backups/ablage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault:
        condition: service_healthy
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=1G,mode=1777
      - /app/cache:size=2G,mode=1777
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
          # GPU FIX: Backend is API-only, GPU reserved for worker
          # Backend can still access GPU for health checks via CUDA_VISIBLE_DEVICES
    # SECURITY FIX: Healthcheck für Backend
    # GPU-Inference braucht 10-15s, Model-Loading 60-90s
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=10).raise_for_status()"]
      interval: 30s
      timeout: 15s  # PERF FIX: Erhöht von 10s für GPU-Inference
      retries: 3
      start_period: 90s  # PERF FIX: Erhöht von 60s für GPU Model-Loading
    restart: unless-stopped
    networks:
      - backend-network
      - data-network

  # Celery Worker with GPU Support (Backend + Data Networks)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ablage-worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 --pool=solo
    ports:
      - "127.0.0.1:8001:8001"  # Prometheus Metrics
    environment:
      # Vault Configuration
      # SECURITY FIX: Default auf true geändert für Production-Sicherheit
      VAULT_ENABLED: ${VAULT_ENABLED:-true}
      VAULT_ADDR: https://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_SECRET_PATH: ablage-system
      VAULT_MOUNT_POINT: secret
      VAULT_CACERT: /app/certs/ca.crt
      # Database (Secrets aus .env)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ablage_admin}:${DB_PASSWORD:?DB_PASSWORD muss gesetzt sein}@postgres:5432/${POSTGRES_DB:-ablage_system}
      # Redis (mit optionalem Passwort)
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      # MinIO (Secrets aus .env)
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER muss gesetzt sein}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD muss gesetzt sein}
      # Non-secret configuration
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # GPU Memory Limits (85% von 16GB = 13.6GB)
      GPU_MEMORY_LIMIT_GB: ${GPU_MEMORY_LIMIT_GB:-13.6}
    volumes:
      - ./app:/app/app:ro
      - ./scripts:/app/scripts:ro
      - ./infrastructure/vault/config/certs:/app/certs:ro
      - uploads:/app/uploads
      - outputs:/app/outputs
      - backups:/var/backups/ablage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault:
        condition: service_healthy
      backend:
        condition: service_started
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=2G,mode=1777
      - /app/cache:size=4G,mode=1777
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
        reservations:
          cpus: '1.0'
          memory: 4G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # SECURITY FIX: Healthcheck für Worker
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    networks:
      - backend-network
      - data-network
      - monitoring-network  # Für Prometheus Metrics Scraping

  # Frontend Application (React + Vite) - Frontend + Backend Networks
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ablage-frontend
    ports:
      - "80:80"
      - "443:443"  # HTTPS Port
    depends_on:
      backend:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    # SECURITY FIX: Healthcheck für Frontend (Nginx)
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 128M
    restart: unless-stopped
    networks:
      - frontend-network
      - backend-network

  # Prometheus Metrics Collection (Monitoring Network)
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: ablage-prometheus
    user: "65534:65534"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"  # Nur localhost - Zugriff über Nginx Proxy
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    restart: unless-stopped
    networks:
      - monitoring-network
      - backend-network

  # Grafana Dashboards (Monitoring Network)
  grafana:
    image: grafana/grafana:11.3.0
    container_name: ablage-grafana
    user: "472:472"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:?GRAFANA_USER muss gesetzt sein}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD muss gesetzt sein}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: Europe/Berlin
      # Security Settings
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"  # Nur localhost - Zugriff über Nginx Proxy
    depends_on:
      prometheus:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped
    networks:
      - monitoring-network

  # Loki for Log Aggregation (Monitoring Network)
  loki:
    image: grafana/loki:3.2.0
    container_name: ablage-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"  # Nur localhost
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    restart: unless-stopped
    networks:
      - monitoring-network

  # AlertManager for Alert Routing and Notifications (Monitoring Network)
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ablage-alertmanager
    user: "65534:65534"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--data.retention=120h'
      - '--web.external-url=${ALERTMANAGER_EXTERNAL_URL:-http://localhost:9093}'
    environment:
      # Email/Teams (Secrets aus .env oder Vault)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-alertmanager@ablage-system.local}
      EMAIL_RECIPIENTS: ${EMAIL_RECIPIENTS:-ops-team@internal.local}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
    volumes:
      - ./infrastructure/alerting/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./infrastructure/alerting/templates:/etc/alertmanager/templates:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"  # Nur localhost
    depends_on:
      prometheus:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped
    networks:
      - monitoring-network

  # PostgreSQL Exporter for Prometheus (Monitoring + Data Networks)
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: ablage-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-ablage_admin}:${DB_PASSWORD:?DB_PASSWORD muss gesetzt sein}@postgres:5432/${POSTGRES_DB:-ablage_system}?sslmode=disable
    ports:
      - "127.0.0.1:9187:9187"  # Nur localhost
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    # SECURITY FIX: Healthcheck für Postgres Exporter
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    restart: unless-stopped
    networks:
      - monitoring-network
      - data-network

  # Redis Exporter for Prometheus (Monitoring + Data Networks)
  redis_exporter:
    image: oliver006/redis_exporter:v1.63.0
    container_name: ablage-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "127.0.0.1:9121:9121"  # Nur localhost
    depends_on:
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    # SECURITY FIX: Healthcheck für Redis Exporter
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    restart: unless-stopped
    networks:
      - monitoring-network
      - data-network

  # Promtail for Log Shipping to Loki (Monitoring Network)
  promtail:
    image: grafana/promtail:3.2.0
    container_name: ablage-promtail
    volumes:
      - ./infrastructure/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped
    networks:
      - monitoring-network

  # HashiCorp Vault for Secrets Management (TLS-enabled)
  vault:
    image: hashicorp/vault:1.15.4
    container_name: ablage-vault
    command: server -config=/vault/config/vault.hcl
    ports:
      - "8200:8200"
    volumes:
      - ./infrastructure/vault/config:/vault/config:ro
      - vault_data:/vault/data
      - vault_logs:/vault/logs
    environment:
      # HTTPS für sichere Kommunikation
      VAULT_ADDR: 'https://0.0.0.0:8200'
      VAULT_API_ADDR: 'https://vault:8200'
      VAULT_CACERT: '/vault/config/certs/ca.crt'
      # Skip TLS verification nur für Development
      VAULT_SKIP_VERIFY: '${VAULT_SKIP_VERIFY:-false}'
    cap_add:
      - IPC_LOCK
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "vault", "status", "-address=https://127.0.0.1:8200", "-ca-cert=/vault/config/certs/ca.crt"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend-network
      - data-network

  # NVIDIA GPU Exporter für Prometheus-Metriken
  dcgm-exporter:
    image: nvidia/dcgm-exporter:3.3.0-3.2.0-ubuntu22.04
    container_name: ablage-dcgm-exporter
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      # Metriken-Konfiguration
      DCGM_EXPORTER_LISTEN: ':9400'
      DCGM_EXPORTER_KUBERNETES: 'false'
      # Standard GPU-Metriken
      DCGM_EXPORTER_COLLECTORS: 'default'
    ports:
      # SECURITY FIX: Bind to localhost only to prevent external access to GPU metrics
      - "127.0.0.1:9400:9400"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9400/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - monitoring-network

  # Node Exporter für Host-Metriken (CPU, RAM, Disk, Network)
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: ablage-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "127.0.0.1:9100:9100"
    security_opt:
      - no-new-privileges:true
    read_only: true
    pid: host
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - monitoring-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:  # ClamAV Virus-Signaturen
  uploads:
  outputs:
  backups:
  quarantine:  # Quarantaene fuer erkannte Malware
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
  vault_data:
  vault_logs:

networks:
  # Frontend-Netzwerk: Nur für externe Zugriffe (Nginx)
  frontend-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.1.0/24

  # Backend-Netzwerk: API, Workers, interne Kommunikation
  backend-network:
    driver: bridge
    internal: false  # Erlaubt externe API-Zugriffe
    ipam:
      config:
        - subnet: 172.28.2.0/24

  # Data-Netzwerk: Datenbanken, Cache, Storage (nur intern)
  data-network:
    driver: bridge
    internal: true  # Kein externer Zugriff!
    ipam:
      config:
        - subnet: 172.28.3.0/24

  # Monitoring-Netzwerk: Prometheus, Grafana, Loki
  monitoring-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.4.0/24

  # Legacy-Netzwerk für Migration (wird später entfernt)
  ablage-network:
    driver: bridge
