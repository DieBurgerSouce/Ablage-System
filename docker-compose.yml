version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ablage-postgres
    environment:
      POSTGRES_DB: ablage_system
      POSTGRES_USER: ablage_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_MAX_CONNECTIONS: 100
      POSTGRES_SHARED_BUFFERS: 256MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ablage_admin -d ablage_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped
    networks:
      - ablage-network

  # Redis for Cache and Queue
  redis:
    image: redis:7-alpine
    container_name: ablage-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    restart: unless-stopped
    networks:
      - ablage-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: ablage-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_DEFAULT_BUCKETS: documents,processed,backups
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped
    networks:
      - ablage-network

  # FastAPI Backend Application
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ablage-backend
    environment:
      # Vault Configuration (secrets loaded from Vault when enabled)
      VAULT_ENABLED: ${VAULT_ENABLED:-false}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_SECRET_PATH: ablage-system
      VAULT_MOUNT_POINT: secret
      # Fallback credentials (used when VAULT_ENABLED=false)
      DATABASE_URL: postgresql+asyncpg://ablage_admin:${DB_PASSWORD:-changeme}@postgres:5432/ablage_system
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      # Non-secret configuration
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: INFO
    volumes:
      - ./app:/app/app:ro
      - uploads:/app/uploads
      - outputs:/app/outputs
      - backups:/var/backups/ablage
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio
      - vault
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=1G,mode=1777
      - /app/cache:size=2G,mode=1777
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - ablage-network

  # Celery Worker with GPU Support
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ablage-worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 --pool=solo
    environment:
      # Vault Configuration (secrets loaded from Vault when enabled)
      VAULT_ENABLED: ${VAULT_ENABLED:-false}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_SECRET_PATH: ablage-system
      VAULT_MOUNT_POINT: secret
      # Fallback credentials (used when VAULT_ENABLED=false)
      DATABASE_URL: postgresql+asyncpg://ablage_admin:${DB_PASSWORD:-changeme}@postgres:5432/ablage_system
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      # Non-secret configuration
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      LOG_LEVEL: INFO
    volumes:
      - ./app:/app/app:ro
      - uploads:/app/uploads
      - outputs:/app/outputs
      - backups:/var/backups/ablage
    depends_on:
      - postgres
      - redis
      - minio
      - vault
      - backend
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=2G,mode=1777
      - /app/cache:size=4G,mode=1777
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
        reservations:
          cpus: '1.0'
          memory: 4G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - ablage-network

  # Frontend Application (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ablage-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped
    networks:
      - ablage-network

  # Prometheus Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: ablage-prometheus
    user: "65534:65534"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    restart: unless-stopped
    networks:
      - ablage-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: ablage-grafana
    user: "472:472"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: Europe/Berlin
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped
    networks:
      - ablage-network

  # Loki for Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: ablage-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    restart: unless-stopped
    networks:
      - ablage-network

  # AlertManager for Alert Routing and Notifications
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ablage-alertmanager
    user: "65534:65534"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--data.retention=120h'
      - '--web.external-url=http://localhost:9093'
    environment:
      # Email/Teams (set in Vault or .env)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-alertmanager@ablage-system.local}
      EMAIL_RECIPIENTS: ${EMAIL_RECIPIENTS:-ops-team@internal.local}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
    volumes:
      - ./infrastructure/alerting/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./infrastructure/alerting/templates:/etc/alertmanager/templates:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped
    networks:
      - ablage-network

  # PostgreSQL Exporter for Prometheus
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: ablage-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://ablage_admin:${DB_PASSWORD:-changeme}@postgres:5432/ablage_system?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    security_opt:
      - no-new-privileges:true
    read_only: true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    restart: unless-stopped
    networks:
      - ablage-network

  # Redis Exporter for Prometheus
  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: ablage-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis
    security_opt:
      - no-new-privileges:true
    read_only: true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    restart: unless-stopped
    networks:
      - ablage-network

  # Promtail for Log Shipping to Loki
  promtail:
    image: grafana/promtail:latest
    container_name: ablage-promtail
    volumes:
      - ./infrastructure/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped
    networks:
      - ablage-network

  # HashiCorp Vault for Secrets Management
  vault:
    image: hashicorp/vault:1.15.4
    container_name: ablage-vault
    command: server
    ports:
      - "8200:8200"
    volumes:
      - ./infrastructure/vault/config:/vault/config:ro
      - vault_data:/vault/data
      - vault_logs:/vault/logs
    environment:
      VAULT_ADDR: 'http://0.0.0.0:8200'
      VAULT_API_ADDR: 'http://vault:8200'
      VAULT_LOCAL_CONFIG: |
        ui = true
        disable_mlock = true
        storage "file" {
          path = "/vault/data"
        }
        listener "tcp" {
          address = "0.0.0.0:8200"
          tls_disable = 1
        }
    cap_add:
      - IPC_LOCK
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - ablage-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads:
  outputs:
  backups:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
  vault_data:
  vault_logs:

networks:
  ablage-network:
    driver: bridge
