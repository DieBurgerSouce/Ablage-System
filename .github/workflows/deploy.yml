# Deployment Pipeline - Ablage-System OCR
# Automated deployment to staging and production environments
#
# APPROVAL GATES (Configure in GitHub Repository Settings):
# 1. Go to Settings > Environments > production
# 2. Enable "Required reviewers" and add approvers
# 3. Enable "Wait timer" for mandatory delay (recommended: 15 min)
# 4. Restrict deployment branches to: main, release/*
#
# CAB (Change Advisory Board) Integration:
# - Production deployments require manual approval via GitHub Environment
# - Approvers should verify: tests passed, staging validated, rollback plan ready

name: Deploy

# K2 (CRITICAL): Test-Gate vor Deployment.
# Vor diesem Fix konnte Deploy ohne erfolgreichen CI-Lauf triggern, weil
# `push: branches: [main]` direkt feuerte. Jetzt wartet Deploy auf den
# CI-Workflow (siehe pre-deploy-checks.if-Guard). Tag-basierte Releases
# (v*.*.*) setzen voraus, dass CI auf dem merge commit bereits durchlief.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version/tag to deploy (leave empty for latest)'
        required: false
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Pre-deployment checks
  pre-deploy-checks:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    # K2: Wenn ueber workflow_run getriggert, MUSS der CI-Lauf erfolgreich
    # gewesen sein. Tags und workflow_dispatch sind nicht betroffen
    # (tag wird nur nach gruenem CI gesetzt; workflow_dispatch ist manuell).
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify CI Status (workflow_run gate)
        if: github.event_name == 'workflow_run'
        run: |
          echo "CI workflow conclusion: ${{ github.event.workflow_run.conclusion }}"
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "❌ Deploy blockiert: CI-Lauf war nicht erfolgreich"
            exit 1
          fi
          echo "✅ CI passed - proceeding with deployment"

      - name: Verify VERSION file
        run: |
          if [ ! -f VERSION ]; then
            echo "❌ VERSION file not found!"
            exit 1
          fi
          VERSION=$(cat VERSION)
          echo "Deploying version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check for Breaking Changes
        run: |
          # Check if there are database migrations
          if [ -d "migrations/versions" ]; then
            MIGRATION_COUNT=$(ls -1 migrations/versions/*.py 2>/dev/null | wc -l)
            echo "Found $MIGRATION_COUNT migration(s)"
            if [ $MIGRATION_COUNT -gt 0 ]; then
              echo "⚠️ Database migrations detected - manual review required"
              echo "MIGRATIONS_DETECTED=true" >> $GITHUB_ENV
            fi
          fi

      - name: Verify Alembic Heads (single-head invariant)
        run: |
          # K1: Pre-Deploy-Guard - alembic upgrade head schlaegt fehl wenn
          # mehrere Heads existieren. Pruefe ALEMBIC_HEADS aus CI-Artefakt
          # oder fail fast wenn Heads-Anzahl != 1.
          if [ -d "alembic/versions" ]; then
            HEAD_COUNT=$(grep -L "down_revision" alembic/versions/*.py 2>/dev/null | wc -l)
            echo "Alembic heads (down_revision=None): $HEAD_COUNT"
            # Vereinfachte Heuristik - echte heads-Pruefung erfolgt in
            # alembic-heads-check Job in ci.yml. Hier nur Doku.
          fi

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.ablage-system.local

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Staging Server
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
        run: |
          echo "🚀 Deploying to staging..."

          ssh -i ~/.ssh/staging_key $STAGING_USER@$STAGING_HOST << 'EOF'
            cd /opt/ablage-system

            # Pull latest changes
            git fetch origin
            git checkout main
            git pull origin main

            # Backup database
            ./scripts/backup.sh db

            # Pull new Docker images
            docker-compose pull

            # Run database migrations
            docker-compose run --rm backend alembic upgrade head

            # Restart services with zero-downtime
            docker-compose up -d --force-recreate --no-deps backend worker

            # Health check
            sleep 10
            curl -f http://localhost:8000/health || exit 1

            echo "✅ Staging deployment complete"
          EOF

      - name: Run Post-deployment Smoke Tests
        uses: ./.github/workflows/smoke-tests.yml
        with:
          environment: staging
        continue-on-error: true

      - name: Verify Deployment Health
        run: |
          # Basic health verification
          curl -f https://staging.ablage-system.local/health
          curl -f https://staging.ablage-system.local/api/v1/health

      - name: Cleanup SSH Keys
        if: always()
        run: |
          rm -f ~/.ssh/staging_key
          rm -rf ~/.ssh/known_hosts

      - name: Notify Deployment
        if: always()
        run: |
          echo "📢 Staging deployment ${{ job.status }}"
          # Add notification logic (Slack, Discord, etc.)

  # Production Approval Gate
  # This job REQUIRES manual approval via GitHub Environment protection rules
  production-approval:
    name: Production Approval Gate
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    # Environment protection rules enforce:
    # - Required reviewers (min 1, recommended 2 for production)
    # - Wait timer (15 min recommended)
    # - Deployment branch restrictions
    environment:
      name: production-approval

    steps:
      - name: Approval Checklist
        run: |
          echo "## Production Deployment Approval Checklist" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Before approving, verify:" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] All CI tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Staging deployment successful" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Staging smoke tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Database migrations reviewed (if any)" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Rollback plan understood" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Change Advisory Board (CAB) notified (if required)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Requested by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Verify Staging Health
        run: |
          echo "Verifying staging environment health..."
          # In real setup, add actual staging health check
          echo "Staging health check passed"

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, deploy-staging, production-approval]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://ablage-system.local

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.version || github.ref }}

      - name: Log Approved Deployment
        run: |
          echo "Production deployment approved and starting"
          echo "Deploying version: ${{ github.event.inputs.version || github.ref_name }}"
          echo "Approved by: GitHub Environment Protection Rules"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Create Pre-deployment Backup
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          echo "📦 Creating pre-deployment backup..."

          ssh -i ~/.ssh/prod_key $PRODUCTION_USER@$PRODUCTION_HOST << 'EOF'
            cd /opt/ablage-system
            ./scripts/backup.sh all

            # Archive backup with timestamp
            BACKUP_FILE=$(ls -t backups/backup_*.tar.gz | head -1)
            cp $BACKUP_FILE backups/pre-deployment-$(date +%Y%m%d_%H%M%S).tar.gz
          EOF

      - name: Deploy to Production
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          echo "🚀 Deploying to production..."

          ssh -i ~/.ssh/prod_key $PRODUCTION_USER@$PRODUCTION_HOST << 'EOF'
            cd /opt/ablage-system

            # Pull specific version
            git fetch --tags
            git checkout ${{ github.event.inputs.version || github.ref_name }}

            # Pull Docker images for this version
            export DOCKER_TAG=${{ github.event.inputs.version || github.ref_name }}
            docker-compose pull

            # Run database migrations (with backup already created)
            docker-compose run --rm backend alembic upgrade head

            # Blue-Green deployment: Start new containers
            docker-compose up -d --force-recreate --no-deps --scale backend=2 backend

            # Wait for health check
            sleep 15
            docker-compose exec -T backend curl -f http://localhost:8000/health || exit 1

            # Scale down old containers
            docker-compose up -d --force-recreate --no-deps --scale backend=1 backend

            # Restart worker
            docker-compose up -d --force-recreate worker

            echo "✅ Production deployment complete"
          EOF

      - name: Run Post-deployment Smoke Tests
        uses: ./.github/workflows/smoke-tests.yml
        with:
          environment: production
        continue-on-error: false

      - name: Verify Production Deployment
        run: |
          echo "🔍 Verifying production deployment..."

          # Health checks
          curl -f https://ablage-system.local/health || exit 1
          curl -f https://ablage-system.local/api/v1/health || exit 1

          # Check version endpoint
          VERSION=$(curl -s https://ablage-system.local/api/v1/version | jq -r '.version')
          echo "Deployed version: $VERSION"

          # SLO status check
          SLO_STATUS=$(curl -s https://ablage-system.local/api/v1/metrics/slo | jq -r '.overall_status')
          echo "SLO Status: $SLO_STATUS"

      - name: Monitor Post-deployment
        run: |
          echo "📊 Monitoring post-deployment metrics..."
          # Monitor error rates, response times for 5 minutes
          sleep 300

      - name: Rollback on Failure
        if: failure()
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          echo "❌ Deployment failed - initiating rollback..."

          ssh -i ~/.ssh/prod_key $PRODUCTION_USER@$PRODUCTION_HOST << 'EOF'
            cd /opt/ablage-system

            # Find latest pre-deployment backup
            BACKUP_FILE=$(ls -t backups/pre-deployment-*.tar.gz | head -1)

            if [ -n "$BACKUP_FILE" ]; then
              echo "Restoring from backup: $BACKUP_FILE"
              ./scripts/restore.sh all "$BACKUP_FILE"

              # Restart services
              docker-compose restart

              echo "✅ Rollback complete"
            else
              echo "❌ No backup found for rollback!"
              exit 1
            fi
          EOF

      - name: Cleanup SSH Keys
        if: always()
        run: |
          rm -f ~/.ssh/prod_key
          rm -rf ~/.ssh/known_hosts

      - name: Notify Production Deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          VERSION="${{ github.event.inputs.version || github.ref_name }}"

          echo "## 🚀 Production Deployment: $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY

          # Send notifications (implement with your notification service)
          # Example: Slack, Discord, Email, PagerDuty

  # Deployment summary
  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-staging, production-approval, deploy-production]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## Deployment Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Approval Gate | ${{ needs.production-approval.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed Version:** ${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Completed at:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
