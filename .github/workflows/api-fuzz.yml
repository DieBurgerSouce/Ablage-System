# API-Contract-Fuzzing (Schemathesis) - Welle 2 / Plan-Item 0d
#
# Jagt 5xx-Antworten ueber die gesamte OpenAPI-Spec (Check: not_a_server_error).
# Bootstrapping wie e2e.yml: GH-Services (Postgres/Redis) + uvicorn auf dem
# Runner (das Compose-File braucht GPU-Devices und laeuft hier nicht).
#
# Anfangs non-blocking (continue-on-error) - nach 2 Wochen stabilem Lauf
# auf blocking stellen.

name: API Fuzzing

on:
  pull_request:
    branches: [master]
    paths:
      - 'app/**'
      - 'alembic/**'
      - 'requirements*.txt'
      - '.github/workflows/api-fuzz.yml'
  schedule:
    # Nightly 03:30 UTC (gestaffelt zu anderen Nightlies)
    - cron: '30 3 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  api-fuzz:
    name: Schemathesis (not_a_server_error)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ablage_fuzz
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ablage_fuzz
        run: alembic upgrade head

      - name: Start Backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ablage_fuzz
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: api-fuzz-test-secret-key-1234567890
          TESTING: true
          RATE_LIMIT_ENABLED: false
          MALWARE_SCAN_ENABLED: false
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8000/health && break
            sleep 2
          done
          curl -f http://localhost:8000/health

      - name: Seed Deterministic Test Data
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ablage_fuzz
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: api-fuzz-test-secret-key-1234567890
          TESTING: true
        run: python scripts/seed_e2e.py

      - name: Run Schemathesis
        env:
          BASE_URL: http://localhost:8000
          MAX_EXAMPLES: "25"
          SEED: "0"  # Seeding lief bereits direkt (kein docker compose im Runner)
        run: |
          bash scripts/run_schemathesis.sh 2>&1 | tee schemathesis-output.log

      - name: Upload Fuzzing Log
        uses: actions/upload-artifact@ea165f8d65b6db9a8b9c8bb8a1a6e62af5c2e0c7 # v4.6.2
        if: always()
        with:
          name: schemathesis-log
          path: schemathesis-output.log
          retention-days: 30
