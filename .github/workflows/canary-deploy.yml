# Canary Deployment Pipeline - Ablage-System OCR
# Progressive rollout with automated monitoring and rollback
#
# Strategy:
# - 10% Traffic → 5 min monitoring
# - 50% Traffic → 10 min monitoring
# - 100% Traffic → Full rollout
# - Auto-rollback if error rate > 5% or p95 latency > 2s

name: Canary Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version/tag to deploy'
        required: true
        type: string
      skip_staging:
        description: 'Skip staging validation (emergency only)'
        required: false
        type: boolean
        default: false
      max_error_rate:
        description: 'Max error rate before rollback (%)'
        required: false
        type: number
        default: 5
      max_latency_p95:
        description: 'Max P95 latency before rollback (ms)'
        required: false
        type: number
        default: 2000

env:
  CANARY_WEIGHT_STEP1: 10
  CANARY_WEIGHT_STEP2: 50
  CANARY_WEIGHT_STEP3: 100
  MONITOR_INTERVAL_STEP1: 300  # 5 minutes
  MONITOR_INTERVAL_STEP2: 600  # 10 minutes
  ERROR_RATE_THRESHOLD: ${{ github.event.inputs.max_error_rate || 5 }}
  LATENCY_THRESHOLD: ${{ github.event.inputs.max_latency_p95 || 2000 }}

jobs:
  # Validate version and prepare
  prepare:
    name: Prepare Canary Deployment
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.validate.outputs.version }}
      current_version: ${{ steps.current.outputs.version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Validate Version
        id: validate
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "Validating version: $VERSION"

          # Check if version exists
          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Error: Version $VERSION not found!"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version $VERSION validated"

      - name: Get Current Production Version
        id: current
        run: |
          # In real setup, query production for current version
          CURRENT_VERSION=$(curl -s https://ablage-system.local/api/v1/version | jq -r '.version' || echo "unknown")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current production version: $CURRENT_VERSION"

      - name: Generate Deployment Summary
        run: |
          echo "## Canary Deployment Prepared" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| New Version | ${{ github.event.inputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Current Version | ${{ steps.current.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Error Rate Threshold | ${{ env.ERROR_RATE_THRESHOLD }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Latency Threshold | ${{ env.LATENCY_THRESHOLD }}ms |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Canary Strategy" >> $GITHUB_STEP_SUMMARY
          echo "1. **10% Traffic** - 5 min monitoring" >> $GITHUB_STEP_SUMMARY
          echo "2. **50% Traffic** - 10 min monitoring" >> $GITHUB_STEP_SUMMARY
          echo "3. **100% Traffic** - Full rollout" >> $GITHUB_STEP_SUMMARY

  # Deploy canary (10% traffic)
  canary-10:
    name: Canary 10% Traffic
    runs-on: ubuntu-latest
    needs: prepare
    environment:
      name: production-canary

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Canary Instance
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          echo "Deploying canary with ${{ env.CANARY_WEIGHT_STEP1 }}% traffic..."

          ssh -i ~/.ssh/prod_key $PRODUCTION_USER@$PRODUCTION_HOST << 'DEPLOY_EOF'
            cd /opt/ablage-system

            # Pull new version for canary
            git fetch --tags
            git checkout $VERSION

            # Start canary container
            export DOCKER_TAG=$VERSION
            docker-compose -f docker-compose.yml -f docker-compose.canary.yml up -d backend-canary

            # Configure nginx for canary traffic split
            cat > /etc/nginx/conf.d/canary.conf << 'NGINX_EOF'
            upstream backend_canary {
                server backend:8000 weight=90;
                server backend-canary:8000 weight=10;
            }
          NGINX_EOF

            # Reload nginx
            docker-compose exec -T nginx nginx -s reload

            echo "Canary deployed with 10% traffic"
          DEPLOY_EOF

      - name: Monitor Canary (5 min)
        run: |
          echo "Monitoring canary for ${{ env.MONITOR_INTERVAL_STEP1 }} seconds..."

          START_TIME=$(date +%s)
          END_TIME=$((START_TIME + ${{ env.MONITOR_INTERVAL_STEP1 }}))

          while [ $(date +%s) -lt $END_TIME ]; do
            # Query Prometheus for error rate
            ERROR_RATE=$(curl -s "https://prometheus.ablage-system.local/api/v1/query?query=rate(http_requests_total{status=~'5..', instance='backend-canary'}[1m])" | jq -r '.data.result[0].value[1] // 0' || echo "0")

            # Query for P95 latency
            LATENCY_P95=$(curl -s "https://prometheus.ablage-system.local/api/v1/query?query=histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{instance='backend-canary'}[1m]))" | jq -r '.data.result[0].value[1] // 0' || echo "0")

            # Convert latency to ms
            LATENCY_MS=$(echo "$LATENCY_P95 * 1000" | bc 2>/dev/null || echo "0")

            echo "Error Rate: ${ERROR_RATE}%, P95 Latency: ${LATENCY_MS}ms"

            # Check thresholds
            if (( $(echo "$ERROR_RATE > ${{ env.ERROR_RATE_THRESHOLD }}" | bc -l 2>/dev/null || echo 0) )); then
              echo "ERROR: Error rate ${ERROR_RATE}% exceeds threshold ${{ env.ERROR_RATE_THRESHOLD }}%!"
              echo "CANARY_FAILED=true" >> $GITHUB_ENV
              exit 1
            fi

            if (( $(echo "$LATENCY_MS > ${{ env.LATENCY_THRESHOLD }}" | bc -l 2>/dev/null || echo 0) )); then
              echo "ERROR: P95 latency ${LATENCY_MS}ms exceeds threshold ${{ env.LATENCY_THRESHOLD }}ms!"
              echo "CANARY_FAILED=true" >> $GITHUB_ENV
              exit 1
            fi

            sleep 30
          done

          echo "Canary 10% monitoring passed!"

  # Promote to 50% traffic
  canary-50:
    name: Canary 50% Traffic
    runs-on: ubuntu-latest
    needs: [prepare, canary-10]

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Increase Traffic to 50%
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          echo "Promoting canary to ${{ env.CANARY_WEIGHT_STEP2 }}% traffic..."

          ssh -i ~/.ssh/prod_key $PRODUCTION_USER@$PRODUCTION_HOST << 'DEPLOY_EOF'
            # Update nginx weights
            cat > /etc/nginx/conf.d/canary.conf << 'NGINX_EOF'
            upstream backend_canary {
                server backend:8000 weight=50;
                server backend-canary:8000 weight=50;
            }
          NGINX_EOF

            docker-compose exec -T nginx nginx -s reload
            echo "Canary promoted to 50% traffic"
          DEPLOY_EOF

      - name: Monitor Canary (10 min)
        run: |
          echo "Monitoring canary for ${{ env.MONITOR_INTERVAL_STEP2 }} seconds..."

          START_TIME=$(date +%s)
          END_TIME=$((START_TIME + ${{ env.MONITOR_INTERVAL_STEP2 }}))

          while [ $(date +%s) -lt $END_TIME ]; do
            ERROR_RATE=$(curl -s "https://prometheus.ablage-system.local/api/v1/query?query=rate(http_requests_total{status=~'5..', instance='backend-canary'}[1m])" | jq -r '.data.result[0].value[1] // 0' || echo "0")
            LATENCY_P95=$(curl -s "https://prometheus.ablage-system.local/api/v1/query?query=histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{instance='backend-canary'}[1m]))" | jq -r '.data.result[0].value[1] // 0' || echo "0")
            LATENCY_MS=$(echo "$LATENCY_P95 * 1000" | bc 2>/dev/null || echo "0")

            echo "Error Rate: ${ERROR_RATE}%, P95 Latency: ${LATENCY_MS}ms"

            if (( $(echo "$ERROR_RATE > ${{ env.ERROR_RATE_THRESHOLD }}" | bc -l 2>/dev/null || echo 0) )); then
              echo "ERROR: Error rate exceeds threshold!"
              exit 1
            fi

            if (( $(echo "$LATENCY_MS > ${{ env.LATENCY_THRESHOLD }}" | bc -l 2>/dev/null || echo 0) )); then
              echo "ERROR: P95 latency exceeds threshold!"
              exit 1
            fi

            sleep 30
          done

          echo "Canary 50% monitoring passed!"

  # Full rollout (100%)
  full-rollout:
    name: Full Rollout (100%)
    runs-on: ubuntu-latest
    needs: [prepare, canary-10, canary-50]
    environment:
      name: production

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Full Rollout
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          echo "Promoting to full rollout (100%)..."

          ssh -i ~/.ssh/prod_key $PRODUCTION_USER@$PRODUCTION_HOST << 'DEPLOY_EOF'
            cd /opt/ablage-system

            # Update main backend to new version
            export DOCKER_TAG=$VERSION
            docker-compose up -d --force-recreate backend

            # Remove canary configuration
            rm -f /etc/nginx/conf.d/canary.conf

            # Stop canary container
            docker-compose -f docker-compose.yml -f docker-compose.canary.yml stop backend-canary
            docker-compose -f docker-compose.yml -f docker-compose.canary.yml rm -f backend-canary

            # Reload nginx to standard config
            docker-compose exec -T nginx nginx -s reload

            echo "Full rollout complete!"
          DEPLOY_EOF

      - name: Verify Full Deployment
        run: |
          echo "Verifying full deployment..."

          # Health check
          curl -f https://ablage-system.local/health || exit 1

          # Version check
          DEPLOYED_VERSION=$(curl -s https://ablage-system.local/api/v1/version | jq -r '.version')
          echo "Deployed version: $DEPLOYED_VERSION"

          echo "## Canary Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version **${{ needs.prepare.outputs.version }}** successfully rolled out to 100%" >> $GITHUB_STEP_SUMMARY

  # Rollback job (runs on failure)
  rollback:
    name: Rollback Canary
    runs-on: ubuntu-latest
    needs: [prepare, canary-10, canary-50, full-rollout]
    if: failure()

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback Canary Deployment
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PREVIOUS_VERSION: ${{ needs.prepare.outputs.current_version }}
        run: |
          echo "Initiating rollback due to canary failure..."

          ssh -i ~/.ssh/prod_key $PRODUCTION_USER@$PRODUCTION_HOST << 'DEPLOY_EOF'
            cd /opt/ablage-system

            # Remove canary configuration
            rm -f /etc/nginx/conf.d/canary.conf

            # Stop and remove canary container
            docker-compose -f docker-compose.yml -f docker-compose.canary.yml stop backend-canary 2>/dev/null || true
            docker-compose -f docker-compose.yml -f docker-compose.canary.yml rm -f backend-canary 2>/dev/null || true

            # Reload nginx to standard config
            docker-compose exec -T nginx nginx -s reload

            # Verify original backend is healthy
            curl -f http://localhost:8000/health || {
              echo "Original backend unhealthy, restarting..."
              docker-compose restart backend
            }

            echo "Rollback complete - canary removed"
          DEPLOY_EOF

      - name: Notify Rollback
        run: |
          echo "## Canary Rollback Executed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Canary deployment of **${{ needs.prepare.outputs.version }}** was rolled back" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Failure Analysis" >> $GITHUB_STEP_SUMMARY
          echo "Check the failed job logs for details on what caused the rollback." >> $GITHUB_STEP_SUMMARY
