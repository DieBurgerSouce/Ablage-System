# Dependency Updates - Ablage-System OCR
# Automated dependency scanning and update PRs

name: Dependencies

on:
  schedule:
    # Run every Monday at 9:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  # G2 (2026-06-03): Job `python-dependencies` (pip-compile requirements.in)
  # entfernt - requirements.in existierte nie. Python-Updates uebernimmt
  # Dependabot (.github/dependabot.yml, pip-Ecosystem).

  # Check for security vulnerabilities
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      # G2 (2026-06-03): safety durch pip-audit ersetzt. Der JSON-Report wird als
      # Artefakt hochgeladen; das `|| true` haengt NUR am Report-Step, damit das
      # Artefakt auch bei Funden entsteht. Das eigentliche Gate (Step danach)
      # laeuft OHNE `|| true` und blockiert bei Schwachstellen (exit != 0).
      - name: Generate pip-audit JSON Report
        run: pip-audit -r requirements.txt -f json -o pip-audit-report.json || true

      - name: Upload pip-audit Report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6db9a8b9c8bb8a1a6e62af5c2e0c7 # v4.6.2
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

      - name: Run pip-audit (blocking gate)
        run: pip-audit -r requirements.txt

  # Check Docker base images
  docker-updates:
    name: Docker Base Images
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dockerfile:
          - Dockerfile
          - docker/Dockerfile.worker
          - frontend/Dockerfile

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check for Base Image Updates
        run: |
          DOCKERFILE="${{ matrix.dockerfile }}"

          if [ ! -f "$DOCKERFILE" ]; then
            echo "Dockerfile not found: $DOCKERFILE"
            exit 0
          fi

          # Extract base image
          BASE_IMAGE=$(grep "^FROM" "$DOCKERFILE" | head -1 | awk '{print $2}')
          echo "Base image: $BASE_IMAGE"

          # Pull latest
          docker pull "$BASE_IMAGE"

          # Check if there are updates
          # (This is a simplified check - in production, use a tool like Renovate)
          echo "Base image check complete"

  # Dependency summary
  dependency-summary:
    name: Dependency Summary
    runs-on: ubuntu-latest
    needs: [security-audit, docker-updates]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## Dependency Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Images | ${{ needs.docker-updates.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Last Run:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
