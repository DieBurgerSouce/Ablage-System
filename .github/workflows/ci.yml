# CI Pipeline - Ablage-System OCR
# Continuous Integration: Tests, Linting, Type Checking, Security Scanning
# Optimiert für schnelles Feedback mit paralleler Ausführung

name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.1"
  # Cache-Keys für konsistentes Caching
  CACHE_KEY_PREFIX: "ablage-ci-v2"

jobs:
  # Job 0: Pre-commit Hooks (Enterprise Quality Gate - MUST pass)
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run Pre-commit Hooks
        run: |
          echo "::group::Pre-commit Hooks"
          pre-commit run --all-files --show-diff-on-failure
          echo "::endgroup::"

  # Job 1: Code Quality Checks (fastest, fail fast)
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: [pre-commit]

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt

      - name: Run Ruff Linter
        run: |
          echo "::group::Ruff Check"
          ruff check . --output-format=github
          echo "::endgroup::"

      - name: Run Ruff Formatter Check
        run: |
          echo "::group::Ruff Format Check"
          ruff format --check .
          echo "::endgroup::"

      - name: Run MyPy Type Checking
        run: |
          echo "::group::MyPy Type Check"
          mypy app/ --strict
          echo "::endgroup::"

  # Job 2: Security Scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit Security Scan
        run: |
          echo "::group::Bandit Security Scan"
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -f screen
          echo "::endgroup::"

      - name: Upload Bandit Report
        uses: actions/upload-artifact@ea165f8d65b6db9a8b9c8bb8a1a6e62af5c2e0c7 # v4.6.2
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

      - name: Run Safety Check (Dependencies)
        run: |
          pip install safety
          echo "::group::Safety Dependency Check"
          safety check --json --output safety-report.json || true
          safety check
          echo "::endgroup::"

      - name: Upload Safety Report
        uses: actions/upload-artifact@ea165f8d65b6db9a8b9c8bb8a1a6e62af5c2e0c7 # v4.6.2
        if: always()
        with:
          name: safety-dependency-report
          path: safety-report.json
          retention-days: 30

  # Job 3: Unit Tests
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ablage_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Unit Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ablage_test
          REDIS_URL: redis://localhost:6379/0
          TESTING: true
        run: |
          echo "::group::Unit Tests"
          pytest tests/unit/ -v --tb=short --cov=app --cov-report=xml --cov-report=term
          echo "::endgroup::"

      - name: Upload Coverage Report
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v4.7.1
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-unit
          fail_ci_if_error: true

  # Job 4: Integration Tests
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ablage_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 9000:9000

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Database Migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ablage_test
        run: |
          echo "::group::Database Migrations"
          alembic upgrade head
          echo "::endgroup::"

      - name: Run Integration Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ablage_test
          REDIS_URL: redis://localhost:6379/0
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          TESTING: true
        run: |
          echo "::group::Integration Tests"
          pytest tests/integration/ -v --tb=short --cov=app --cov-report=xml --cov-report=term
          echo "::endgroup::"

      - name: Upload Coverage Report
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v4.7.1
        with:
          files: ./coverage.xml
          flags: integration
          name: codecov-integration
          fail_ci_if_error: true

  # Job 5: Build Verification
  build:
    name: Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build Backend Image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c3bc4c1f # v5.4.0
        with:
          context: .
          file: ./docker/Dockerfile.backend
          push: false
          tags: ablage-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker Image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198e19c3bc4c1f # v5.4.0
        with:
          context: .
          file: ./docker/Dockerfile.worker
          push: false
          tags: ablage-worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 6: Documentation Build
  docs:
    name: Documentation Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install MkDocs
        run: |
          pip install mkdocs mkdocs-material mkdocstrings[python]

      - name: Build Documentation
        run: |
          echo "::group::Build Documentation"
          mkdocs build --strict
          echo "::endgroup::"

      - name: Upload Documentation
        uses: actions/upload-artifact@ea165f8d65b6db9a8b9c8bb8a1a6e62af5c2e0c7 # v4.6.2
        with:
          name: documentation
          path: site/
          retention-days: 30

  # Job 8: Summary Report
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [pre-commit, code-quality, security, test-unit, test-integration, build, docs]
    if: always()

    steps:
      - name: Check Results
        run: |
          echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-commit Hooks | ${{ needs.pre-commit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.test-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Verification | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.docs.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Determine Overall Status
        run: |
          if [[ "${{ needs.pre-commit.result }}" == "success" && \
                "${{ needs.code-quality.result }}" == "success" && \
                "${{ needs.security.result }}" == "success" && \
                "${{ needs.test-unit.result }}" == "success" && \
                "${{ needs.test-integration.result }}" == "success" && \
                "${{ needs.build.result }}" == "success" && \
                "${{ needs.docs.result }}" == "success" ]]; then
            echo "✅ All CI checks passed!" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "❌ Some CI checks failed!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
