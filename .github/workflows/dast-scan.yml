# OWASP ZAP DAST Scan Pipeline - Ablage-System OCR
# Dynamic Application Security Testing für laufende API-Endpunkte

name: DAST Scan

on:
  schedule:
    # Woechentlicher DAST-Scan Sonntag 04:00 UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Scan-Typ'
        required: true
        default: 'api'
        type: choice
        options:
          - api
          - full
      fail_on_risk:
        description: 'Fehlschlag bei Risiko-Level'
        required: true
        default: 'High'
        type: choice
        options:
          - High
          - Medium
          - Low

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  dast-api-scan:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Docker-Umgebung starten
        run: |
          # Services fuer API-Tests hochfahren
          docker-compose -f docker-compose.yml up -d postgres redis minio qdrant

          # Backend-Service starten
          docker-compose -f docker-compose.yml up -d backend

          echo "Warte auf Backend-Start..."
          timeout 120 bash -c 'until curl -sf http://localhost:8000/health/ping; do sleep 2; done'

          echo "Backend ist bereit fuer DAST-Scan"
          docker-compose ps

      - name: OpenAPI-Spezifikation exportieren
        run: |
          curl -sf http://localhost:8000/api/v1/openapi.json > openapi-spec.json
          echo "OpenAPI-Spec exportiert ($(wc -c < openapi-spec.json) Bytes)"

          # Validierung: Pruefen ob JSON gueltig ist
          if ! jq empty openapi-spec.json 2>/dev/null; then
            echo "Fehler: OpenAPI-Spec ist kein gueltiges JSON"
            exit 1
          fi

      - name: OWASP ZAP API-Scan
        uses: zaproxy/action-api-scan@77dfa9a647bb0f583e39d4df8531634d6ddd8df4 # v0.9.0
        with:
          target: 'http://localhost:8000/api/v1/openapi.json'
          format: openapi
          cmd_options: '-z "-config scanner.maxScanDurationInMins=30"'
          fail_action: true
          allow_issue_writing: true
          issue_title: '[DAST] OWASP ZAP Sicherheitsbefunde'
          rules_file_name: '.github/zap-rules.tsv'
        continue-on-error: true
        id: zap_scan

      - name: ZAP-Bericht nach SARIF konvertieren
        if: always()
        run: |
          pip install sarif-om jschema-to-python
          python3 << 'EOF'
          import json
          import sys
          from pathlib import Path

          # Minimaler ZAP JSON -> SARIF Konverter
          sarif = {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [{
              "tool": {
                "driver": {
                  "name": "OWASP ZAP",
                  "version": "2.14",
                  "informationUri": "https://www.zaproxy.org/"
                }
              },
              "results": []
            }]
          }

          # ZAP erzeugt report_json.json im Workspace
          report_file = Path('report_json.json')
          if not report_file.exists():
            print('Kein ZAP-Bericht gefunden, erstelle leeren SARIF')
          else:
            try:
              with open(report_file, 'r') as f:
                zap = json.load(f)

              # ZAP Risk-Levels: 0=Info, 1=Low, 2=Medium, 3=High
              level_map = {
                '0': 'note',
                '1': 'warning',
                '2': 'warning',
                '3': 'error'
              }

              for site in zap.get('site', []):
                for alert in site.get('alerts', []):
                  # Erste Instanz des Befunds verwenden
                  instances = alert.get('instances', [{}])
                  first_instance = instances[0] if instances else {}

                  sarif['runs'][0]['results'].append({
                    'ruleId': f"ZAP-{alert.get('pluginid', 'unknown')}",
                    'level': level_map.get(str(alert.get('riskcode', 0)), 'note'),
                    'message': {
                      'text': alert.get('alert', 'Unbekannter Fund')
                    },
                    'locations': [{
                      'physicalLocation': {
                        'artifactLocation': {
                          'uri': first_instance.get('uri', '')
                        }
                      }
                    }],
                    'properties': {
                      'confidence': alert.get('confidence', 'Unknown'),
                      'description': alert.get('desc', ''),
                      'solution': alert.get('solution', ''),
                      'reference': alert.get('reference', '')
                    }
                  })
            except Exception as e:
              print(f'Fehler beim Parsen des ZAP-Berichts: {e}')

          with open('zap-results.sarif', 'w') as f:
            json.dump(sarif, f, indent=2)

          count = len(sarif['runs'][0]['results'])
          print(f'SARIF erstellt mit {count} Befunden')

          # Exit-Code fuer Workflow-Status
          if count > 0:
            # Zaehle kritische Befunde
            critical_count = sum(
              1 for r in sarif['runs'][0]['results']
              if r.get('level') == 'error'
            )
            print(f'Davon {critical_count} kritische Befunde (High)')
            if critical_count > 0:
              sys.exit(1)
          EOF

      - name: SARIF-Bericht hochladen
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        if: always()
        with:
          sarif_file: 'zap-results.sarif'
          category: 'dast-owasp-zap'

      - name: Scan-Berichte archivieren
        uses: actions/upload-artifact@ea165f8d65b6db9a8b9c8bb8a1a6e62af5c2e0c7 # v4.6.2
        if: always()
        with:
          name: dast-scan-berichte-${{ github.run_number }}
          path: |
            report_*
            zap-results.sarif
            openapi-spec.json
          retention-days: 90

      - name: Scan-Zusammenfassung erstellen
        if: always()
        run: |
          echo "## DAST Scan Zusammenfassung" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Wert |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scan-Typ | ${{ github.event.inputs.scan_type || 'api' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.zap_scan.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f report_json.json ]; then
            # Befunde zaehlen
            HIGH=$(jq '[.site[].alerts[] | select(.riskcode == "3")] | length' report_json.json)
            MEDIUM=$(jq '[.site[].alerts[] | select(.riskcode == "2")] | length' report_json.json)
            LOW=$(jq '[.site[].alerts[] | select(.riskcode == "1")] | length' report_json.json)
            INFO=$(jq '[.site[].alerts[] | select(.riskcode == "0")] | length' report_json.json)

            echo "### Befunde nach Risiko-Level" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Level | Anzahl |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| 🔴 High | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟠 Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟡 Low | $LOW |" >> $GITHUB_STEP_SUMMARY
            echo "| ℹ️ Info | $INFO |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Keine ZAP-Berichte gefunden" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Naechste Schritte" >> $GITHUB_STEP_SUMMARY
          echo "- SARIF-Bericht im Security-Tab pruefen" >> $GITHUB_STEP_SUMMARY
          echo "- Kritische Befunde priorisiert beheben" >> $GITHUB_STEP_SUMMARY
          echo "- False Positives in .github/zap-rules.tsv konfigurieren" >> $GITHUB_STEP_SUMMARY

      - name: Docker-Umgebung aufräumen
        if: always()
        run: |
          docker-compose logs backend > backend-logs.txt 2>&1 || true
          docker-compose down -v
