# Smoke Tests Pipeline - Ablage-System OCR
# Post-Deployment Validierung kritischer Pfade

name: Smoke Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - local
  workflow_call:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        type: string
        default: 'staging'
    outputs:
      smoke_test_passed:
        description: 'Whether smoke tests passed'
        value: ${{ jobs.smoke-tests.outputs.passed }}

env:
  STAGING_URL: https://staging.ablage-system.local
  PRODUCTION_URL: https://ablage-system.local
  LOCAL_URL: http://localhost:8000

jobs:
  smoke-tests:
    name: Smoke Tests (${{ inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      passed: ${{ steps.results.outputs.passed }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set Environment URL
        id: env-url
        run: |
          ENV="${{ inputs.environment || 'staging' }}"
          case $ENV in
            staging)
              echo "BASE_URL=${{ env.STAGING_URL }}" >> $GITHUB_ENV
              ;;
            production)
              echo "BASE_URL=${{ env.PRODUCTION_URL }}" >> $GITHUB_ENV
              ;;
            local)
              echo "BASE_URL=${{ env.LOCAL_URL }}" >> $GITHUB_ENV
              ;;
          esac
          echo "Testing environment: $ENV"

      - name: Health Check - API
        id: health-api
        run: |
          echo "::group::API Health Check"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$BASE_URL/health")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          if [ "$HTTP_CODE" = "200" ]; then
            echo "API Health Check: PASSED"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "API Health Check: FAILED (HTTP $HTTP_CODE)"
            echo "Response: $BODY"
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: Health Check - Database
        id: health-db
        run: |
          echo "::group::Database Health Check"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$BASE_URL/api/v1/health")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          DB_STATUS=$(echo "$BODY" | jq -r '.checks.database // "unknown"')

          if [ "$DB_STATUS" = "healthy" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Database Health Check: PASSED"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "Database Health Check: FAILED"
            echo "Response: $BODY"
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: Health Check - Redis
        id: health-redis
        run: |
          echo "::group::Redis Health Check"
          RESPONSE=$(curl -s "$BASE_URL/api/v1/health")
          REDIS_STATUS=$(echo "$RESPONSE" | jq -r '.checks.redis // "unknown"')

          if [ "$REDIS_STATUS" = "healthy" ]; then
            echo "Redis Health Check: PASSED"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "Redis Health Check: WARNING (Status: $REDIS_STATUS)"
            echo "status=warning" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: API Endpoint - Version
        id: api-version
        run: |
          echo "::group::Version Endpoint"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$BASE_URL/api/v1/version" 2>/dev/null || echo "error")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)

          if [ "$HTTP_CODE" = "200" ]; then
            VERSION=$(echo "$RESPONSE" | head -n-1 | jq -r '.version // "unknown"')
            echo "Version: $VERSION"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "Version Endpoint: SKIPPED (not available)"
            echo "status=skipped" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: API Endpoint - Metrics
        id: api-metrics
        run: |
          echo "::group::Metrics Endpoint"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$BASE_URL/api/v1/metrics/system")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Metrics Endpoint: PASSED"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "Metrics Endpoint: FAILED (HTTP $HTTP_CODE)"
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: API Endpoint - SLO Status
        id: api-slo
        run: |
          echo "::group::SLO Status Endpoint"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$BASE_URL/api/v1/metrics/slo")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)

          if [ "$HTTP_CODE" = "200" ]; then
            echo "SLO Status Endpoint: PASSED"
            BODY=$(echo "$RESPONSE" | head -n-1)
            SLO_COUNT=$(echo "$BODY" | jq '.slos | length' 2>/dev/null || echo "0")
            echo "Active SLOs: $SLO_COUNT"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "SLO Status Endpoint: FAILED (HTTP $HTTP_CODE)"
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: API Endpoint - Documents List
        id: api-documents
        run: |
          echo "::group::Documents List Endpoint"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$BASE_URL/api/v1/documents?limit=1")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)

          # Accept 200 or 401 (auth required) as valid responses
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
            echo "Documents Endpoint: PASSED (HTTP $HTTP_CODE)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "Documents Endpoint: FAILED (HTTP $HTTP_CODE)"
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: Response Time Check
        id: response-time
        run: |
          echo "::group::Response Time Check"
          START=$(date +%s%N)
          curl -s "$BASE_URL/health" > /dev/null
          END=$(date +%s%N)

          DURATION_MS=$(( ($END - $START) / 1000000 ))
          echo "Health endpoint response time: ${DURATION_MS}ms"

          # Threshold: 1000ms for health endpoint
          if [ $DURATION_MS -lt 1000 ]; then
            echo "Response Time: PASSED (${DURATION_MS}ms < 1000ms)"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "Response Time: WARNING (${DURATION_MS}ms >= 1000ms)"
            echo "status=warning" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: Aggregate Results
        id: results
        run: |
          FAILED_COUNT=0

          [ "${{ steps.health-api.outputs.status }}" = "failed" ] && FAILED_COUNT=$((FAILED_COUNT + 1))
          [ "${{ steps.health-db.outputs.status }}" = "failed" ] && FAILED_COUNT=$((FAILED_COUNT + 1))
          [ "${{ steps.api-metrics.outputs.status }}" = "failed" ] && FAILED_COUNT=$((FAILED_COUNT + 1))
          [ "${{ steps.api-documents.outputs.status }}" = "failed" ] && FAILED_COUNT=$((FAILED_COUNT + 1))

          if [ $FAILED_COUNT -eq 0 ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
            echo "All critical smoke tests passed!"
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "$FAILED_COUNT critical smoke test(s) failed!"
            exit 1
          fi

      - name: Generate Summary
        if: always()
        run: |
          echo "## Smoke Test Results - ${{ inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Base URL:** $BASE_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Health | ${{ steps.health-api.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Database Health | ${{ steps.health-db.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Redis Health | ${{ steps.health-redis.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Metrics Endpoint | ${{ steps.api-metrics.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SLO Status | ${{ steps.api-slo.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documents API | ${{ steps.api-documents.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Response Time | ${{ steps.response-time.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall:** ${{ steps.results.outputs.passed == 'true' && 'PASSED' || 'FAILED' }}" >> $GITHUB_STEP_SUMMARY
