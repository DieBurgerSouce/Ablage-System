# Alembic Configuration for Ablage-System
# Database migration management
# Created: 2024-11-25

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone for timestamp generation
timezone = Europe/Berlin

# Truncate slug to N characters
truncate_slug_length = 40

# Version location specification
version_locations = %(here)s/alembic/versions

# Output encoding
output_encoding = utf-8

# Database connection URL
# Override with environment variable: ABLAGE_DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://ablage_admin:ablage123!secure@localhost:5433/ablage_system

# PostgreSQL config
prepend_sys_path = .

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
