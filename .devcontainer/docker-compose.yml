version: '3.8'

services:
  # Main development container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../:/workspace:cached
      - /var/run/docker.sock:/var/run/docker-host.sock

    # GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    command: sleep infinity

    networks:
      - ablage-dev-network

    depends_on:
      - postgres
      - redis
      - minio

    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ablage_ocr
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - ENVIRONMENT=development
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=0

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ablage_ocr
    ports:
      - "5432:5432"
    networks:
      - ablage-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache and queue
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - ablage-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # MinIO object storage
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    networks:
      - ablage-dev-network
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO client for bucket creation
  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    networks:
      - ablage-dev-network
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing myminio/documents;
      /usr/bin/mc mb --ignore-existing myminio/thumbnails;
      /usr/bin/mc mb --ignore-existing myminio/exports;
      /usr/bin/mc policy set download myminio/thumbnails;
      exit 0;
      "

  # pgAdmin (optional, for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=dev@ablage.local
      - PGADMIN_DEFAULT_PASSWORD=devpassword
      - PGADMIN_LISTEN_PORT=5050
    ports:
      - "5050:5050"
    networks:
      - ablage-dev-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres

  # Redis Commander (optional, for Redis management)
  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    networks:
      - ablage-dev-network
    depends_on:
      - redis

  # Flower (Celery monitoring) - will be started manually when needed
  flower:
    image: mher/flower:latest
    restart: unless-stopped
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "5555:5555"
    networks:
      - ablage-dev-network
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    profiles:
      - monitoring

networks:
  ablage-dev-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  pgadmin-data:
