events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;
    charset_types text/html text/css text/plain text/javascript application/javascript application/json;

    # HTTP (:80) — bleibt voll funktional (Container-Healthchecks, Fresh-Clone ohne
    # Zertifikate). Der komplette Server-Body ist mit dem HTTPS-Server geteilt.
    server {
        listen 80;
        server_name _;
        include /etc/nginx/snippets/server-common.conf;
    }

    # HTTPS (:443, M-14 LAN-TLS): Die Site-Definition wird von
    # scripts/generate-lan-tls.sh nach infrastructure/nginx/ssl/443-ablage.conf
    # erzeugt (Verzeichnis ist ins Image gemountet, Inhalt gitignored).
    # Leeres ssl/-Verzeichnis => kein 443-Server => kein Fresh-Clone-Bruch.
    include /etc/nginx/ssl/*.conf;
}
