events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;
    charset_types text/html text/css text/plain text/javascript application/javascript application/json;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # SPA Fallback - no cache for index.html to ensure fresh JS bundles
        location / {
            try_files $uri $uri/ /index.html;
            # Force revalidation for HTML to get fresh JS bundle references
            add_header Cache-Control "no-cache, must-revalidate";
            # Security-Header erneut einbinden: das eigene add_header oben wuerde sonst die
            # server-Level-Header (inkl. CSP) unterdruecken (nginx-add_header-Vererbung).
            include /etc/nginx/snippets/security-headers.conf;
        }

        # index.html specifically - never cache
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            # Security-Header erneut einbinden (eigenes add_header oben unterdrueckt Vererbung).
            include /etc/nginx/snippets/security-headers.conf;
        }

        # FAANG-AUDIT FIX: Nginx-eigener Health-Check (unabhaengig vom Backend)
        # Damit Docker den Frontend-Container unabhaengig vom Backend pruefen kann
        location /health {
            access_log off;
            return 200 '{"status":"gesund","service":"frontend","nginx":"running"}';
            add_header Content-Type application/json;
            # Security-Header erneut einbinden (eigenes add_header oben unterdrueckt Vererbung).
            include /etc/nginx/snippets/security-headers.conf;
        }

        # Backend Health-Check Proxy (fuer tiefere Diagnose)
        location /api/health {
            proxy_pass http://backend:8000/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # API Proxy
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Content-Type $content_type;
            proxy_pass_request_headers on;
            proxy_pass_request_body on;
        }

        # OCR Proxy (Dokument-Upload mit groesseren Timeouts)
        location /ocr/ {
            proxy_pass http://backend:8000/ocr/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_request_headers on;
            proxy_pass_request_body on;

            # OCR braucht groessere Body-Limits und Timeouts
            client_max_body_size 100M;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # WebSocket Proxy
        location /ws/ {
            proxy_pass http://backend:8000/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Static Assets Caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            # Security-Header erneut einbinden (eigenes add_header oben unterdrueckt Vererbung).
            include /etc/nginx/snippets/security-headers.conf;
        }

        # Security-Header (inkl. gehaerteter CSP) zentral im Snippet.
        # Gilt fuer alle locations OHNE eigenes add_header (v.a. die Proxy-Routen /api/, /ocr/, /ws/).
        # locations MIT eigenem add_header (/, =/index.html, /health, statische Assets) binden das
        # Snippet zusaetzlich selbst ein, da nginx die server-Level-Header dort sonst unterdrueckt.
        # Keine Doppelung: pro Response greift genau EIN add_header-Level.
        include /etc/nginx/snippets/security-headers.conf;
    }
}
