# Security-Header-Snippet fuer den Frontend-nginx (Docker-Image).
#
# WICHTIG - nginx-add_header-Vererbung: add_header wird vom uebergeordneten Level NUR
# geerbt, solange der aktuelle Level KEIN eigenes add_header hat. Sobald ein location-Block
# ein eigenes add_header setzt (z.B. Cache-Control), fallen ALLE geerbten server-Level-Header
# (inkl. Content-Security-Policy) weg. Deshalb wird dieses Snippet sowohl im server-Block
# (fuer locations OHNE eigenes add_header, v.a. die Proxy-Routen) ALS AUCH in jedem
# location-Block MIT eigenem add_header per `include` eingebunden.
#
# Keine Doppelung: Hat eine location ein eigenes add_header, ersetzt sie die server-Level-Header
# komplett -> nur das location-`include` greift. locations ohne eigenes add_header erhalten die
# Header ausschliesslich ueber das server-`include`. Pro Response greift also genau EIN Level.

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# CSP-Haertung (G16): 'unsafe-inline' aus script-src ENTFERNT - der Production-Build enthaelt
# keine Inline-Scripts (Entry ist externes Modul, PWA-SW-Registrierung ueber gebundeltes JS,
# offline.html nutzt ausgelagertes /offline.js). style-src 'unsafe-inline' MUSS bleiben: React
# setzt Inline-Styles (style={{...}}) und Swagger-UI benoetigt Inline-CSS. base-uri 'self' +
# object-src 'none' als zusaetzliche Haertung gegen Base-Tag-Injection bzw. Object-Einbettung.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'self'; base-uri 'self'; object-src 'none';" always;

add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
