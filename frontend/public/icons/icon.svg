<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="100%" style="stop-color:#2d7dd2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg-gradient)"/>

  <!-- Document Stack (3 Documents) -->
  <!-- Back Document -->
  <rect x="130" y="100" width="260" height="340" rx="12" fill="#3a3a3a" transform="rotate(-3 260 270)"/>

  <!-- Middle Document -->
  <rect x="130" y="100" width="260" height="340" rx="12" fill="#4a4a4a" transform="rotate(2 260 270)"/>

  <!-- Front Document -->
  <rect x="130" y="100" width="260" height="340" rx="12" fill="#ffffff"/>

  <!-- Document Lines (Text representation) -->
  <rect x="160" y="140" width="140" height="12" rx="3" fill="#e0e0e0"/>
  <rect x="160" y="165" width="200" height="8" rx="2" fill="#d0d0d0"/>
  <rect x="160" y="185" width="180" height="8" rx="2" fill="#d0d0d0"/>
  <rect x="160" y="205" width="190" height="8" rx="2" fill="#d0d0d0"/>
  <rect x="160" y="225" width="160" height="8" rx="2" fill="#d0d0d0"/>

  <!-- OCR Scanning Beam -->
  <rect x="150" y="280" width="220" height="4" rx="2" fill="url(#accent-gradient)">
    <animate attributeName="y" values="280;380;280" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Check Mark Badge -->
  <circle cx="380" cy="380" r="60" fill="url(#accent-gradient)"/>
  <path d="M350 380 L370 400 L410 350" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
