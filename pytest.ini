[pytest]
# Pytest Configuration fuer Ablage-System
# Created: 2026-02-07
# G5 (2026-06-03): Marker-Vervollstaendigung fuer --strict-markers + Collection-Hygiene.
#   pytest.ini hat Vorrang vor pyproject.toml [tool.pytest.ini_options]
#   (pytest meldet beim Start: "ignoring pytest config in pyproject.toml").
#   Daher muessen ALLE real genutzten Marker hier registriert sein, sonst
#   bricht --strict-markers bestehende Tests (z.B. @pytest.mark.security).

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Nur den tests/-Baum sammeln. Verhindert, dass scripts/test_*.py (z.B.
# scripts/test_paddleocr_3.3.2_init.py) als Test gesammelt wird und die
# Collection mit einem Import-Error abbricht.
testpaths = tests

# Markers (vollstaendige Liste, da --strict-markers aktiv ist).
# owasp_a01..a10, pii_gdpr, multi_tenant werden zusaetzlich in
# tests/security/conftest.py registriert.
markers =
    unit: Unit tests (schnell, keine externen Abhaengigkeiten)
    integration: Integration tests (benoetigen Datenbank/Redis)
    real_db: Integrationstests gegen echtes Postgres (Schema selbst via create_all gebaut)
    contract: API contract tests (OpenAPI-Kompatibilitaet)
    e2e: End-to-End tests (vollstaendiger System-Stack)
    slow: Langsame Tests (>5s)
    gpu: Tests die GPU benoetigen
    asyncio: Asynchrone Tests (pytest-asyncio)
    api: API-Endpoint Tests
    performance: Performance-Tests
    ml: Machine-Learning-bezogene Tests
    security: Security-/OWASP-Tests
    multi_tenant: Multi-Tenant-Isolations-Tests
    isolation: Mandanten-Isolations-Tests
    chaos: Chaos-Engineering Tests (Fault Injection)
    docker: Docker-Container-Health Tests
    critical: Kritische Service-Tests (muessen bestehen)
    connectivity: Service-Connectivity Tests
    prometheus: Prometheus-Target Tests
    logs: Container-Log-Scanning Tests
    metrics: Backend-Metrics Tests
    database: Tests die eine Datenbank benoetigen
    redis: Tests die Redis benoetigen
    minio: Tests die MinIO benoetigen
    pipeline: Pipeline-/Orchestrierungs-Tests
    services: Service-Layer Tests
    datev: DATEV-Integrationstests
    banking: Banking-/FinTS-Tests
    gdpr: GDPR-/DSGVO-Compliance Tests
    benchmark: Benchmark-Tests
    windows: Windows-spezifische Tests
    fallback: GPU-Fallback-Szenario Tests
    experimental: Experimentelle Features unter Evaluierung
    gpu_required: Tests die GPU erfordern (skip ohne GPU)
    gpu_optional: GPU-Tests (skip ohne GPU)
    concurrent: Nebenlaeufigkeits-/Locking-Tests

# Test output
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    --ignore=tests/_archived

# Async support
asyncio_mode = auto

# Coverage
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
