[pytest]
# Pytest Configuration fuer Ablage-System
# Created: 2026-02-07

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests (schnell, keine externen Abhaengigkeiten)
    integration: Integration tests (benoetigen Datenbank/Redis)
    contract: API contract tests (OpenAPI-Kompatibilitaet)
    e2e: End-to-End tests (vollstaendiger System-Stack)
    slow: Langsame Tests (>5s)
    gpu: Tests die GPU benoetigen

# Test output
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# Async support
asyncio_mode = auto

# Coverage
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
