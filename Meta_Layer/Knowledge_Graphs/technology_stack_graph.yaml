# ============================================================================
# Technology Selection Criteria
# ============================================================================

selection_criteria:
  performance:
    priority: "high"
    requirements:
      - "API response time p95 < 500ms"
      - "OCR processing < 3s per page (GPU)"
      - "Database queries < 100ms"
      - "GPU VRAM efficiency > 85%"

  security:
    priority: "critical"
    requirements:
      - "No known CVEs with CVSS > 7.0"
      - "Active security maintenance"
      - "GDPR compliance support"
      - "TLS 1.3 support"

  maintainability:
    priority: "high"
    requirements:
      - "Active development (commits in last 3 months)"
      - "LTS version available"
      - "Good documentation"
      - "Large community"

  german_support:
    priority: "critical"
    requirements:
      - "UTF-8 support (umlaut compatibility)"
      - "German NLP libraries available"
      - "Date/number format support (DD.MM.YYYY, 1.234,56)"
      - "Fraktur font support (OCR)"

# ============================================================================
# Upgrade Path
# ============================================================================

upgrade_strategy:
  minor_versions:
    frequency: "monthly"
    process:
      - "Review changelog"
      - "Test in development"
      - "Deploy to staging"
      - "Monitor for 48 hours"
      - "Deploy to production"

  major_versions:
    frequency: "quarterly (if needed)"
    process:
      - "Comprehensive testing"
      - "Migration plan"
      - "Rollback plan"
      - "User communication"
      - "Staged rollout"

  security_patches:
    frequency: "immediate (within 24h)"
    process:
      - "Assess severity"
      - "Apply patch"
      - "Quick smoke test"
      - "Deploy to production"
      - "Monitor"

# ============================================================================
# Alternative Technologies (Evaluated but Not Selected)
# ============================================================================

alternatives:
  web_framework:
    - name: "Django"
      pros: ["Batteries included", "ORM", "Admin interface"]
      cons: ["Heavier", "Less async-friendly", "Slower than FastAPI"]
      rejected_reason: "FastAPI better suited for async OCR processing"

    - name: "Flask"
      pros: ["Lightweight", "Flexible", "Large ecosystem"]
      cons: ["No async by default", "Less type safety", "Manual setup"]
      rejected_reason: "Lacks built-in async and type safety of FastAPI"

  database:
    - name: "MySQL"
      pros: ["Popular", "Good performance", "Replication"]
      cons: ["Weaker JSONB support", "Less advanced features"]
      rejected_reason: "PostgreSQL better for complex queries and pgvector"

    - name: "MongoDB"
      pros: ["Flexible schema", "Horizontal scaling"]
      cons: ["Eventual consistency", "No ACID by default", "Overkill"]
      rejected_reason: "Document structure well-defined, ACID required"

  task_queue:
    - name: "RQ (Redis Queue)"
      pros: ["Simple", "Redis-based", "Easy setup"]
      cons: ["Less features", "No rate limiting", "Limited monitoring"]
      rejected_reason: "Celery more feature-rich for complex workflows"

  object_storage:
    - name: "AWS S3"
      pros: ["Highly reliable", "Global CDN", "Feature-rich"]
      cons: ["Cloud dependency", "Costs", "Data residency"]
      rejected_reason: "On-premises requirement, GDPR data residency"

