# ============================================================================
# Technology Decisions & Rationale
# ============================================================================

decisions:
  why_fastapi:
    reason: "Async/await support, automatic OpenAPI docs, high performance"
    alternatives_considered: ["Flask", "Django"]

  why_postgresql:
    reason: "ACID compliance, pgvector for embeddings, proven reliability"
    alternatives_considered: ["MySQL", "MongoDB"]

  why_redis:
    reason: "High-performance caching, message broker for Celery, session storage"
    alternatives_considered: ["Memcached", "RabbitMQ"]

  why_minio:
    reason: "S3-compatible, on-premises, encryption support"
    alternatives_considered: ["AWS S3", "Local filesystem"]

  why_pytorch:
    reason: "Industry standard for ML, excellent GPU support, model ecosystem"
    alternatives_considered: ["TensorFlow", "JAX"]

  why_docker:
    reason: "Consistent environments, easy deployment, GPU passthrough support"
    alternatives_considered: ["Podman", "Native deployment"]

  why_ruff:
    reason: "10-100x faster than alternatives, replaces multiple tools"
    alternatives_considered: ["Black + isort + flake8"]

