## Implementation Code

configuration_code: |
  ```python
  # app/services/gpu_batch_optimizer.py

  import torch
  from typing import List, Tuple
  from dataclasses import dataclass

  @dataclass
  class GPUBatchConfig:
      """Configuration for dynamic GPU batch processing."""

      vram_threshold: float = 0.85  # 85% of 16GB = 13.6GB
      min_batch_size: int = 2
      max_batch_size: int = 16
      adjustment_factor: float = 0.5  # Reduce by 50% on high VRAM
      gradient_checkpointing: bool = True

      complexity_batch_limits: dict = None

      def __post_init__(self):
          if self.complexity_batch_limits is None:
              self.complexity_batch_limits = {
                  "simple": 16,
                  "medium": 8,
                  "complex": 4
              }


  class ComplexityPredictor:
      """Predict document complexity for batch size optimization."""

      @staticmethod
      def predict(document: Document) -> str:
          """
          Predict document complexity using heuristics.

          Returns: "simple", "medium", or "complex"
          """
          score = 0

          # Factor 1: Page count
          if document.page_count > 3:
              score += 2

          # Factor 2: Tables detected
          if document.has_tables:
              score += 2

          # Factor 3: Multi-column layout
          if document.has_multi_column:
              score += 1

          # Factor 4: Image quality
          if document.scan_quality == "low":
              score += 1

          # Factor 5: Text density
          if document.text_density == "high":
              score += 1

          # Classification
          if score <= 1:
              return "simple"
          elif score <= 3:
              return "medium"
          else:
              return "complex"


  class DynamicBatchProcessor:
      """GPU batch processor with dynamic sizing."""

      def __init__(self, config: GPUBatchConfig):
          self.config = config
          self.complexity_predictor = ComplexityPredictor()
          self.current_batch_size = config.min_batch_size

      def get_optimal_batch_size(
          self,
          documents: List[Document]
      ) -> int:
          """Calculate optimal batch size based on complexity and VRAM."""

          # Check available VRAM
          if torch.cuda.is_available():
              total_vram = torch.cuda.get_device_properties(0).total_memory
              used_vram = torch.cuda.memory_allocated()
              available_vram = total_vram - used_vram
              vram_usage_ratio = used_vram / total_vram
          else:
              return self.config.min_batch_size

          # Predict document complexity
          complexities = [
              self.complexity_predictor.predict(doc)
              for doc in documents[:self.config.max_batch_size]
          ]

          # Get most conservative complexity in batch
          if "complex" in complexities:
              max_batch = self.config.complexity_batch_limits["complex"]
          elif "medium" in complexities:
              max_batch = self.config.complexity_batch_limits["medium"]
          else:
              max_batch = self.config.complexity_batch_limits["simple"]

          # Adjust for VRAM pressure
          if vram_usage_ratio > self.config.vram_threshold:
              max_batch = max(
                  self.config.min_batch_size,
                  int(max_batch * self.config.adjustment_factor)
              )

          # Clamp to configured limits
          batch_size = max(
              self.config.min_batch_size,
              min(max_batch, self.config.max_batch_size, len(documents))
          )

          return batch_size

      async def process_documents(
          self,
          documents: List[Document]
      ) -> List[OCRResult]:
          """Process documents with dynamic batching."""

          results = []
          i = 0

          while i < len(documents):
              # Get optimal batch size
              batch_size = self.get_optimal_batch_size(documents[i:])

              # Extract batch
              batch = documents[i:i + batch_size]

              # Process batch
              try:
                  batch_results = await self._process_batch(batch)
                  results.extend(batch_results)
                  i += batch_size

              except torch.cuda.OutOfMemoryError:
                  # Fallback: Reduce batch size
                  logger.warning(
                      "gpu_oom_reducing_batch",
                      current_batch=batch_size,
                      new_batch=max(1, batch_size // 2)
                  )

                  # Retry with smaller batch
                  batch_size = max(1, batch_size // 2)
                  batch = documents[i:i + batch_size]
                  batch_results = await self._process_batch(batch)
                  results.extend(batch_results)
                  i += batch_size

          return results


  # Production configuration (Test D - Winning Config)
  PRODUCTION_CONFIG = GPUBatchConfig(
      vram_threshold=0.85,
      min_batch_size=2,
      max_batch_size=16,
      adjustment_factor=0.5,
      gradient_checkpointing=True,
      complexity_batch_limits={
          "simple": 16,
          "medium": 8,
          "complex": 4
      }
  )
  ```

