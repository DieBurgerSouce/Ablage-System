## Experiment Design

### Test Conditions

test_groups:
  control:
    name: "Fixed Batch Size (Baseline)"
    batch_size: 4
    configuration: "Production settings (unchanged)"
    sample_size: 1000

  test_a:
    name: "Dynamic Batch Sizing (Conservative)"
    batch_size: "dynamic (2-8)"
    strategy: "Conservative VRAM threshold (70%)"
    configuration:
      vram_threshold: 0.70  # 11.2GB
      min_batch: 2
      max_batch: 8
      adjustment_factor: 0.8  # Reduce batch by 20% on high VRAM
    sample_size: 1000

  test_b:
    name: "Dynamic Batch Sizing (Aggressive)"
    batch_size: "dynamic (4-12)"
    strategy: "Aggressive VRAM threshold (85%)"
    configuration:
      vram_threshold: 0.85  # 13.6GB
      min_batch: 4
      max_batch: 12
      adjustment_factor: 0.5  # Reduce batch by 50% on high VRAM
    sample_size: 1000

  test_c:
    name: "Gradient Checkpointing + Dynamic Batch"
    batch_size: "dynamic (4-16)"
    strategy: "Aggressive with memory optimization"
    configuration:
      vram_threshold: 0.85
      min_batch: 4
      max_batch: 16
      gradient_checkpointing: true  # Trade compute for memory
      adjustment_factor: 0.5
    sample_size: 1000

  test_d:
    name: "Complexity-Aware Dynamic Batch"
    batch_size: "dynamic (2-16)"
    strategy: "Document complexity heuristics"
    configuration:
      vram_threshold: 0.85
      min_batch: 2
      max_batch: 16
      gradient_checkpointing: true
      complexity_factors:
        simple: 16  # Max batch for simple docs
        medium: 8   # Max batch for medium complexity
        complex: 4  # Max batch for complex docs
      adjustment_factor: 0.5
    sample_size: 1000

