# ============================================================================
# Model Selection Logic
# ============================================================================

selection_criteria:
  deepseek_janus_pro:
    triggers:
      - condition: "has_handwriting == true"
        priority: 1
      - condition: "has_complex_layout == true"
        priority: 1
      - condition: "has_tables AND has_images"
        priority: 2
      - condition: "document_age > 50_years"
        priority: 1

    requirements:
      - "available_vram_gb >= 12"
      - "gpu_available == true"

  got_ocr_2:
    triggers:
      - condition: "is_standard_invoice == true"
        priority: 1
      - condition: "is_contract == true"
        priority: 2
      - condition: "clean_printed_text == true"
        priority: 1
      - condition: "batch_processing == true"
        priority: 1

    requirements:
      - "available_vram_gb >= 10"
      - "gpu_available == true"

  surya_docling:
    triggers:
      - condition: "has_complex_tables == true"
        priority: 1
      - condition: "layout_extraction_required == true"
        priority: 1
      - condition: "gpu_unavailable == true"
        priority: 1
      - condition: "cpu_only_mode == true"
        priority: 1

    requirements:
      - "min_ram_gb >= 8"

