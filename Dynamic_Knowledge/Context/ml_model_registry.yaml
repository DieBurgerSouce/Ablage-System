# ============================================================================
# Model Versioning & Rollback
# ============================================================================

version_history:
  deepseek_janus_pro:
    current: "1.0"
    previous:
      - version: "0.9-beta"
        decommissioned: "2025-01-15"
        reason: "Upgraded to stable release"

  got_ocr_2:
    current: "2.0"
    previous:
      - version: "1.0"
        decommissioned: "2024-12-01"
        reason: "Improved accuracy by 15%"

rollback_procedures:
  enabled: true
  max_rollback_versions: 2
  rollback_triggers:
    - "accuracy_drop > 5%"
    - "error_rate_increase > 3x"
    - "critical_bug_detected"

# ============================================================================
# Model Health Monitoring
# ============================================================================

health_checks:
  frequency: "every_hour"

  checks:
    - check: "model_accuracy_baseline"
      threshold: "> 95%"
      action: "alert_if_below"

    - check: "inference_time_regression"
      threshold: "< 2x_baseline"
      action: "alert_if_above"

    - check: "gpu_oom_rate"
      threshold: "< 1%"
      action: "alert_if_above"

    - check: "model_files_integrity"
      method: "checksum_validation"
      action: "alert_if_corrupted"

# ============================================================================
# Deployment Configuration
# ============================================================================

deployment:
  strategy: "canary"
  canary_traffic_percent: 10
  rollout_duration: "7_days"

  environments:
    production:
      models_loaded: ["deepseek_janus_pro", "got_ocr_2", "surya_docling"]
      auto_scaling: true
      max_replicas: 5

    staging:
      models_loaded: ["deepseek_janus_pro", "got_ocr_2"]
      auto_scaling: false

    development:
      models_loaded: ["got_ocr_2"]
      auto_scaling: false

