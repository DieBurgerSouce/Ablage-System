# Fraktur Font Handling

fraktur_libraries:
  - name: "Tesseract OCR (Fraktur)"
    url: "https://github.com/tesseract-ocr/tesseract"
    description: "Open-source OCR with Fraktur support"
    language_data: "deu_frak.traineddata"
    installation: |
      # Ubuntu
      sudo apt-get install tesseract-ocr tesseract-ocr-deu
      sudo apt-get install tesseract-ocr-script-frak
    usage: |
      import pytesseract
      from PIL import Image

      # Configure for Fraktur
      custom_config = r'--oem 3 --psm 6 -l deu_frak'
      image = Image.open('historical_document.jpg')
      text = pytesseract.image_to_string(image, config=custom_config)
    rating: 4
    used_in_production: false
    notes: "Good for pure Fraktur. Our DeepSeek model handles mixed Fraktur/Antiqua better."

  - name: "Kraken OCR"
    url: "https://github.com/mittagessen/kraken"
    description: "OCR system specialized in historical documents"
    features:
      - "Layout analysis"
      - "Fraktur recognition"
      - "Custom model training"
    models:
      - "fraktur.mlmodel" (German Fraktur)
    usage: |
      from kraken import binarization, pageseg, rpred
      from PIL import Image

      im = Image.open('fraktur.jpg')
      # Binarize and segment
      im = binarization.nlbin(im)
      seg = pageseg.segment(im)
      # Recognize with Fraktur model
      model = rpred.load_model('fraktur.mlmodel')
      pred = rpred.rpred(model, im, seg)
    rating: 4
    used_in_production: false
    notes: "Excellent for pure historical documents. Overkill for modern mixed documents."

fraktur_fonts:
  - name: "UnifrakturMaguntia"
    url: "https://fonts.google.com/specimen/UnifrakturMaguntia"
    description: "OpenType Fraktur font with full Unicode coverage"
    license: "SIL Open Font License"
    use_case: "Rendering Fraktur text in UI"
    rating: 5
    notes: "Beautiful Fraktur font. Use for displaying historical documents."

  - name: "Fette Fraktur"
    url: "https://fonts.google.com/specimen/Fette+Fraktur"
    description: "Bold Fraktur display font"
    license: "SIL Open Font License"
    rating: 4

fraktur_character_mappings:
  description: "Fraktur to modern German character mappings"
  unicode_ranges:
    - "U+1E9E: Latin Capital Letter Sharp S (ẞ)"
    - "U+00DF: Latin Small Letter Sharp S (ß)"
  common_mappings:
    ſ: "s"  # Long s
    ẞ: "ß"  # Capital eszett
    Æ: "Ä"  # Sometimes used for Ä in Fraktur
  reference_implementation: "../../app/utils/german_text.py:normalize_german_text()"
  notes: "Our normalize_german_text() handles all these mappings automatically."

