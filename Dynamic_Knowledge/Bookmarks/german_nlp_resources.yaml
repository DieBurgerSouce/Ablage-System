# German Spell Checking

spell_checkers:
  - name: "pyspellchecker (German)"
    url: "https://github.com/barrust/pyspellchecker"
    description: "Pure Python spell checker with German dictionary"
    usage: |
      from spellchecker import SpellChecker

      spell = SpellChecker(language='de')

      # Find misspelled words
      misspelled = spell.unknown(['Hallo', 'Welt', 'Fehller'])
      # {'Fehller'}

      # Get correction
      print(spell.correction('Fehller'))
      # 'Fehler'

      # Get candidates
      print(spell.candidates('Fehller'))
      # {'Fehler', 'Fühler'}
    rating: 4
    used_in_production: true
    notes: "Good for post-OCR spell checking. Fast."

  - name: "LanguageTool"
    url: "https://languagetool.org/"
    description: "Open-source grammar and spell checker"
    features:
      - "Spell checking"
      - "Grammar checking"
      - "Style suggestions"
      - "German-specific rules (1000+)"
    api_usage: |
      import language_tool_python

      tool = language_tool_python.LanguageTool('de-DE')
      text = "Das ist ein Fehler Satz."
      matches = tool.check(text)

      for match in matches:
          print(match.message)
          print(match.replacements)
    rating: 5
    used_in_production: false
    notes: "Excellent but slow. Consider for batch processing."

  - name: "hunspell (German)"
    url: "http://hunspell.github.io/"
    description: "LibreOffice spell checker"
    dictionaries:
      - "de_DE.dic" (German Germany)
      - "de_AT.dic" (German Austria)
      - "de_CH.dic" (German Switzerland)
    rating: 4
    used_in_production: false
    notes: "Very comprehensive dictionary. C++ library (harder to integrate)."

