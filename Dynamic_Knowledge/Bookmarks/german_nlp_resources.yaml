# Date and Number Formatting

german_date_formats:
  description: "German date format handling"
  standard_format: "DD.MM.YYYY"
  examples:
    - "22.11.2025"
    - "1.1.2025" (single digit ok)
    - "22. November 2025" (month name)
  library: |
    from datetime import datetime
    import locale

    # Set German locale
    locale.setlocale(locale.LC_TIME, 'de_DE.UTF-8')

    # Parse German date
    date_str = "22. November 2025"
    date = datetime.strptime(date_str, "%d. %B %Y")
  notes: "Always use DD.MM.YYYY format in output. Parse all variants in input."

german_number_formats:
  description: "German number format handling"
  decimal_separator: ","
  thousands_separator: "."
  examples:
    - "1.234,56 €" (one thousand two hundred thirty-four euros and fifty-six cents)
    - "1.234.567,89" (million)
  library: |
    import locale

    # Set German locale
    locale.setlocale(locale.LC_NUMERIC, 'de_DE.UTF-8')

    # Format number
    amount = 1234.56
    formatted = locale.format_string("%.2f €", amount, grouping=True)
    # '1.234,56 €'

    # Parse German number
    german_str = "1.234,56"
    # Replace . with nothing, , with .
    number = float(german_str.replace('.', '').replace(',', '.'))
  notes: "Critical for invoice amounts. Test thoroughly."

