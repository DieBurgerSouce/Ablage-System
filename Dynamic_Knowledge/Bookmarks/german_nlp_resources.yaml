# German Text Preprocessing

preprocessing_libraries:
  - name: "custom german_text.py"
    url: "../../app/utils/german_text.py"
    description: "Our custom German text preprocessing"
    functions:
      - normalize_german_text() - NFC normalization, Fraktur mapping, ß handling
      - validate_umlauts() - Check umlaut accuracy
      - normalize_spaces() - Clean whitespace
      - remove_hyphenation() - Fix line breaks
    rating: 5
    used_in_production: true
    notes: "Core preprocessing pipeline. Battle-tested."

  - name: "text-unidecode"
    url: "https://github.com/kmike/text-unidecode"
    description: "Transliterate Unicode to ASCII"
    usage: |
      from text_unidecode import unidecode

      # Convert umlauts to ae, oe, ue
      unidecode("Müller") # 'Muller' (loses umlaut!)
    rating: 2
    used_in_production: false
    notes: "DO NOT USE for German! Destroys umlauts. Only for ASCII-only systems."

unicode_normalization:
  description: "Unicode normalization for German text"
  forms:
    NFC: "Canonical composition (use this)"
    NFD: "Canonical decomposition (ä = a + ̈)"
    NFKC: "Compatibility composition"
    NFKD: "Compatibility decomposition"
  recommendation: "Always use NFC for German text"
  usage: |
    import unicodedata

    text = "Müller"  # Might be NFD (decomposed)
    normalized = unicodedata.normalize('NFC', text)
  reference: "https://unicode.org/reports/tr15/"
  rating: 5
  notes: "Critical for consistent text comparison."

