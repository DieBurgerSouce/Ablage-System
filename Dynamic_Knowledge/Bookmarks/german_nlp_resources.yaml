# Named Entity Recognition (NER)

german_ner_tools:
  - name: "Flair NER (German)"
    url: "https://github.com/flairNLP/flair"
    description: "State-of-the-art NER library with pre-trained German models"
    models:
      - "flair/ner-german-large" (4-class NER)
      - "flair/ner-german" (standard)
    performance:
      conll_2003_f1: 92.31
    usage: |
      from flair.data import Sentence
      from flair.models import SequenceTagger

      tagger = SequenceTagger.load("flair/ner-german-large")
      sentence = Sentence("George Washington ging nach Washington.")
      tagger.predict(sentence)

      for entity in sentence.get_spans('ner'):
          print(entity.text, entity.tag, entity.score)
    rating: 5
    used_in_production: true
    notes: "Best German NER accuracy. Slower than spaCy but more accurate."

  - name: "GermaNER"
    url: "https://github.com/tudarmstadt-lt/GermaNER"
    description: "German NER with CRF (TU Darmstadt)"
    features:
      - "Rule-based + statistical"
      - "Handles compound nouns"
      - "German-specific features"
    rating: 3
    used_in_production: false
    notes: "Outdated. Flair and spaCy are better."

