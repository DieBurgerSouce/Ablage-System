# German Tokenization

tokenizers:
  - name: "spaCy Tokenizer"
    url: "https://spacy.io/api/tokenizer"
    description: "Rule-based tokenizer with German-specific rules"
    features:
      - "Handles German compound words"
      - "Umlauts preserved"
      - "Abbreviation detection (z.B., u.a., etc.)"
    usage: |
      import spacy
      nlp = spacy.load("de_core_news_lg")
      doc = nlp("Das ist ein Beispiel-Satz mit Bindestrichen.")
      tokens = [token.text for token in doc]
    rating: 5
    used_in_production: true

  - name: "SoMaJo"
    url: "https://github.com/tsproisl/SoMaJo"
    description: "State-of-the-art German tokenizer"
    features:
      - "Sentence splitting"
      - "Tokenization"
      - "Abbreviation handling"
      - "URL/email detection"
    usage: |
      from somajo import SoMaJo

      tokenizer = SoMaJo("de_CMC", xml_sentences=False)
      text = "Das ist ein Satz. Und hier kommt der nächste!"
      sentences = tokenizer.tokenize_text([text])

      for sentence in sentences:
          for token in sentence:
              print(token.text)
    rating: 4
    used_in_production: false
    notes: "More accurate than spaCy for edge cases. Slower."

compound_word_splitting:
  - name: "CharSplit"
    url: "https://github.com/dtuggener/CharSplit"
    description: "German compound word splitter"
    examples:
      - "Donaudampfschifffahrtskapitän → Donau dampf schiff fahrt kapitän"
      - "Rindfleischetikettierungsüberwachungsaufgabenübertragungsgesetz → ..."
    usage: |
      from charsplit import Splitter

      splitter = Splitter()
      print(splitter.split_compound("Bundeskanzler"))
      # ['Bundes', 'kanzler']
    rating: 4
    used_in_production: false
    notes: "Useful for search. Not needed for OCR."

