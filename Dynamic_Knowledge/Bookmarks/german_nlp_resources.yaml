# German Language Models

spacy_models:
  - name: "de_core_news_lg"
    url: "https://spacy.io/models/de#de_core_news_lg"
    version: "3.7.0"
    size: "546 MB"
    description: "Large German model with word vectors, POS tagging, dependency parsing, NER"
    components:
      - tok2vec
      - morphologizer
      - parser
      - lemmatizer
      - attribute_ruler
      - ner
    entities:
      - PER (Person)
      - LOC (Location)
      - ORG (Organization)
      - MISC (Miscellaneous)
    performance:
      ner_accuracy: 85.43
      pos_accuracy: 98.27
      dep_accuracy: 91.05
    usage: |
      import spacy
      nlp = spacy.load("de_core_news_lg")
      doc = nlp("Apple ist ein Technologieunternehmen aus Cupertino.")
      for ent in doc.ents:
          print(ent.text, ent.label_)
    rating: 5
    used_in_production: true
    notes: "Our primary NER model for German documents. Handles umlauts well."

  - name: "de_core_news_md"
