usage_notes: |
  Translation Guidelines:

  1. User-Facing Content: ALWAYS use German terms
     - Error messages: "Dokument nicht gefunden"
     - Button labels: "Hochladen", "Löschen"
     - Status messages: "Verarbeitung erfolgreich"

  2. Code & Technical Docs: Use English
     - Variable names: document_id, processing_status
     - Function names: process_document(), validate_invoice()
     - API endpoints: /api/v1/documents

  3. Mixed Contexts: Prioritize clarity
     - Log messages: "Processing failed for document {doc_id}: Validierung fehlgeschlagen"
     - Comments: Technical terms in English, explanations in German

  4. Acronyms: Keep original abbreviations
     - GDPR (not DSGVO in code)
     - API (not Schnittstelle)
     - GPU (not Grafikprozessor)

