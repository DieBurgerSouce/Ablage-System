# ============================================================================
# OCR & Document Processing Terms
# ============================================================================

ocr_terms:
  OCR:
    de: "Optische Zeichenerkennung"
    en: "Optical Character Recognition"
    abbreviation: "OCR"

  Texterkennung:
    de: "Texterkennung"
    en: "text recognition"
    context: "Process of identifying text in images"

  Vorverarbeitung:
    de: "Vorverarbeitung"
    en: "preprocessing"
    context: "Image preparation before OCR"

  Nachverarbeitung:
    de: "Nachverarbeitung"
    en: "post-processing"
    context: "Text refinement after OCR"

  Genauigkeit:
    de: "Genauigkeit"
    en: "accuracy"
    measurement: "percentage (0-100%)"

  Konfidenz:
    de: "Konfidenz / Vertrauenswert"
    en: "confidence"
    measurement: "score (0.0-1.0)"

  Stapelverarbeitung:
    de: "Stapelverarbeitung"
    en: "batch processing"

  Echtzeit-Verarbeitung:
    de: "Echtzeit-Verarbeitung"
    en: "real-time processing"

  Layouterkennung:
    de: "Layouterkennung"
    en: "layout detection"
    context: "Identifying document structure"

  Tabellenextraktion:
    de: "Tabellenextraktion"
    en: "table extraction"

  Handschrifterkennung:
    de: "Handschrifterkennung"
    en: "handwriting recognition"
    abbreviation: "HWR"

