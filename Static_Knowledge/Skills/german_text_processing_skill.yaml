# German Text Processing Skill
# Umlaut Validation, Business Terms, Text Normalization

metadata:
  skill_id: "german_text_processing"
  version: "1.0.0"
  category: "nlp"
  language: "de"
  dependencies: ["unicodedata", "spellchecker"]
  last_updated: "2025-01-22"

description: |
  Specialized German text processing for OCR output validation and normalization.
  Handles umlauts, Fraktur characters, business terms, and German-specific formats.

capabilities:
  - Umlaut detection and validation (ä, ö, ü, ß, Ä, Ö, Ü)
  - Business term recognition (35+ terms: GmbH, AG, etc.)
  - Fraktur to modern German character mapping
  - Date format validation (DD.MM.YYYY)
  - Currency format validation (1.234,56 €)
  - Unicode normalization (NFC)
  - German spell checking and correction

configuration:
  accuracy_requirements:
    umlaut_accuracy_percent: 100
    business_term_recall_percent: 95
    date_format_compliance: "DD.MM.YYYY"
    currency_format: "1.234,56 €"

  supported_variants:
    - "Standard German (Deutschland)"
    - "Swiss German (Schweiz)"
    - "Austrian German (Österreich)"
    - "Historical German (Fraktur)"

business_terms:
  legal_entities:
    - "GmbH"  # Gesellschaft mit beschränkter Haftung
    - "AG"    # Aktiengesellschaft
    - "KG"    # Kommanditgesellschaft
    - "GbR"   # Gesellschaft bürgerlichen Rechts
    - "UG"    # Unternehmergesellschaft
    - "e.V."  # eingetragener Verein
    - "PartG" # Partnerschaftsgesellschaft

  document_types:
    - "Rechnung"
    - "Gutschrift"
    - "Lieferschein"
    - "Vertrag"
    - "Angebot"
    - "Bestellung"

  financial_terms:
    - "Umsatzsteuer"
    - "Mehrwertsteuer"
    - "Netto"
    - "Brutto"
    - "Skonto"
    - "Zahlungsziel"

  identifiers:
    - "Steuernummer"
    - "USt-IdNr"
    - "Handelsregisternummer"
    - "HRB"
    - "HRA"

  authorization:
    - "i.A."   # im Auftrag
    - "i.V."   # in Vertretung
    - "ppa."   # per procura
    - "gez."   # gezeichnet

usage_patterns:
  umlaut_validation:
    description: "Detect and validate German umlauts"
    code_reference: "app/german_validator.py:GermanValidator.validate_umlauts()"
    example: |
      from app.german_validator import GermanValidator

      validator = GermanValidator()

      text = "Müller GmbH, Straße 123"
      result = validator.validate_umlauts(text)

      print(f"Has umlauts: {result['has_umlauts']}")
      print(f"Umlaut count: {result['umlaut_count']}")
      print(f"Umlauts found: {result['umlauts_found']}")
      # Output: Has umlauts: True, Count: 2, Found: ['ü', 'ß']

  business_term_extraction:
    description: "Extract and validate German business terms"
    code_reference: "app/german_validator.py:GermanValidator.extract_business_terms()"
    example: |
      validator = GermanValidator()

      text = "Rechnung von Müller GmbH, USt-IdNr DE123456789"
      terms = validator.extract_business_terms(text)

      print(terms)
      # Output: ['Rechnung', 'GmbH', 'USt-IdNr']

  text_normalization:
    description: "Normalize German text for processing"
    code_reference: "app/utils/german_text.py:normalize_german_text()"
    example: |
      import unicodedata

      def normalize_german_text(text: str) -> str:
          # NFC normalization (composed form)
          text = unicodedata.normalize('NFC', text)

          # Fraktur to modern mapping
          fraktur_map = {
              '\u1E9E': 'ß',  # Capital ß
              '\uA758': 'Q',  # Fraktur Q
              '\uA759': 'q',  # Fraktur q
          }
          for old, new in fraktur_map.items():
              text = text.replace(old, new)

          return text

      text = normalize_german_text("Müſler GmbH")  # ſ = long s
      print(text)  # Output: "Müßler GmbH"

  date_validation:
    description: "Validate German date format (DD.MM.YYYY)"
    code_reference: "app/german_validator.py:GermanValidator.validate_date_format()"
    example: |
      import re
      from datetime import datetime

      def validate_german_date(date_str: str) -> bool:
          pattern = r'\d{2}\.\d{2}\.\d{4}'
          if not re.match(pattern, date_str):
              return False

          try:
              datetime.strptime(date_str, '%d.%m.%Y')
              return True
          except ValueError:
              return False

      print(validate_german_date("31.12.2024"))  # True
      print(validate_german_date("12/31/2024"))  # False

  currency_validation:
    description: "Validate German currency format"
    code_reference: "app/german_validator.py:GermanValidator.validate_currency_format()"
    example: |
      import re

      def validate_german_currency(amount_str: str) -> bool:
          # Pattern: 1.234,56 € or 1234,56€
          pattern = r'^\d{1,3}(\.\d{3})*,\d{2}\s*€?$'
          return bool(re.match(pattern, amount_str))

      print(validate_german_currency("1.234,56 €"))  # True
      print(validate_german_currency("1,234.56"))    # False

best_practices:
  - name: "Always normalize to NFC before processing"
    rationale: "Consistent Unicode representation prevents matching issues"
    code: |
      import unicodedata
      text = unicodedata.normalize('NFC', text)

  - name: "Use fuzzy matching for business terms"
    rationale: "OCR may introduce small errors (e.g., 'GrnbH' → 'GmbH')"
    code: |
      from fuzzywuzzy import fuzz
      if fuzz.ratio("GrnbH", "GmbH") > 90:
          # Likely a match

  - name: "Validate 100% umlaut accuracy"
    rationale: "Critical for German business documents"

  - name: "Handle regional variants"
    rationale: "Swiss uses 'ss' instead of 'ß'"

common_ocr_errors:
  umlauts:
    - error: "ü → ii"
      example: "Müller → Miiller"
      fix: "Pattern matching + dictionary lookup"

    - error: "ä → ae (historically correct but not modern)"
      example: "Bär → Baer"
      fix: "Context-based replacement"

    - error: "ß → B or ss"
      example: "Straße → StraBe or Strasse"
      fix: "ß detection pattern + validation"

  business_terms:
    - error: "GmbH → GrnbH (m → rn)"
      fix: "Fuzzy matching with 90% threshold"

    - error: "i.A. → i.fl. (A → fl ligature)"
      fix: "Known abbreviation list + Levenshtein distance"

validation_rules:
  umlaut_check:
    rule: "All umlauts must be correctly represented"
    severity: "critical"
    action: "Flag for manual review if < 100% confidence"

  business_term_check:
    rule: "Recognize at least 95% of known business terms"
    severity: "high"
    action: "Use fuzzy matching for near-misses"

  date_format_check:
    rule: "Dates must be in DD.MM.YYYY format"
    severity: "medium"
    action: "Convert from other formats if detected"

  currency_check:
    rule: "Currency amounts in German format (1.234,56 €)"
    severity: "high"
    action: "Parse and normalize"

