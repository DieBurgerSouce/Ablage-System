      phone: "+49-xxx-xxxxxxx"

    - role: "System Administrator"
      contact: "sysadmin@company.de"
      phone: "+49-xxx-xxxxxxx"

    - role: "Backup Service Provider"
      contact: "support@backup-provider.de"
      phone: "+49-xxx-xxxxxxx"

