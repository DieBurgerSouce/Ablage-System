testing:
  unit_tests:
    description: "Test error handling logic"
    example: |
      import pytest
      from app.exceptions import ValidationError, OCRProcessingError

      @pytest.mark.asyncio
      async def test_validation_error_response():
          """Test validation error returns 400 with correct format."""

          # Simulate validation error
          with pytest.raises(ValidationError) as exc_info:
              await validate_document_upload(
                  filename="test.exe",  # Invalid extension
                  file_size=100 * 1024 * 1024  # Too large
              )

          error = exc_info.value
          assert error.status_code == 400
          assert error.error_code == "VALIDATION_ERROR"
          assert "Dateityp" in error.message

      @pytest.mark.asyncio
      async def test_retry_with_backoff():
          """Test retry logic with exponential backoff."""

          call_count = 0

          @retry_with_backoff(max_retries=3, initial_delay=0.1)
          async def flaky_function():
              nonlocal call_count
              call_count += 1
              if call_count < 3:
                  raise DatabaseError("Connection failed", "DB_CONNECTION_ERROR")
              return "success"

          result = await flaky_function()
          assert result == "success"
          assert call_count == 3  # Failed twice, succeeded on third

