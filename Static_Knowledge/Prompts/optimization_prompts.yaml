# German Text Processing Optimization
# ============================================================================

german_text_optimization:
  optimize_umlaut_processing:
    prompt: |
      Optimize this German text processing for better performance and accuracy:

      ```python
      {PASTE_CODE}
      ```

      Context:
      - Processing volume: {VOLUME} documents/hour
      - Each document: ~{PAGES} pages
      - Current accuracy: {ACCURACY}%
      - Target accuracy: > {TARGET_ACCURACY}%

      Please suggest:
      1. Faster German umlaut detection/correction
      2. Efficient pattern matching for German terms
      3. Caching opportunities for frequently processed terms
      4. Batch processing strategies

