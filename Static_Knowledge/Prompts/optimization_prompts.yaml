# Testing for Performance
# ============================================================================

performance_testing:
  create_load_test:
    prompt: |
      Create a load test for this endpoint using Locust:

      Endpoint: {METHOD} {PATH}
      Request body: {REQUEST_BODY_EXAMPLE}

      Test scenarios:
      - Normal load: {NORMAL_USERS} concurrent users
      - Peak load: {PEAK_USERS} concurrent users
      - Stress test: {STRESS_USERS} concurrent users

      Please generate:
      1. Complete Locust test file
      2. Realistic user behavior simulation
      3. Performance assertions (response time thresholds)
      4. Instructions to run the test

