# Notes

operational_notes: |
  - Health checks run continuously in background
  - Auto-recovery attempts should be transparent to users
  - All recovery actions are logged for audit
  - Critical failures always trigger alerts
  - Test escalation policies quarterly
  - Update PagerDuty schedules monthly
  - Review and tune thresholds based on production metrics

tuning_guidelines: |
  - Adjust health check frequency based on component criticality
  - Tune alert thresholds to reduce noise (target < 5 false positives/week)
  - Monitor auto-recovery success rate (target > 95%)
  - Review escalation delays based on MTTR (Mean Time To Resolution)
  - Update dashboards based on team feedback
