# Error Recovery Decision Tree

metadata:
  title: "Error Recovery Decision Tree"
  version: "1.5"
  last_updated: "2025-01-22"
  maintained_by: "DevOps Team, Backend Team"
  status: "production"
  related_documents:
    - "../../Meta_Layer/Indexes/troubleshooting_index.yaml"
    - "../../Dynamic_Knowledge/Logs/celery_worker_crash_log.md"
    - "../../Dynamic_Knowledge/Learnings/celery_task_optimization.md"

description: |
  Decision tree for automatic error recovery in the Ablage-System. This tree defines
  which errors are retryable, which require manual intervention, and which can be
  automatically recovered through fallback strategies.

  Implements resilience patterns: retry with exponential backoff, circuit breaker,
  graceful degradation, and failover.

# Root Node: Error Detected
root:
  node_id: "ERROR_DETECTED"
  question: "What type of error occurred?"
  type: "decision_tree_root"
  next: "CLASSIFY_ERROR"

# Decision Tree Structure
decision_tree:
  # ==========================================
  # Level 1: Error Classification
  # ==========================================

  CLASSIFY_ERROR:
    node_id: "CLASSIFY_ERROR"
    question: "What is the error category?"
    description: |
      Categorize errors into broad classes to determine recovery strategy.
      Different error types have different retry/recovery characteristics.

    error_categories:
      gpu_errors:
        examples:
          - "torch.cuda.OutOfMemoryError"
          - "CUDA error: device-side assert triggered"
          - "RuntimeError: CUDA out of memory"
        characteristics: "Usually transient, recoverable with smaller batch or CPU fallback"
        next: "HANDLE_GPU_ERROR"

      network_errors:
        examples:
          - "redis.exceptions.ConnectionError"
          - "psycopg.OperationalError: connection refused"
          - "requests.exceptions.ConnectionError"
        characteristics: "Transient, retry with exponential backoff"
        next: "HANDLE_NETWORK_ERROR"

      celery_task_errors:
        examples:
          - "celery.exceptions.TaskRevokedError"
          - "celery.exceptions.SoftTimeLimitExceeded"
          - "celery.exceptions.WorkerLostError"
        characteristics: "Task-specific, may require re-queuing"
        next: "HANDLE_CELERY_ERROR"

      validation_errors:
        examples:
          - "pydantic.ValidationError"
          - "ValueError: Invalid USt-IdNr format"
          - "InvalidDocumentFormatError"
        characteristics: "Permanent, not retryable, requires user action"
        next: "HANDLE_VALIDATION_ERROR"

      permission_errors:
        examples:
          - "PermissionError: Access denied"
          - "HTTPException: 403 Forbidden"
          - "AuthenticationError"
        characteristics: "Permanent, not retryable"
        next: "HANDLE_PERMISSION_ERROR"

      data_integrity_errors:
        examples:
          - "sqlalchemy.exc.IntegrityError"
          - "UniqueConstraintViolation"
          - "ForeignKeyViolation"
        characteristics: "Permanent, application logic error"
        next: "HANDLE_DATA_INTEGRITY_ERROR"

    metrics:
      classification_accuracy: "98.5%"
      misclassification_rate: "1.5%"

    code_reference: "app/core/error_handler.py:45-92"

  # ==========================================
  # GPU Error Recovery
  # ==========================================

  HANDLE_GPU_ERROR:
    node_id: "HANDLE_GPU_ERROR"
    question: "GPU error type and recovery strategy?"
    description: |
      GPU errors are usually recoverable. Try multiple recovery strategies
      in order: reduce batch size → clear cache → CPU fallback.

    conditions:
      - condition: "error_type == 'OutOfMemoryError'"
        next: "GPU_OOM_RECOVERY"

      - condition: "error_type == 'CUDAError' AND 'device-side assert' in error_message"
        next: "GPU_ASSERT_RECOVERY"

      - condition: "error_type == 'RuntimeError' AND 'CUDA' in error_message"
        next: "GPU_RUNTIME_RECOVERY"

    code_reference: "app/core/error_handler.py:125-158"

  GPU_OOM_RECOVERY:
    node_id: "GPU_OOM_RECOVERY"
    type: "recovery_sequence"
    description: "Multi-step GPU OOM recovery with progressive fallback"

    recovery_steps:
      step_1:
        action: "Clear GPU cache"
        implementation: "torch.cuda.empty_cache(); gc.collect()"
        expected_recovery_rate: "25%"
        timeout_seconds: 5
        next_on_success: "RETRY_WITH_ORIGINAL_BATCH"
        next_on_failure: "step_2"

      step_2:
        action: "Reduce batch size by 50%"
        implementation: "batch_size = max(1, current_batch_size // 2)"
        expected_recovery_rate: "60%"
        next_on_success: "RETRY_WITH_REDUCED_BATCH"
        next_on_failure: "step_3"

      step_3:
        action: "Force batch size = 1 (single document)"
        implementation: "batch_size = 1"
        expected_recovery_rate: "85%"
        next_on_success: "RETRY_WITH_SINGLE_BATCH"
        next_on_failure: "step_4"

      step_4:
        action: "Fallback to CPU processing"
        implementation: "backend = 'surya_docling_cpu'"
        expected_recovery_rate: "100%"
        next_on_success: "RETRY_WITH_CPU"
        next_on_failure: "PERMANENT_FAILURE"  # Should never reach here

    monitoring:
      - "Log each recovery step attempted"
      - "Track recovery success rate by step"
      - "Alert if step_4 (CPU fallback) reached frequently (> 5% of requests)"

    code_reference: "app/services/gpu_error_recovery.py:78-145"

  GPU_ASSERT_RECOVERY:
    node_id: "GPU_ASSERT_RECOVERY"
    type: "recovery_action"
    description: "GPU device-side assert triggered - usually indicates data corruption"

    recovery_strategy:
      step_1:
        action: "Reset GPU device"
        implementation: "torch.cuda.synchronize(); torch.cuda.reset_peak_memory_stats()"
        success_rate: "40%"

      step_2:
        action: "Reload model from checkpoint"
        implementation: "model = load_model_from_checkpoint()"
        success_rate: "80%"

      step_3:
        action: "Restart Celery worker (via supervisor)"
        implementation: "supervisorctl restart ablage-worker"
        success_rate: "95%"

      step_4:
        action: "Manual intervention required"
        alert_severity: "critical"
        notification: "PagerDuty + Slack"

    code_reference: "app/services/gpu_error_recovery.py:189-224"

  # ==========================================
  # Network Error Recovery
  # ==========================================

  HANDLE_NETWORK_ERROR:
    node_id: "HANDLE_NETWORK_ERROR"
    question: "Network error - which service is unreachable?"
    description: |
      Network errors are transient. Use exponential backoff with jitter.
      Different services have different retry strategies.

    services:
      redis:
        max_retries: 5
        base_delay_seconds: 1
        max_delay_seconds: 60
        exponential_backoff: true
        jitter: true
        next: "RETRY_REDIS_CONNECTION"

      postgresql:
        max_retries: 3
        base_delay_seconds: 2
        max_delay_seconds: 30
        exponential_backoff: true
        jitter: true
        next: "RETRY_POSTGRESQL_CONNECTION"

      minio:
        max_retries: 4
        base_delay_seconds: 1
        max_delay_seconds: 45
        exponential_backoff: true
        jitter: true
        next: "RETRY_MINIO_CONNECTION"

    code_reference: "app/core/retry_policies.py:56-98"

  RETRY_REDIS_CONNECTION:
    node_id: "RETRY_REDIS_CONNECTION"
    type: "retry_with_backoff"
    description: "Retry Redis connection with exponential backoff"

    retry_config:
      max_retries: 5
      delay_formula: "min(base_delay * (2 ** attempt) + random(0, 1), max_delay)"
      base_delay: 1  # seconds
      max_delay: 60  # seconds

    retry_logic:
      attempt_1: "delay: 1-2s"
      attempt_2: "delay: 2-3s"
      attempt_3: "delay: 4-5s"
      attempt_4: "delay: 8-9s"
      attempt_5: "delay: 16-17s"
      all_failed: "next: CHECK_REDIS_HEALTH"

    success_action: "Resume normal operation"
    failure_action: "Switch to degraded mode (no caching)"

    code_reference: "app/core/retry_policies.py:145-178"

  CHECK_REDIS_HEALTH:
    node_id: "CHECK_REDIS_HEALTH"
    type: "health_check"
    description: "After failed retries, check if Redis is healthy"

    health_checks:
      - check: "Redis container running?"
        command: "docker ps | grep ablage-redis"
        auto_fix: "docker-compose restart redis"

      - check: "Redis port accessible?"
        command: "nc -zv localhost 6379"
        auto_fix: "Check firewall rules"

      - check: "Redis memory available?"
        command: "redis-cli INFO memory"
        auto_fix: "Flush old keys if > 90% memory"

    next_on_healthy: "RETRY_REDIS_CONNECTION"
    next_on_unhealthy: "ACTIVATE_DEGRADED_MODE_NO_CACHE"

    code_reference: "app/services/health_checker.py:234-278"

  ACTIVATE_DEGRADED_MODE_NO_CACHE:
    node_id: "ACTIVATE_DEGRADED_MODE_NO_CACHE"
    type: "graceful_degradation"
    description: "Operate without Redis caching"

    degradation_strategy:
      - "Disable session caching (use database for sessions)"
      - "Disable OCR result caching (direct database queries)"
      - "Disable rate limiting (no Redis, use in-memory fallback)"
      - "Alert DevOps team (Redis unavailable)"

    performance_impact:
      - "API latency: +200-500ms (database queries instead of cache)"
      - "Throughput: -20% (more database load)"
      - "User experience: Acceptable (slower but functional)"

    automatic_recovery:
      - "Health check Redis every 60 seconds"
      - "Auto-revert to normal mode when Redis recovers"

    alerting:
      severity: "warning"
      message: "Operating in degraded mode: Redis unavailable, caching disabled"
      channels: ["slack", "pagerduty"]

    code_reference: "app/core/degraded_mode.py:89-142"

  # ==========================================
  # Celery Task Error Recovery
  # ==========================================

  HANDLE_CELERY_ERROR:
    node_id: "HANDLE_CELERY_ERROR"
    question: "Celery task error type?"
    description: |
      Celery-specific errors: task revoked, worker lost, soft time limit exceeded.
      Each has different recovery strategy.

    conditions:
      - condition: "error_type == 'SoftTimeLimitExceeded'"
        description: "Task exceeded soft time limit (240s)"
        next: "HANDLE_TASK_TIMEOUT"

      - condition: "error_type == 'TaskRevokedError'"
        description: "Task was manually revoked or cancelled"
        next: "LOG_AND_SKIP"  # Don't retry revoked tasks

      - condition: "error_type == 'WorkerLostError'"
        description: "Worker crashed or was killed"
        next: "REQUEUE_TASK"

    code_reference: "app/workers/error_handler.py:67-98"

  HANDLE_TASK_TIMEOUT:
    node_id: "HANDLE_TASK_TIMEOUT"
    type: "recovery_action"
    description: "Task exceeded soft time limit - likely stuck or processing complex document"

    recovery_strategy:
      step_1:
        action: "Check if task is still making progress"
        implementation: "Check last_progress_update timestamp"
        decision:
          - "If progress updated < 30s ago: Allow to continue (hard limit: 300s)"
          - "If progress updated > 30s ago: Likely stuck, proceed to step_2"

      step_2:
        action: "Reduce complexity (if possible)"
        examples:
          - "Reduce OCR quality settings"
          - "Skip optional post-processing steps"
          - "Process only first N pages"

      step_3:
        action: "Requeue with timeout extension"
        implementation: "Retry task with time_limit=600s (2× original)"

      step_4:
        action: "Manual review required"
        reason: "Document too complex for automatic processing"
        notification: "Flag document for manual review queue"

    code_reference: "app/workers/timeout_handler.py:123-189"

  REQUEUE_TASK:
    node_id: "REQUEUE_TASK"
    type: "recovery_action"
    description: "Worker lost - requeue task for another worker"

    requeue_logic:
      max_requeue_attempts: 3
      requeue_delay: "60 seconds"  # Wait for worker to potentially recover

      checks_before_requeue:
        - "Verify document still exists in MinIO"
        - "Verify user account still active"
        - "Check if task already completed by another worker (race condition)"

      requeue_priority:
        - "High priority: Enterprise users"
        - "Normal priority: Standard users"
        - "Low priority: Free users"

    success_action: "Task requeued successfully"
    failure_action: "Permanent failure after 3 requeue attempts"

    code_reference: "app/workers/requeue_handler.py:78-124"

  # ==========================================
  # Validation Error Handling
  # ==========================================

  HANDLE_VALIDATION_ERROR:
    node_id: "HANDLE_VALIDATION_ERROR"
    type: "permanent_failure"
    description: "Validation errors are permanent - user action required"

    error_response:
      status_code: 400
      response_format:
        error_code: "VALIDATION_ERROR"
        message: "Human-readable error message in German"
        details: "Specific validation failures"
        suggested_action: "What user should do to fix"

    examples:
      invalid_ust_id:
        error_code: "INVALID_UST_ID"
        message_de: "USt-IdNr Format ungültig (erwartet: DExxxxxxxxx)"
        message_en: "Invalid VAT ID format (expected: DExxxxxxxxx)"
        suggested_action: "Verify USt-IdNr is correct (e.g., DE123456789)"

      file_too_large:
        error_code: "FILE_TOO_LARGE"
        message_de: "Datei zu groß (Maximum: 50 MB)"
        message_en: "File too large (maximum: 50 MB)"
        suggested_action: "Compress file or split into multiple documents"

      unsupported_file_type:
        error_code: "UNSUPPORTED_FILE_TYPE"
        message_de: "Dateityp nicht unterstützt (erlaubt: PDF, PNG, JPG, TIFF)"
        message_en: "File type not supported (allowed: PDF, PNG, JPG, TIFF)"
        suggested_action: "Convert file to PDF or image format"

    do_not_retry: true
    log_for_analytics: true  # Track common validation errors to improve UX

    code_reference: "app/core/validation_error_handler.py:89-156"

  # ==========================================
  # Permission Error Handling
  # ==========================================

  HANDLE_PERMISSION_ERROR:
    node_id: "HANDLE_PERMISSION_ERROR"
    type: "permanent_failure"
    description: "Permission errors are permanent - check access rights"

    error_response:
      status_code: 403
      response_format:
        error_code: "PERMISSION_DENIED"
        message: "You do not have permission to access this resource"

    common_scenarios:
      document_ownership:
        description: "User trying to access document owned by another user"
        resolution: "Verify document_id and user_id match"

      tier_restriction:
        description: "Free tier user trying to access enterprise feature"
        resolution: "Suggest upgrade to higher tier"

      api_rate_limit:
        description: "User exceeded rate limit"
        resolution: "Return 429 status with Retry-After header"

    security_audit:
      log_level: "WARNING"
      log_message: "Permission denied for user {user_id} on resource {resource_id}"
      alert_on_excessive_attempts: "10 permission denials in 5 minutes → alert security team"

    code_reference: "app/core/permission_error_handler.py:45-87"

  # ==========================================
  # Data Integrity Error Handling
  # ==========================================

  HANDLE_DATA_INTEGRITY_ERROR:
    node_id: "HANDLE_DATA_INTEGRITY_ERROR"
    type: "permanent_failure"
    description: "Data integrity errors indicate application bugs"

    error_types:
      unique_constraint_violation:
        description: "Duplicate key violates unique constraint"
        likely_cause: "Race condition or duplicate submission"
        resolution: "Check if resource already exists, return existing resource"

      foreign_key_violation:
        description: "Referenced record does not exist"
        likely_cause: "Data deletion race condition"
        resolution: "Verify parent record exists before inserting child"

      not_null_violation:
        description: "NULL value in NOT NULL column"
        likely_cause: "Missing validation or incorrect default"
        resolution: "Fix application logic, add validation"

    error_response:
      status_code: 409  # Conflict
      response_format:
        error_code: "DATA_INTEGRITY_ERROR"
        message: "Data conflict detected"
        technical_details: "Database error message (sanitized)"

    critical_action:
      - "Log full stack trace"
      - "Alert engineering team (Slack + PagerDuty)"
      - "Create GitHub issue automatically"
      - "Add to bug triage queue"

    do_not_retry: true

    code_reference: "app/core/integrity_error_handler.py:67-134"

  # ==========================================
  # Terminal Nodes
  # ==========================================

  RETRY_WITH_ORIGINAL_BATCH:
    node_id: "RETRY_WITH_ORIGINAL_BATCH"
    type: "terminal_node"
    action: "Retry task with original batch size"
    expected_success_rate: "90%"
    next_on_failure: "GPU_OOM_RECOVERY.step_2"

  RETRY_WITH_REDUCED_BATCH:
    node_id: "RETRY_WITH_REDUCED_BATCH"
    type: "terminal_node"
    action: "Retry task with 50% reduced batch size"
    expected_success_rate: "95%"
    next_on_failure: "GPU_OOM_RECOVERY.step_3"

  RETRY_WITH_SINGLE_BATCH:
    node_id: "RETRY_WITH_SINGLE_BATCH"
    type: "terminal_node"
    action: "Retry task with batch_size=1"
    expected_success_rate: "98%"
    next_on_failure: "GPU_OOM_RECOVERY.step_4"

  RETRY_WITH_CPU:
    node_id: "RETRY_WITH_CPU"
    type: "terminal_node"
    action: "Retry task using CPU backend (Surya)"
    expected_success_rate: "100%"
    fallback_characteristics:
      - "Slower processing (5s/page vs 2.8s)"
      - "Lower accuracy (8.7% CER vs 2.8%)"
      - "Acceptable for operational resilience"

  LOG_AND_SKIP:
    node_id: "LOG_AND_SKIP"
    type: "terminal_node"
    action: "Log error and skip task (do not retry)"
    use_cases:
      - "Task manually revoked"
      - "Validation error (permanent)"
      - "Permission error (permanent)"

  PERMANENT_FAILURE:
    node_id: "PERMANENT_FAILURE"
    type: "terminal_node"
    action: "Mark task as permanently failed"
    consequences:
      - "Document status set to 'failed'"
      - "User notified via email/UI"
      - "Manual review required"
      - "Support ticket created (enterprise users)"

# Recovery Statistics (Production Data)
production_metrics:
  error_frequency:
    gpu_oom: "3.2% of tasks"
    network_errors: "1.8% of tasks"
    celery_errors: "0.9% of tasks"
    validation_errors: "5.4% of tasks"
    permission_errors: "0.3% of tasks"
    data_integrity_errors: "0.1% of tasks"

  recovery_success_rates:
    gpu_oom_recovery:
      step_1_cache_clear: "28%"
      step_2_reduce_batch: "58%"
      step_3_single_batch: "12%"
      step_4_cpu_fallback: "2%"
      overall_success: "100%"

    network_retry:
      attempt_1: "65%"
      attempt_2: "25%"
      attempt_3: "8%"
      attempt_4: "1.8%"
      attempt_5: "0.2%"
      overall_success: "100%"

  average_recovery_time:
    gpu_oom: "8.5 seconds"
    network_error: "12.3 seconds"
    celery_error: "62 seconds (requeue delay)"

# Monitoring and Alerting
monitoring:
  prometheus_metrics:
    - name: "error_recovery_attempts_total"
      type: "counter"
      labels: ["error_type", "recovery_step", "success"]

    - name: "error_recovery_duration_seconds"
      type: "histogram"
      labels: ["error_type", "recovery_step"]

    - name: "permanent_failures_total"
      type: "counter"
      labels: ["error_type", "error_code"]

  grafana_dashboards:
    - "Error Recovery Overview"
    - "GPU OOM Recovery Details"
    - "Network Retry Patterns"

  alerts:
    - name: "HighGPUOOMRate"
      condition: "gpu_oom_rate > 5% for 15 minutes"
      severity: "warning"
      action: "Check GPU memory optimization"

    - name: "FrequentCPUFallback"
      condition: "cpu_fallback_rate > 10% for 30 minutes"
      severity: "critical"
      action: "GPU likely failing, investigate hardware"

    - name: "NetworkRetryStorm"
      condition: "network_retry_rate > 20% for 5 minutes"
      severity: "critical"
      action: "Service dependency (Redis/PostgreSQL/MinIO) likely down"

