# Monitoring and Alerting
monitoring:
  prometheus_metrics:
    - name: "ocr_backend_selection_total"
      type: "counter"
      labels: ["backend", "selection_reason", "user_tier"]

    - name: "ocr_backend_selection_duration_seconds"
      type: "histogram"
      labels: ["backend"]
      buckets: [0.01, 0.05, 0.1, 0.5, 1.0, 5.0, 10.0]

    - name: "ocr_complexity_prediction_total"
      type: "counter"
      labels: ["predicted_complexity", "actual_complexity"]

    - name: "cpu_fallback_activations_total"
      type: "counter"
      labels: ["fallback_reason"]

  grafana_dashboards:
    - "OCR Backend Selection Overview"
    - "GPU Utilization and Fallback Triggers"
    - "Complexity Prediction Accuracy"

  alerts:
    - name: "HighCPUFallbackRate"
      condition: "cpu_fallback_rate > 10% for 15 minutes"
      severity: "warning"
      action: "Investigate GPU health"

    - name: "ComplexityPredictionDrift"
      condition: "prediction_accuracy < 85% for 1 hour"
      severity: "warning"
      action: "Review complexity prediction model"

