# Decision Tree Visualization (Mermaid)

mermaid_diagram: |
  ```mermaid
  graph TD
      START[Start: OCR Backend Selection] --> GPU_CHECK{GPU Available?<br/>VRAM < 90%?}

      GPU_CHECK -->|No / VRAM Critical| CPU_FALLBACK[Surya + Docling<br/>CPU Mode<br/>8.7% CER, 5s/page]
      GPU_CHECK -->|Yes| COMPLEXITY{Document<br/>Complexity?}

      COMPLEXITY -->|Complex| FRAKTUR{Historical Doc?<br/>Year < 1950?}
      COMPLEXITY -->|Medium| USER_TIER{User Tier?}
      COMPLEXITY -->|Simple| QUEUE{Queue Depth<br/>> 50?}

      FRAKTUR -->|Yes| DEEPSEEK_FRAKTUR[DeepSeek Fraktur<br/>2.9% CER, 3.2s/page]
      FRAKTUR -->|No| DEEPSEEK_STD[DeepSeek Standard<br/>2.8% CER, 2.8s/page]

      USER_TIER -->|Enterprise| DEEPSEEK_STD
      USER_TIER -->|Standard/Free| VRAM_CHECK1{VRAM > 70%?}

      QUEUE -->|Yes| GOT_OCR[GOT-OCR 2.0<br/>5.9% CER, 0.8s/page]
      QUEUE -->|No| VRAM_CHECK2{VRAM > 70%?}

      VRAM_CHECK1 -->|> 85%| CPU_FALLBACK
      VRAM_CHECK1 -->|70-85%| GOT_OCR
      VRAM_CHECK1 -->|< 70%| GOT_OCR

      VRAM_CHECK2 -->|> 85%| CPU_FALLBACK
      VRAM_CHECK2 -->|70-85%| GOT_OCR
      VRAM_CHECK2 -->|< 70%| GOT_OCR

      style CPU_FALLBACK fill:#ffcccc
      style DEEPSEEK_FRAKTUR fill:#ccffcc
      style DEEPSEEK_STD fill:#ccffcc
      style GOT_OCR fill:#ccccff
  ```

