# Loki Configuration for Ablage-System OCR
# Log Aggregation and Analysis
# Updated for Loki 3.x compatibility
#
# IMPLEMENTIERT [2026-01-02]: Loki Retention Alerting
# =====================================================
# Alle Monitoring-Komponenten wurden implementiert:
#
# 1. [DONE] Prometheus Alert Rules erstellt:
#    - Datei: infrastructure/prometheus/rules/loki-alerts.yml
#    - 17 Alerts fuer Disk, Retention, Ingestion, Performance
#
# 2. [DONE] Loki als Prometheus Scrape-Target hinzugefuegt:
#    - Datei: infrastructure/prometheus/prometheus.yml
#    - Job: loki (Port 3100)
#
# 3. [DONE] Grafana Dashboard erstellt:
#    - Datei: infrastructure/grafana/dashboards/ablage-loki-retention.json
#    - UID: ablage-loki-retention
#    - Panels: Service Status, Speicher, Ingestion, Performance, Retention
#
# 4. [DONE] Runbook dokumentiert:
#    - Datei: .claude/Docs/Operations/Runbooks/loki-monitoring.md
#
# TODO [FUTURE]: Auto-Archivierung aelterer Logs nach MinIO/S3
#    - storage_config.aws fuer cold storage konfigurieren
#    - Separate Retention fuer archivierte Logs

# Auth deaktiviert für Single-Node Setup (kein Multi-Tenant)
# Bei Multi-Tenant aktivieren und X-Scope-OrgID Header in Promtail konfigurieren
# HINWEIS: Zugriff nur über localhost (siehe docker-compose.yml ports)
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

ingester:
  wal:
    enabled: true
    dir: /loki/wal
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  chunk_idle_period: 1h
  max_chunk_age: 1h
  chunk_target_size: 1048576
  chunk_retain_period: 30s

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki/chunks
  tsdb_shipper:
    active_index_directory: /loki/tsdb-shipper-active
    cache_location: /loki/tsdb-shipper-cache
    cache_ttl: 24h

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  max_streams_per_user: 10000
  max_line_size: 256kb
  retention_period: 720h  # 30 days

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://localhost:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true
