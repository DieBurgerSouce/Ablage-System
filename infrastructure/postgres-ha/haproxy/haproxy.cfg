# HAProxy Konfiguration fuer PostgreSQL HA Load Balancing
# Ablage-System - Enterprise-grade Database Access Layer
#
# Funktionen:
# - Automatische Leader-Erkennung via Patroni REST API
# - Read/Write Splitting (Port 5432 = Primary, Port 5433 = Replicas)
# - Health Checks alle 2 Sekunden
# - Connection Pooling und Queuing

global
    maxconn 2000
    log stdout format raw local0 info
    stats socket /var/run/haproxy/haproxy.sock mode 660 level admin
    stats timeout 30s

defaults
    mode tcp
    log global
    option tcplog
    option dontlognull
    option redispatch
    retries 3
    timeout connect 5s
    timeout client 30m
    timeout server 30m
    timeout check 5s
    maxconn 1000

# Stats-Seite fuer Monitoring
listen stats
    bind *:7000
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE
    stats auth ${HAPROXY_STATS_USER:-admin}:${HAPROXY_STATS_PASSWORD:-admin_secret}

# ============================================================
# Primary (Read/Write) - Port 5432
# ============================================================
# Nur der aktuelle Leader akzeptiert Schreiboperationen
# Patroni REST API /leader gibt 200 nur fuer den Primary zurueck

listen postgres-primary
    bind *:5432
    mode tcp
    option httpchk GET /leader
    http-check expect status 200
    default-server inter 2s fall 3 rise 2 on-marked-down shutdown-sessions

    # PostgreSQL Nodes - nur Leader wird verwendet
    server pg-node1 pg-node1:5432 check port 8008
    server pg-node2 pg-node2:5432 check port 8008
    server pg-node3 pg-node3:5432 check port 8008

# ============================================================
# Replicas (Read-Only) - Port 5433
# ============================================================
# Load Balancing ueber alle gesunden Replicas
# Patroni REST API /replica gibt 200 fuer Standby-Nodes zurueck

listen postgres-replicas
    bind *:5433
    mode tcp
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 2s fall 3 rise 2 on-marked-down shutdown-sessions

    # PostgreSQL Nodes - Replicas fuer Leseoperationen
    server pg-node1 pg-node1:5432 check port 8008
    server pg-node2 pg-node2:5432 check port 8008
    server pg-node3 pg-node3:5432 check port 8008

# ============================================================
# Patroni REST API - Port 8008
# ============================================================
# Fuer Cluster-Management und Monitoring

listen patroni-api
    bind *:8008
    mode http
    balance roundrobin
    option httpchk GET /cluster
    http-check expect status 200
    default-server inter 5s fall 3 rise 2

    server pg-node1 pg-node1:8008 check
    server pg-node2 pg-node2:8008 check
    server pg-node3 pg-node3:8008 check
