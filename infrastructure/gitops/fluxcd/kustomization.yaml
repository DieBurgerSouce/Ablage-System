---
# =============================================================================
# FluxCD Kustomization
# Ablage-System GitOps Infrastructure
# =============================================================================
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ablage-system
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: ablage-system-gitops
spec:
  interval: 10m
  timeout: 5m

  sourceRef:
    kind: GitRepository
    name: ablage-system

  path: ./infrastructure/kubernetes/base
  prune: true

  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: ablage-backend
      namespace: ablage-system
    - apiVersion: apps/v1
      kind: Deployment
      name: ablage-worker
      namespace: ablage-system
    - apiVersion: apps/v1
      kind: StatefulSet
      name: ablage-postgresql
      namespace: ablage-system

  # Decrypt secrets with SOPS (optional)
  # decryption:
  #   provider: sops
  #   secretRef:
  #     name: sops-age

  # Post-build variable substitution
  postBuild:
    substitute:
      CLUSTER_NAME: ablage-cluster
      ENVIRONMENT: production
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
---
# Monitoring Kustomization
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: ablage-system-gitops
spec:
  interval: 30m
  timeout: 10m

  sourceRef:
    kind: GitRepository
    name: ablage-system

  path: ./infrastructure/monitoring
  prune: true

  dependsOn:
    - name: ablage-system
