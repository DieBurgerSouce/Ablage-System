---
# =============================================================================
# FluxCD Image Policy
# Ablage-System GitOps Infrastructure
# =============================================================================
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: ablage-backend
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: ablage-system-gitops
spec:
  imageRepositoryRef:
    name: ablage-backend
  policy:
    semver:
      range: ">=1.0.0"
  filterTags:
    # Only consider tags matching semver
    pattern: '^v?(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)(-(?P<prerelease>.+))?$'
    extract: '$major.$minor.$patch'
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: ablage-worker
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: ablage-system-gitops
spec:
  imageRepositoryRef:
    name: ablage-worker
  policy:
    semver:
      range: ">=1.0.0"
  filterTags:
    pattern: '^v?(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)(-(?P<prerelease>.+))?$'
    extract: '$major.$minor.$patch'
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: ablage-frontend
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: ablage-system-gitops
spec:
  imageRepositoryRef:
    name: ablage-frontend
  policy:
    semver:
      range: ">=1.0.0"
  filterTags:
    pattern: '^v?(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)(-(?P<prerelease>.+))?$'
    extract: '$major.$minor.$patch'
