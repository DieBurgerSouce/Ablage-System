---
# =============================================================================
# FluxCD Helm Repository Sources
# Ablage-System GitOps Infrastructure
# =============================================================================
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: bitnami
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: ablage-system-gitops
spec:
  interval: 30m
  url: https://charts.bitnami.com/bitnami
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: ablage-system-gitops
spec:
  interval: 30m
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: ablage-system-gitops
spec:
  interval: 30m
  url: https://grafana.github.io/helm-charts
