---
# =============================================================================
# FluxCD Notifications
# Ablage-System GitOps Infrastructure
# =============================================================================
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: slack
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: ablage-system-gitops
spec:
  type: slack
  channel: ablage-deployments
  secretRef:
    name: slack-webhook
---
# Webhook secret (create manually)
# apiVersion: v1
# kind: Secret
# metadata:
#   name: slack-webhook
#   namespace: flux-system
# stringData:
#   address: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: ablage-system-alerts
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: ablage-system-gitops
spec:
  providerRef:
    name: slack
  eventSeverity: info
  eventSources:
    - kind: GitRepository
      name: '*'
    - kind: Kustomization
      name: '*'
    - kind: HelmRelease
      name: '*'
    - kind: ImagePolicy
      name: '*'
  summary: "Ablage-System GitOps Event"
---
# Critical alerts only
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: ablage-system-critical
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: ablage-system-gitops
spec:
  providerRef:
    name: slack
  eventSeverity: error
  eventSources:
    - kind: Kustomization
      name: ablage-system
    - kind: HelmRelease
      name: '*'
  summary: "CRITICAL: Ablage-System Deployment Issue"
