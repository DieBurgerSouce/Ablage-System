# Ablage-System Deploy Role - Verification
---
- name: Wait for backend health check
  ansible.builtin.uri:
    url: "http://localhost:8000/health"
    method: GET
    status_code: 200
  register: health_check
  until: health_check.status == 200
  retries: 30
  delay: 10

- name: Get API version
  ansible.builtin.uri:
    url: "http://localhost:8000/docs"
    method: GET
    status_code: 200
  register: api_docs
  ignore_errors: yes

- name: Check GPU availability in worker
  ansible.builtin.command:
    cmd: docker compose exec -T worker nvidia-smi
    chdir: "{{ ablage_install_dir }}"
  become: yes
  register: worker_gpu
  changed_when: false
  failed_when: false
  when: nvidia_gpu_enabled | default(false)

- name: Get container health status
  ansible.builtin.command:
    cmd: docker compose ps --format json
    chdir: "{{ ablage_install_dir }}"
  become: yes
  register: container_status
  changed_when: false

- name: Display deployment verification results
  ansible.builtin.debug:
    msg: |
      ╔══════════════════════════════════════════════════════════════╗
      ║           Deployment Verification Complete                   ║
      ╠══════════════════════════════════════════════════════════════╣
      ║ Health Check: {{ 'PASSED' if health_check.status == 200 else 'FAILED' }}
      ║ API Docs: {{ 'Available' if api_docs.status == 200 else 'Not available' }}
      {% if nvidia_gpu_enabled | default(false) %}
      ║ GPU in Worker: {{ 'Available' if worker_gpu.rc == 0 else 'Not available' }}
      {% endif %}
      ╠══════════════════════════════════════════════════════════════╣
      ║ URLs:                                                        ║
      ║ - API: http://{{ ansible_host }}:8000                        ║
      ║ - Docs: http://{{ ansible_host }}:8000/docs                  ║
      ║ - Frontend: http://{{ ansible_host }}                        ║
      ║ - Grafana: http://{{ ansible_host }}:3000                    ║
      ╚══════════════════════════════════════════════════════════════╝
