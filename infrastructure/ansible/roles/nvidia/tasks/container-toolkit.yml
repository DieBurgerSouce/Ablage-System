# Ablage-System NVIDIA Role - Container Toolkit Installation
# Updated: 2025-12-09 - Fixed repository URL, added CUDA toolkit option
---
- name: Get system architecture
  ansible.builtin.command: dpkg --print-architecture
  register: system_arch
  changed_when: false

- name: Add NVIDIA Container Toolkit GPG key
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    dest: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
    mode: '0644'
  become: yes

- name: Add NVIDIA Container Toolkit repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://nvidia.github.io/libnvidia-container/stable/deb/{{ system_arch.stdout }} /"
    state: present
    filename: nvidia-container-toolkit
  become: yes

- name: Install NVIDIA Container Toolkit
  ansible.builtin.apt:
    name:
      - nvidia-container-toolkit
    state: present
    update_cache: yes
  become: yes

- name: Configure NVIDIA Container Runtime
  ansible.builtin.command: nvidia-ctk runtime configure --runtime=docker
  become: yes
  register: nvidia_runtime_configure
  changed_when: "'already configured' not in nvidia_runtime_configure.stdout"
  notify: restart docker

- name: Update Docker daemon configuration for NVIDIA
  ansible.builtin.set_fact:
    docker_nvidia_runtime: true

- name: Ensure NVIDIA runtime is configured in Docker daemon.json
  ansible.builtin.template:
    src: ../docker/templates/daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: restart docker

- name: Ensure Docker service is restarted
  ansible.builtin.meta: flush_handlers
