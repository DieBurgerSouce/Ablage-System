# Ablage-System Security Role - Fail2ban
---
- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
  become: yes

- name: Create fail2ban local configuration
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: restart fail2ban

- name: Create custom filter for Ablage-System API
  ansible.builtin.template:
    src: filter-ablage-api.conf.j2
    dest: /etc/fail2ban/filter.d/ablage-api.conf
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: restart fail2ban

- name: Start and enable fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: yes
  become: yes
