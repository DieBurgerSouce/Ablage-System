# Ablage-System Docker Role - Verification
---
- name: Verify Docker is running
  ansible.builtin.systemd:
    name: docker
    state: started
  become: yes
  register: docker_service

- name: Test Docker with hello-world
  community.docker.docker_container:
    name: hello-world-test
    image: hello-world
    state: started
    auto_remove: yes
    detach: no
  become: yes
  register: docker_test
  ignore_errors: yes

- name: Display Docker test result
  ansible.builtin.debug:
    msg: "Docker test {{ 'PASSED' if docker_test is succeeded else 'FAILED' }}"

- name: Get Docker info
  ansible.builtin.command: docker info
  register: docker_info
  changed_when: false
  become: yes

- name: Display Docker info summary
  ansible.builtin.debug:
    msg: |
      Docker Status:
      - Service: {{ 'Running' if docker_service is succeeded else 'Not Running' }}
      - Storage Driver: {{ docker_info.stdout | regex_search('Storage Driver: (.+)', '\\1') | first | default('unknown') }}
      - Containers: {{ docker_info.stdout | regex_search('Containers: (\\d+)', '\\1') | first | default('0') }}
      - Images: {{ docker_info.stdout | regex_search('Images: (\\d+)', '\\1') | first | default('0') }}

- name: Verify Docker Compose functionality
  ansible.builtin.command: docker compose version
  register: compose_check
  changed_when: false
  become: yes

- name: Docker verification complete
  ansible.builtin.debug:
    msg: "Docker and Docker Compose are properly installed and configured"
