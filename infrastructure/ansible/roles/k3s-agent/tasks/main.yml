---
# =============================================================================
# K3s Agent Role - Main Tasks
# Ablage-System OCR Infrastructure
# =============================================================================

- name: Zeige Installationsinformationen
  ansible.builtin.debug:
    msg: |
      K3s Agent Installation
      =======================
      Host: {{ inventory_hostname }}
      Version: {{ k3s_version }}
      Server: {{ k3s_server_url }}
      Umgebung: {{ env_name }}

# -----------------------------------------------------------------------------
# Prerequisites
# -----------------------------------------------------------------------------
- name: Prüfe ob K3s bereits installiert ist
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Installiere Abhängigkeiten
  ansible.builtin.apt:
    name:
      - curl
      - apt-transport-https
      - ca-certificates
      - gnupg
      - open-iscsi
      - nfs-common
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Aktiviere und starte iscsid
  ansible.builtin.systemd:
    name: iscsid
    state: started
    enabled: yes

# -----------------------------------------------------------------------------
# Kernel Configuration
# -----------------------------------------------------------------------------
- name: Konfiguriere Kernel-Parameter für Kubernetes
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-kubernetes.conf
    reload: yes
    state: present
  loop:
    - { name: "net.bridge.bridge-nf-call-iptables", value: "1" }
    - { name: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { name: "net.ipv4.ip_forward", value: "1" }
    - { name: "fs.inotify.max_user_watches", value: "524288" }
    - { name: "fs.inotify.max_user_instances", value: "512" }

- name: Lade br_netfilter Modul
  community.general.modprobe:
    name: br_netfilter
    state: present
    persistent: present

# -----------------------------------------------------------------------------
# Firewall Configuration
# -----------------------------------------------------------------------------
- name: Öffne Firewall-Ports für K3s Agent
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "K3s: {{ item.comment }}"
  loop: "{{ k3s_firewall_ports }}"
  when: k3s_configure_firewall | default(true)

# -----------------------------------------------------------------------------
# K3s Agent Installation
# -----------------------------------------------------------------------------
- name: Erstelle K3s Konfigurationsverzeichnis
  ansible.builtin.file:
    path: "{{ k3s_config_dir }}"
    state: directory
    mode: '0755'

- name: Erstelle K3s Agent Konfigurationsdatei
  ansible.builtin.template:
    src: k3s-agent-config.yaml.j2
    dest: "{{ k3s_config_dir }}/config.yaml"
    mode: '0600'
  notify: restart k3s-agent

- name: Lade K3s Installationsskript herunter
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: '0755'
  when: not k3s_binary.stat.exists

- name: Warte auf K3s Server Erreichbarkeit
  ansible.builtin.wait_for:
    host: "{{ k3s_server_url | regex_replace('https://([^:]+):.*', '\\1') }}"
    port: "{{ k3s_server_url | regex_replace('.*:([0-9]+)', '\\1') }}"
    timeout: 300

- name: Installiere K3s Agent
  ansible.builtin.shell: |
    INSTALL_K3S_VERSION="{{ k3s_version }}" \
    INSTALL_K3S_CHANNEL="{{ k3s_channel }}" \
    K3S_URL="{{ k3s_server_url }}" \
    K3S_TOKEN="{{ k3s_token }}" \
    INSTALL_K3S_EXEC="agent" \
    /tmp/k3s-install.sh
  args:
    creates: /usr/local/bin/k3s
  notify: restart k3s-agent

- name: Warte auf K3s Agent Start
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/agent/kubelet.kubeconfig
    timeout: 120

# -----------------------------------------------------------------------------
# Node Registration
# -----------------------------------------------------------------------------
- name: Warte auf Node-Registrierung im Cluster
  delegate_to: "{{ groups['k3s_servers'][0] }}"
  ansible.builtin.command: kubectl get node {{ inventory_hostname }} -o name
  register: node_registered
  until: node_registered.rc == 0
  retries: 30
  delay: 10
  changed_when: false

- name: Setze Node Labels
  delegate_to: "{{ groups['k3s_servers'][0] }}"
  ansible.builtin.command: >
    kubectl label node {{ inventory_hostname }}
    {{ item }}
    --overwrite
  loop: "{{ k3s_node_labels }}"
  changed_when: false

- name: Setze Node Taints
  delegate_to: "{{ groups['k3s_servers'][0] }}"
  ansible.builtin.command: >
    kubectl taint node {{ inventory_hostname }}
    {{ item }}
    --overwrite
  loop: "{{ k3s_node_taints }}"
  when: k3s_node_taints | length > 0
  changed_when: false

# -----------------------------------------------------------------------------
# Verification
# -----------------------------------------------------------------------------
- name: Verifiziere Agent-Status
  ansible.builtin.systemd:
    name: k3s-agent
  register: k3s_agent_status

- name: Zeige Agent-Status
  ansible.builtin.debug:
    msg: |
      K3s Agent Status
      =================
      Status: {{ k3s_agent_status.status.ActiveState }}
      Node: {{ inventory_hostname }}
