# Ablage-System Backup Role - Scheduling
---
- name: Deploy backup systemd service
  ansible.builtin.template:
    src: ablage-backup.service.j2
    dest: /etc/systemd/system/ablage-backup.service
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: reload systemd

- name: Deploy backup systemd timer
  ansible.builtin.template:
    src: ablage-backup.timer.j2
    dest: /etc/systemd/system/ablage-backup.timer
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: reload systemd

- name: Deploy cleanup systemd timer
  ansible.builtin.template:
    src: ablage-backup-cleanup.timer.j2
    dest: /etc/systemd/system/ablage-backup-cleanup.timer
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: reload systemd

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: yes
  become: yes

- name: Enable and start backup timer
  ansible.builtin.systemd:
    name: ablage-backup.timer
    state: started
    enabled: yes
  become: yes
  when: backup_enabled | default(true)

- name: Enable and start cleanup timer
  ansible.builtin.systemd:
    name: ablage-backup-cleanup.timer
    state: started
    enabled: yes
  become: yes
  when: backup_enabled | default(true)

# Validation timers
- name: Deploy backup validation systemd service
  ansible.builtin.template:
    src: ablage-backup-validation.service.j2
    dest: /etc/systemd/system/ablage-backup-validation.service
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: reload systemd
  when: backup_validation_enabled | default(true)

- name: Deploy backup validation systemd timer
  ansible.builtin.template:
    src: ablage-backup-validation.timer.j2
    dest: /etc/systemd/system/ablage-backup-validation.timer
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: reload systemd
  when: backup_validation_enabled | default(true)

- name: Enable and start validation timer
  ansible.builtin.systemd:
    name: ablage-backup-validation.timer
    state: started
    enabled: yes
  become: yes
  when:
    - backup_enabled | default(true)
    - backup_validation_enabled | default(true)

# Restore test timers
- name: Deploy restore test systemd service
  ansible.builtin.template:
    src: ablage-restore-test.service.j2
    dest: /etc/systemd/system/ablage-restore-test.service
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: reload systemd
  when: backup_validation_enabled | default(true)

- name: Deploy restore test systemd timer
  ansible.builtin.template:
    src: ablage-restore-test.timer.j2
    dest: /etc/systemd/system/ablage-restore-test.timer
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: reload systemd
  when: backup_validation_enabled | default(true)

- name: Enable and start restore test timer
  ansible.builtin.systemd:
    name: ablage-restore-test.timer
    state: started
    enabled: yes
  become: yes
  when:
    - backup_enabled | default(true)
    - backup_validation_enabled | default(true)
