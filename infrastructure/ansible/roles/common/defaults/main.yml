# Ablage-System Common Role - Default Variables
---
# Timezone
common_timezone: Europe/Berlin

# Package management
common_upgrade_packages: false
common_enable_unattended_upgrades: true

# User management
common_create_deploy_user: true
common_deploy_ssh_keys: []

# Default packages (can be overridden in inventory)
common_packages:
  - curl
  - wget
  - git
  - htop
  - vim
  - unzip
  - jq
  - rsync
  - net-tools
  - ca-certificates
  - gnupg
  - lsb-release
  - python3-pip
  - python3-docker
  - python3-venv
  - software-properties-common
  - apt-transport-https

# Kernel parameters (can be overridden in inventory)
kernel_params:
  vm.max_map_count: 262144
  net.core.somaxconn: 65535
  net.ipv4.ip_forward: 1
  net.ipv4.tcp_keepalive_time: 600
  net.ipv4.tcp_keepalive_intvl: 60
  net.ipv4.tcp_keepalive_probes: 10

# System limits
common_nofile_soft: 65535
common_nofile_hard: 65535
common_nproc_soft: 65535
common_nproc_hard: 65535
