# Ablage-System Common Role - Directory Setup
---
- name: Create application directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('ablage') }}"
    group: "{{ item.group | default('ablage') }}"
    mode: "{{ item.mode | default('0750') }}"
  loop:
    - { path: "{{ ablage_install_dir }}" }
    - { path: "{{ ablage_install_dir }}/logs" }
    - { path: "{{ ablage_install_dir }}/data" }
    - { path: "{{ ablage_install_dir }}/backups" }
    - { path: "{{ ablage_install_dir }}/ssl" }
    - { path: "{{ ablage_log_dir }}", owner: root, group: adm, mode: '0755' }
  become: yes

- name: Create Ansible log directory
  ansible.builtin.file:
    path: /var/log/ansible
    state: directory
    owner: root
    group: adm
    mode: '0755'
  become: yes

- name: Create temporary working directory
  ansible.builtin.file:
    path: /tmp/ablage-ansible
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  become: yes
