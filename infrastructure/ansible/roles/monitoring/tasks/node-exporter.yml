# Ablage-System Monitoring Role - Node Exporter Tasks
---
- name: Check if Node Exporter is installed
  ansible.builtin.stat:
    path: /usr/local/bin/node_exporter
  register: node_exporter_binary

- name: Get installed Node Exporter version
  ansible.builtin.command: /usr/local/bin/node_exporter --version
  register: node_exporter_installed_version
  changed_when: false
  failed_when: false
  when: node_exporter_binary.stat.exists

- name: Download Node Exporter
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    mode: '0644'
  when: not node_exporter_binary.stat.exists or node_exporter_version not in (node_exporter_installed_version.stdout | default(''))
  become: yes

- name: Extract Node Exporter
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp
    remote_src: yes
  when: not node_exporter_binary.stat.exists or node_exporter_version not in (node_exporter_installed_version.stdout | default(''))
  become: yes

- name: Install Node Exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    owner: root
    group: root
    mode: '0755'
    remote_src: yes
  when: not node_exporter_binary.stat.exists or node_exporter_version not in (node_exporter_installed_version.stdout | default(''))
  become: yes
  notify: restart node_exporter

- name: Create Node Exporter systemd service
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify:
    - reload systemd
    - restart node_exporter

- name: Start and enable Node Exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes

- name: Configure firewall for Node Exporter
  community.general.ufw:
    rule: allow
    port: "{{ node_exporter_port }}"
    proto: tcp
    comment: "Node Exporter metrics"
    from_ip: "{{ prometheus_server_ip | default('any') }}"
  become: yes
  when: ufw_enabled | default(true) | bool

- name: Clean up Node Exporter download
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    - "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64"
  become: yes
