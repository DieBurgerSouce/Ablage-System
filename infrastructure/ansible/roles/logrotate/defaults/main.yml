# Ablage-System Logrotate Role - Default Variables
---
# Docker container logs
logrotate_docker_rotate: 7
logrotate_docker_frequency: daily
logrotate_docker_maxsize: 100M

# Application logs
logrotate_app_rotate: 14
logrotate_app_frequency: daily

# Nginx logs
logrotate_nginx_rotate: 14
logrotate_nginx_frequency: daily

# Journald settings
journald_system_max_use: 2G
journald_system_keep_free: 4G
journald_system_max_file_size: 100M
journald_system_max_files: 100
journald_runtime_max_use: 500M
journald_runtime_keep_free: 1G
journald_rate_limit_interval: 30s
journald_rate_limit_burst: 10000
journald_forward_to_syslog: "no"
