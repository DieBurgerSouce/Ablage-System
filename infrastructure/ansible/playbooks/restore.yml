# Ablage-System Restore Playbook
# Restores the Ablage-System from a backup
#
# Usage:
#   ansible-playbook -i inventory/production playbooks/restore.yml -e "backup_date=20241127"
#   ansible-playbook -i inventory/production playbooks/restore.yml -e "backup_date=20241127" -e "restore_type=db_only"
#   ansible-playbook -i inventory/production playbooks/restore.yml -e "backup_file=/path/to/backup.tar.gz"
#
# WICHTIG: Dieses Playbook stoppt die Anwendung während der Wiederherstellung!
---
- name: Ablage-System Restore
  hosts: ablage_servers
  become: yes
  gather_facts: yes

  vars:
    restore_type: "full"  # full, db_only, config_only, storage_only
    backup_date: ""
    backup_file: ""
    confirm_restore: false

  pre_tasks:
    - name: Verify restore confirmation
      ansible.builtin.assert:
        that:
          - confirm_restore | bool
        fail_msg: |
          WARNUNG: Wiederherstellung erfordert explizite Bestätigung!
          Führen Sie das Playbook mit -e "confirm_restore=true" aus.

          ACHTUNG: Die aktuelle Installation wird überschrieben!

    - name: Verify backup parameters
      ansible.builtin.assert:
        that:
          - backup_date | length > 0 or backup_file | length > 0
        fail_msg: "Bitte geben Sie backup_date oder backup_file an."

    - name: Display restore parameters
      ansible.builtin.debug:
        msg: |
          === Ablage-System Wiederherstellung ===
          Typ: {{ restore_type }}
          Backup-Datum: {{ backup_date | default('N/A') }}
          Backup-Datei: {{ backup_file | default('N/A') }}

          WARNUNG: Die aktuelle Installation wird überschrieben!

  tasks:
    - name: Find backup files by date
      ansible.builtin.find:
        paths: "{{ ablage_backup_dir | default('/var/backups/ablage') }}"
        patterns: "*{{ backup_date }}*"
      register: backup_files
      when: backup_date | length > 0

    - name: Verify backup files exist
      ansible.builtin.assert:
        that:
          - backup_files.files | length > 0 or backup_file | length > 0
        fail_msg: "Keine Backup-Dateien für {{ backup_date }} gefunden."
      when: backup_date | length > 0

    - name: Display found backup files
      ansible.builtin.debug:
        msg: "Gefundene Backups: {{ backup_files.files | map(attribute='path') | list }}"
      when: backup_date | length > 0 and backup_files.files | length > 0

    - name: Stop application services
      community.docker.docker_compose:
        project_src: "{{ ablage_install_dir }}"
        state: absent
        remove_orphans: yes
      ignore_errors: yes

    - name: Wait for services to stop
      ansible.builtin.pause:
        seconds: 10

    # Full restore
    - name: Run full restore
      when: restore_type == "full"
      block:
        - name: Find full backup file
          ansible.builtin.set_fact:
            restore_file: "{{ backup_file if backup_file | length > 0 else (backup_files.files | selectattr('path', 'search', 'full_backup') | first).path }}"

        - name: Execute restore script
          ansible.builtin.command:
            cmd: /usr/local/bin/ablage-restore --backup "{{ restore_file }}"
          register: restore_result

    # Database-only restore
    - name: Run database restore
      when: restore_type == "db_only"
      block:
        - name: Find database backup file
          ansible.builtin.set_fact:
            db_restore_file: "{{ backup_file if backup_file | length > 0 else (backup_files.files | selectattr('path', 'search', 'postgres') | first).path }}"

        - name: Start PostgreSQL container only
          ansible.builtin.shell: |
            cd {{ ablage_install_dir }}
            docker compose up -d postgres

        - name: Wait for PostgreSQL to be ready
          ansible.builtin.shell: |
            cd {{ ablage_install_dir }}
            docker compose exec -T postgres pg_isready -U ablage_admin -d ablage_system
          register: pg_ready
          retries: 30
          delay: 2
          until: pg_ready.rc == 0

        - name: Drop and recreate database
          ansible.builtin.shell: |
            cd {{ ablage_install_dir }}
            docker compose exec -T postgres psql -U ablage_admin -c "DROP DATABASE IF EXISTS ablage_system;"
            docker compose exec -T postgres psql -U ablage_admin -c "CREATE DATABASE ablage_system;"

        - name: Restore database from backup
          ansible.builtin.shell: |
            cd {{ ablage_install_dir }}
            gunzip -c "{{ db_restore_file }}" | docker compose exec -T postgres psql -U ablage_admin -d ablage_system
          register: db_restore_result

    # Config-only restore
    - name: Run config restore
      when: restore_type == "config_only"
      block:
        - name: Find config backup file
          ansible.builtin.set_fact:
            config_restore_file: "{{ backup_file if backup_file | length > 0 else (backup_files.files | selectattr('path', 'search', 'config') | first).path }}"

        - name: Backup current config
          ansible.builtin.shell: |
            cd {{ ablage_install_dir }}
            tar -czf /tmp/config_pre_restore.tar.gz .env docker-compose.yml docker-compose.override.yml 2>/dev/null || true

        - name: Restore config files
          ansible.builtin.unarchive:
            src: "{{ config_restore_file }}"
            dest: "{{ ablage_install_dir }}"
            remote_src: yes

    # Storage-only restore
    - name: Run storage restore
      when: restore_type == "storage_only"
      block:
        - name: Find storage backup directory
          ansible.builtin.set_fact:
            storage_restore_dir: "{{ backup_file if backup_file | length > 0 else (backup_files.files | selectattr('path', 'search', 'minio') | first).path }}"

        - name: Start MinIO container only
          ansible.builtin.shell: |
            cd {{ ablage_install_dir }}
            docker compose up -d minio

        - name: Wait for MinIO to be ready
          ansible.builtin.pause:
            seconds: 10

        - name: Restore MinIO data
          ansible.builtin.shell: |
            cd {{ ablage_install_dir }}
            docker compose exec -T minio mc mirror "{{ storage_restore_dir }}/" local/documents/

    - name: Restart all services
      community.docker.docker_compose:
        project_src: "{{ ablage_install_dir }}"
        state: present
        pull: no
        build: no

    - name: Wait for services to be healthy
      ansible.builtin.uri:
        url: "http://localhost:{{ ablage_backend_port | default(8000) }}/health"
        status_code: 200
      register: health_check
      retries: 30
      delay: 10
      until: health_check.status == 200

  post_tasks:
    - name: Verify restore completed
      ansible.builtin.debug:
        msg: |
          === Wiederherstellung Abgeschlossen ===
          Typ: {{ restore_type }}
          Status: Erfolgreich

          Die Anwendung wurde neu gestartet und ist verfügbar.

    - name: Run post-restore health check
      ansible.builtin.command:
        cmd: /usr/local/bin/ablage-health-check
      register: health_result
      ignore_errors: yes

    - name: Display health check result
      ansible.builtin.debug:
        msg: "Gesundheitsprüfung: {{ 'Erfolgreich' if health_result.rc == 0 else 'Fehlgeschlagen - Bitte manuell prüfen' }}"
