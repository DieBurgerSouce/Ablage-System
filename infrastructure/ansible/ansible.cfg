# Ablage-System Ansible Configuration
# Documentation: https://docs.ansible.com/ansible/latest/reference_appendices/config.html

[defaults]
# Inventory
inventory = inventories/dev/hosts.yml
remote_user = deploy

# Roles path
roles_path = roles

# Performance
forks = 10
pipelining = true
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 86400

# Output
stdout_callback = yaml
callback_whitelist = timer, profile_tasks
display_skipped_hosts = false
display_ok_hosts = true

# SSH - SICHERHEIT: Host-Key-Checking aktiviert für Production
# Für initiales Setup auf neuen Hosts: ANSIBLE_HOST_KEY_CHECKING=false ansible-playbook ...
host_key_checking = true
timeout = 60
# Für große Deployments mehr Zeit erlauben

# Retry files
retry_files_enabled = false

# Logging
log_path = /var/log/ansible/ablage-system.log

# Vault - SICHERHEIT: Verwende vault-id statt Plaintext-Password-File
# Option 1 (empfohlen): Vault-ID mit externem Skript
vault_identity_list = production@~/.ansible/vault-id-production.sh, staging@~/.ansible/vault-id-staging.sh

# Option 2 (Fallback): Umgebungsvariable ANSIBLE_VAULT_PASSWORD
# export ANSIBLE_VAULT_PASSWORD="..."

# ENTFERNT (unsicher): vault_password_file = ~/.vault_password
# Grund: Plaintext-Password in Home-Directory ist Sicherheitsrisiko

# Interpreter discovery
interpreter_python = auto_silent

[privilege_escalation]
become = true
become_method = sudo
become_user = root
become_ask_pass = false

[ssh_connection]
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30
control_path = %(directory)s/%%h-%%r
pipelining = true
retries = 3

[persistent_connection]
connect_timeout = 30
command_timeout = 30

[colors]
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecate = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
diff_add = green
diff_remove = red
diff_lines = cyan
