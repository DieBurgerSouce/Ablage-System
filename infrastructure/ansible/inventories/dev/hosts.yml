# Ablage-System Development Inventory
---
all:
  vars:
    ansible_user: deploy
    ansible_become: yes
    env_name: development

  children:
    docker_hosts:
      hosts:
        ablage-dev-01:
          ansible_host: 127.0.0.1
          ansible_connection: local
          nvidia_gpu_enabled: true
          node_type: standalone
      vars:
        docker_compose_project: ablage-dev

    webservers:
      hosts:
        ablage-dev-01:
      vars:
        nginx_worker_processes: 2

    monitoring:
      hosts:
        ablage-dev-01:
      vars:
        prometheus_retention_days: 7
