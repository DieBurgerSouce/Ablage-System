# Ablage-System Staging Inventory
---
all:
  vars:
    ansible_user: deploy
    ansible_become: yes
    env_name: staging

  children:
    docker_hosts:
      hosts:
        ablage-staging-01:
          ansible_host: 10.0.1.10  # Update with actual staging IP
          nvidia_gpu_enabled: true
          node_type: standalone
      vars:
        docker_compose_project: ablage-staging

    webservers:
      hosts:
        ablage-staging-01:
      vars:
        nginx_worker_processes: auto

    monitoring:
      hosts:
        ablage-staging-01:
      vars:
        prometheus_retention_days: 14
