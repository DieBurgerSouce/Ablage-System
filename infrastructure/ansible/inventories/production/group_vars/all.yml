# Ablage-System Production Environment Variables
---
# Environment
env_name: production
domain_name: ablage-system.example.com
ssl_admin_email: ops@example.com

# Installation paths
ablage_install_dir: /opt/ablage-system
ablage_log_dir: /var/log/ablage-system
ablage_backup_dir: /opt/ablage-system/backups

# Docker settings
docker_log_max_size: "100m"
docker_log_max_file: "5"
docker_compose_version: "2.24.0"

# Application settings
log_level: INFO
debug_mode: false
api_reload: false
access_token_expire_minutes: 15
refresh_token_expire_days: 7

# GPU settings
cuda_visible_devices: "0"

# Database
postgres_max_connections: 200
postgres_shared_buffers: 512MB

# Redis
redis_maxmemory: 2gb

# Rate Limiting
rate_limit_enabled: true
rate_limit_requests_per_minute: 100
rate_limit_documents_per_hour: 10
rate_limit_login_attempts: 5
rate_limit_login_window: 900

# Backup settings
backup_enabled: true
backup_retention_days: 30
backup_schedule: "0 2 * * *"  # 2 AM daily
backup_remote_enabled: true
backup_remote_target: "{{ vault_backup_remote_user }}@{{ vault_backup_remote_host }}:{{ vault_backup_remote_path }}"

# Monitoring
grafana_user: admin
prometheus_retention_days: 30
prometheus_scrape_interval: 15s

# SSL
ssl_enabled: true
ssl_use_manual_certs: true
ssl_cert_path: /etc/ssl/certs/ablage-system.crt
ssl_key_path: /etc/ssl/private/ablage-system.key
ssl_generate_dhparam: true
ssl_dhparam_size: 4096

# Security
ufw_enabled: true
fail2ban_enabled: true
ssh_port: 22
ssh_permit_root_login: "no"
ssh_password_authentication: "no"

# UFW Rules
ufw_rules:
  - { rule: allow, port: "{{ ssh_port }}", proto: tcp, comment: 'SSH' }
  - { rule: allow, port: 80, proto: tcp, comment: 'HTTP' }
  - { rule: allow, port: 443, proto: tcp, comment: 'HTTPS' }
  - { rule: allow, port: 9090, proto: tcp, from: '10.0.0.0/8', comment: 'Prometheus Internal' }
  - { rule: allow, port: 3000, proto: tcp, from: '10.0.0.0/8', comment: 'Grafana Internal' }

# Common packages
common_packages:
  - curl
  - wget
  - git
  - htop
  - vim
  - unzip
  - jq
  - rsync
  - net-tools
  - ca-certificates
  - gnupg
  - lsb-release
  - python3-pip
  - python3-docker
  - python3-venv

# Kernel parameters for Docker/GPU
kernel_params:
  vm.max_map_count: 262144
  net.core.somaxconn: 65535
  net.ipv4.ip_forward: 1
  net.ipv4.tcp_keepalive_time: 600
  net.ipv4.tcp_keepalive_intvl: 60
  net.ipv4.tcp_keepalive_probes: 10
