# Ablage-System Production Inventory
---
all:
  vars:
    ansible_user: deploy
    ansible_become: yes
    env_name: production

  children:
    docker_hosts:
      hosts:
        ablage-prod-01:
          ansible_host: 10.0.2.10  # Update with actual production IP
          nvidia_gpu_enabled: true
          node_type: primary
        # Add secondary nodes as needed:
        # ablage-prod-02:
        #   ansible_host: 10.0.2.11
        #   nvidia_gpu_enabled: true
        #   node_type: secondary
      vars:
        docker_compose_project: ablage-prod

    webservers:
      hosts:
        ablage-prod-01:
      vars:
        nginx_worker_processes: auto

    monitoring:
      hosts:
        ablage-prod-01:
      vars:
        prometheus_retention_days: 30

    backup_servers:
      hosts:
        # Define backup target server if using remote sync
        # backup-server-01:
        #   ansible_host: 10.0.3.10
