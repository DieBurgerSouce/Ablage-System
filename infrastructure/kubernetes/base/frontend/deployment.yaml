---
# =============================================================================
# Frontend Deployment (Nginx)
# Ablage-System OCR Infrastructure
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ablage-frontend
  namespace: ablage-system
  labels:
    app.kubernetes.io/name: ablage-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ablage-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ablage-frontend
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: ablage-system
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: static-files
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: frontend-config
        - name: static-files
          emptyDir: {}
