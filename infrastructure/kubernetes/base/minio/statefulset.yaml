---
# =============================================================================
# MinIO StatefulSet (S3-compatible Object Storage)
# Ablage-System OCR Infrastructure
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ablage-minio
  namespace: ablage-system
  labels:
    app.kubernetes.io/name: ablage-minio
    app.kubernetes.io/component: storage
spec:
  serviceName: ablage-minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ablage-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ablage-minio
        app.kubernetes.io/component: storage
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
        prometheus.io/path: "/minio/v2/metrics/cluster"
    spec:
      serviceAccountName: ablage-system
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-01-01T16-36-33Z
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              minio server /data --console-address ":9001"
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: ablage-secrets
                  key: minio-access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ablage-secrets
                  key: minio-secret-key
            - name: MINIO_PROMETHEUS_AUTH_TYPE
              value: "public"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: minio-data
              mountPath: /data

  volumeClaimTemplates:
    - metadata:
        name: minio-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 500Gi
