---
# =============================================================================
# Celery GPU Worker Deployment
# Ablage-System OCR Infrastructure
# =============================================================================
# This deployment runs OCR processing workers with GPU acceleration.
# Requires NVIDIA device plugin and GPU-enabled nodes.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ablage-worker
  namespace: ablage-system
  labels:
    app.kubernetes.io/name: ablage-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 1  # GPU workers are expensive, scale carefully
  selector:
    matchLabels:
      app.kubernetes.io/name: ablage-worker
  strategy:
    type: Recreate  # Only one GPU worker at a time to avoid VRAM conflicts
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ablage-worker
        app.kubernetes.io/component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9808"
    spec:
      serviceAccountName: ablage-worker
      securityContext:
        runAsUser: 0  # Root required for GPU access
        fsGroup: 0

      # GPU Node Selection
      nodeSelector:
        nvidia.com/gpu.present: "true"

      # Tolerate GPU taint
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

      initContainers:
        # Wait for dependencies
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z ablage-backend 8000; do
                echo "Warte auf Backend..."
                sleep 5
              done
              echo "Backend erreichbar!"

      containers:
        - name: worker
          image: ablage-system/worker:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.workers.celery_app
            - worker
            - --loglevel=info
            - --concurrency=1
            - --pool=solo
            - -Q
            - ocr_high,ocr_normal,default

          env:
            # Database
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ablage-secrets
                  key: database-url
            # Redis / Celery
            - name: REDIS_URL
              value: "redis://ablage-redis:6379/0"
            - name: CELERY_BROKER_URL
              value: "redis://ablage-redis:6379/0"
            - name: CELERY_RESULT_BACKEND
              value: "redis://ablage-redis:6379/1"
            # MinIO
            - name: MINIO_ENDPOINT
              value: "ablage-minio:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ablage-secrets
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ablage-secrets
                  key: minio-secret-key
            - name: MINIO_SECURE
              value: "false"
            # GPU Configuration
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            # OCR Backend Configuration
            - name: OCR_DEFAULT_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: worker-config
                  key: OCR_DEFAULT_BACKEND
            - name: GPU_MEMORY_LIMIT_PERCENT
              valueFrom:
                configMapKeyRef:
                  name: worker-config
                  key: GPU_MEMORY_LIMIT_PERCENT
            # Logging
            - name: LOG_LEVEL
              value: "INFO"
            - name: TZ
              value: "Europe/Berlin"

          resources:
            requests:
              cpu: 2000m
              memory: 16Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: 8000m
              memory: 32Gi
              nvidia.com/gpu: "1"

          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - app.workers.celery_app
                - inspect
                - ping
                - -d
                - celery@$(hostname)
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: outputs
              mountPath: /app/outputs
            - name: model-cache
              mountPath: /root/.cache
            - name: huggingface-cache
              mountPath: /root/.cache/huggingface

      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: ablage-uploads
        - name: outputs
          persistentVolumeClaim:
            claimName: ablage-outputs
        - name: model-cache
          persistentVolumeClaim:
            claimName: ablage-model-cache
        - name: huggingface-cache
          emptyDir:
            sizeLimit: 50Gi

      # Restart policy
      restartPolicy: Always
