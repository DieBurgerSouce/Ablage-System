---
# =============================================================================
# PostgreSQL Service
# Ablage-System OCR Infrastructure
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: ablage-postgres
  namespace: ablage-system
  labels:
    app.kubernetes.io/name: ablage-postgres
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
    - name: metrics
      port: 9187
      targetPort: 9187
      protocol: TCP
  selector:
    app.kubernetes.io/name: ablage-postgres
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: ablage-postgres-headless
  namespace: ablage-system
  labels:
    app.kubernetes.io/name: ablage-postgres
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: ablage-postgres
