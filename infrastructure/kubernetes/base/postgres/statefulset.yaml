---
# =============================================================================
# PostgreSQL 16 StatefulSet with pgvector Extension
# Ablage-System OCR Infrastructure
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ablage-postgres
  namespace: ablage-system
  labels:
    app.kubernetes.io/name: ablage-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: ablage-system
spec:
  serviceName: ablage-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ablage-postgres
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ablage-postgres
        app.kubernetes.io/component: database
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      serviceAccountName: ablage-system
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsGroup: 999
      terminationGracePeriodSeconds: 30

      initContainers:
        # Initialize pgvector extension
        - name: init-pgvector
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              echo "PostgreSQL wird initialisiert..."
              # pgvector wird über das Init-Script geladen
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d

      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP

          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ablage-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            # Performance tuning
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF-8 --locale=de_DE.UTF-8"

          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 8Gi

          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
            - name: postgres-config-volume
              mountPath: /etc/postgresql/conf.d

        # Postgres Exporter Sidecar for Prometheus
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          ports:
            - name: metrics
              containerPort: 9187
          env:
            - name: DATA_SOURCE_URI
              value: "localhost:5432/ablage_system?sslmode=disable"
            - name: DATA_SOURCE_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_USER
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: ablage-secrets
                  key: postgres-password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
        - name: postgres-config-volume
          configMap:
            name: postgres-config
            items:
              - key: postgresql.conf
                path: custom.conf

  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app.kubernetes.io/name: ablage-postgres
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 100Gi
