---
# =============================================================================
# Backend ConfigMap
# Ablage-System OCR Infrastructure
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ablage-system
  labels:
    app.kubernetes.io/name: ablage-backend
    app.kubernetes.io/component: api
data:
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  API_TITLE: "Ablage-System OCR API"
  API_VERSION: "1.0.0"
  CORS_ORIGINS: "*"
  MAX_UPLOAD_SIZE: "52428800"  # 50MB
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_PERIOD: "60"
---
# Shared PVCs for application data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ablage-uploads
  namespace: ablage-system
  labels:
    app.kubernetes.io/name: ablage-system
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: local-path
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ablage-outputs
  namespace: ablage-system
  labels:
    app.kubernetes.io/name: ablage-system
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: local-path
  resources:
    requests:
      storage: 50Gi
