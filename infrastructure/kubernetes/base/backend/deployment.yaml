---
# =============================================================================
# FastAPI Backend Deployment
# Ablage-System OCR Infrastructure
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ablage-backend
  namespace: ablage-system
  labels:
    app.kubernetes.io/name: ablage-backend
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ablage-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ablage-backend
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ablage-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      initContainers:
        # Wait for dependencies
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z ablage-postgres 5432; do
                echo "Warte auf PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL erreichbar!"

        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z ablage-redis 6379; do
                echo "Warte auf Redis..."
                sleep 2
              done
              echo "Redis erreichbar!"

      containers:
        - name: backend
          image: ablage-system/backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          env:
            # Database
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ablage-secrets
                  key: database-url
            # Redis
            - name: REDIS_URL
              value: "redis://ablage-redis:6379/0"
            - name: CELERY_BROKER_URL
              value: "redis://ablage-redis:6379/0"
            - name: CELERY_RESULT_BACKEND
              value: "redis://ablage-redis:6379/1"
            # MinIO
            - name: MINIO_ENDPOINT
              value: "ablage-minio:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ablage-secrets
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ablage-secrets
                  key: minio-secret-key
            - name: MINIO_SECURE
              value: "false"
            # Application
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ablage-secrets
                  key: app-secret-key
            - name: API_HOST
              value: "0.0.0.0"
            - name: API_PORT
              value: "8000"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: LOG_LEVEL
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: ENVIRONMENT
            # Timezone
            - name: TZ
              value: "Europe/Berlin"

          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: outputs
              mountPath: /app/outputs

      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: ablage-uploads
        - name: outputs
          persistentVolumeClaim:
            claimName: ablage-outputs

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ablage-backend
                topologyKey: kubernetes.io/hostname

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ablage-backend
