# pg_hba.conf - Ablage-System
#
# M-42 (Phase 0 Betriebsreife): hostssl -> host umgestellt. Der Default-
# Compose startet Postgres ohne ssl=on (ein frischer Clone crashte an den
# gitignorten Zertifikaten in infrastructure/postgres/certs/); mit reinen
# hostssl-Eintraegen wuerde Postgres dann ALLE TCP-Verbindungen ablehnen.
# Auth bleibt SCRAM-SHA-256; Postgres ist nur im Docker-data-network und
# auf 127.0.0.1:5434 erreichbar.
#
# TLS reaktivieren (zusammen mit ssl=on + Cert-Mounts im docker-compose.yml):
# 'host' unten wieder durch 'hostssl' ersetzen.
#
# TYPE  DATABASE  USER  ADDRESS       METHOD
#
# Local connections via Unix Socket (no SSL needed)
local   all       all                 peer
#
# IPv4 connections (SCRAM-SHA-256)
host    all       all   0.0.0.0/0     scram-sha-256
#
# IPv6 connections (SCRAM-SHA-256)
host    all       all   ::/0          scram-sha-256
