version: '3.8'

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ablage-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Configuration
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./snippets:/etc/nginx/snippets:ro

      # SSL certificates (Let's Encrypt)
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

      # Static files
      - ../../frontend/dist:/var/www/ablage-system:ro

      # Logs
      - nginx_logs:/var/log/nginx

      # HTTP basic auth
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
    networks:
      - ablage-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  certbot:
    image: certbot/certbot:latest
    container_name: ablage-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - ablage-network

volumes:
  certbot_conf:
    name: ablage_certbot_conf
  certbot_www:
    name: ablage_certbot_www
  nginx_logs:
    name: ablage_nginx_logs

networks:
  ablage-network:
    external: true
    name: ablage_network
