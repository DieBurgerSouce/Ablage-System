# SSL Configuration Snippet
# Include in server blocks with: include /etc/nginx/snippets/ssl.conf;
#
# Dieses Snippet konfiguriert TLS 1.2/1.3 mit starken Cipher-Suites
# fuer sichere HTTPS-Verbindungen.

# SSL protocols - nur TLS 1.2 und 1.3 (SSLv3, TLS 1.0/1.1 sind unsicher)
ssl_protocols TLSv1.2 TLSv1.3;

# SSL ciphers (strong ciphers only - AEAD-basiert)
# Reihenfolge: ECDHE > DHE, AES-GCM > ChaCha20
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

# Prefer server ciphers
ssl_prefer_server_ciphers on;

# SSL session cache
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;
ssl_session_tickets off;

# OCSP stapling
ssl_stapling on;
ssl_stapling_verify on;
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# DH parameters fuer DHE-Cipher-Suites (Perfect Forward Secrecy)
# ============================================================================
# WICHTIG: Diese Datei wird beim Docker-Build automatisch generiert!
#
# Die Dockerfile generiert standardmaessig 2048-bit DH-Parameter (schneller Build).
# Fuer Produktion wird 4096-bit empfohlen:
#
# Option 1: Beim Docker-Build mit Build-Argument:
#   docker build --build-arg DH_PARAM_BITS=4096 -t ablage-nginx .
#
# Option 2: Vorab generieren und COPY verwenden (empfohlen fuer CI/CD):
#   openssl dhparam -out dhparam.pem 4096   # Dauert ca. 5 Minuten
#   # Dann in Dockerfile: COPY dhparam.pem /etc/nginx/dhparam.pem
#
# Option 3: Mit setup-nginx.sh generieren:
#   ./infrastructure/nginx/setup-nginx.sh
#
# HINWEIS: Falls die Datei nicht existiert, schlaegt der Nginx-Start fehl.
# Bei Entwicklung ohne SSL kann diese Zeile auskommentiert werden.
# ============================================================================
ssl_dhparam /etc/nginx/dhparam.pem;
