# =============================================================================
# IP-Whitelist Snippet fuer Monitoring-Dienste (Grafana, Prometheus)
# Ablage-System OCR - Infrastructure Hardening
# =============================================================================
#
# Dieses Snippet definiert erlaubte IP-Bereiche fuer Admin-Zugriff auf
# Monitoring-Dienste wie Grafana und Prometheus.
#
# Verwendung in server blocks:
#   include /etc/nginx/snippets/ip-whitelist-monitoring.conf;
#
# =============================================================================

# Geo-Mapping fuer IP-Whitelisting
# Erlaubt flexibles Allow/Deny basierend auf Client-IP
geo $monitoring_access {
    default        0;

    # === Lokale Entwicklung ===
    127.0.0.0/8    1;    # Localhost
    ::1            1;    # IPv6 Localhost

    # === Docker-Netzwerke ===
    172.16.0.0/12  1;    # Docker Bridge Networks
    172.28.0.0/16  1;    # Ablage-System Docker Networks

    # === Internes Netzwerk (anpassen!) ===
    # Typische interne Netzwerkbereiche
    10.0.0.0/8     1;    # Klasse A privat
    192.168.0.0/16 1;    # Klasse C privat

    # === VPN-Netzwerk (anpassen!) ===
    # Beispiel: WireGuard oder OpenVPN Netzwerk
    # 10.10.0.0/24   1;    # VPN-Clients

    # === Spezifische Admin-IPs (anpassen!) ===
    # Hier koennen einzelne Admin-IPs hinzugefuegt werden:
    # 203.0.113.50   1;    # Admin Workstation 1
    # 198.51.100.25  1;    # Admin Workstation 2

    # === Office-Netzwerk (anpassen!) ===
    # Beispiel: Buero-Netzwerk mit statischer IP
    # 198.51.100.0/24 1;   # Buero-Netzwerk
}

# Variablen fuer error_page Handling
# $monitoring_denied wird 1 wenn IP nicht erlaubt
map $monitoring_access $monitoring_denied {
    0   1;
    1   0;
    default 1;
}
