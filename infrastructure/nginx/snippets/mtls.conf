# mTLS (Mutual TLS) Configuration Snippet
# Include in server blocks with: include /etc/nginx/snippets/mtls.conf;
#
# SECURITY: Erfordert Client-Zertifikate fuer Inter-Service-Kommunikation
# Verwendung:
#   - API-zu-API Kommunikation
#   - Worker-zu-Backend Kommunikation
#   - Admin-Endpoints
#
# Zertifikate erstellen:
#   # CA erstellen
#   openssl genrsa -out ca.key 4096
#   openssl req -x509 -new -nodes -key ca.key -sha256 -days 3650 -out ca.crt \
#       -subj "/CN=Ablage-System Internal CA"
#
#   # Client-Zertifikat erstellen
#   openssl genrsa -out client.key 2048
#   openssl req -new -key client.key -out client.csr \
#       -subj "/CN=ablage-worker"
#   openssl x509 -req -in client.csr -CA ca.crt -CAkey ca.key \
#       -CAcreateserial -out client.crt -days 365 -sha256

# ============================================================================
# Client Certificate Verification (mTLS)
# ============================================================================

# CA-Zertifikat fuer Client-Verifizierung
ssl_client_certificate /etc/nginx/certs/ca.crt;

# Client-Zertifikat erforderlich (strict mTLS)
# Optionen:
#   - on: Zertifikat erforderlich
#   - optional: Zertifikat optional, aber verifiziert wenn vorhanden
#   - optional_no_ca: Zertifikat optional, keine CA-Verifizierung
ssl_verify_client on;

# Verifizierungstiefe (Certificate Chain Depth)
ssl_verify_depth 2;

# ============================================================================
# Headers fuer Backend-Weiterleitung
# ============================================================================

# Client-Zertifikat Informationen als Header weiterleiten
# Backend kann diese zur Autorisierung nutzen

# Subject Distinguished Name (z.B. CN=ablage-worker)
proxy_set_header X-SSL-Client-S-DN $ssl_client_s_dn;

# Issuer Distinguished Name
proxy_set_header X-SSL-Client-I-DN $ssl_client_i_dn;

# Client Certificate Serial Number
proxy_set_header X-SSL-Client-Serial $ssl_client_serial;

# Verifizierungsstatus (SUCCESS, FAILED:reason, NONE)
proxy_set_header X-SSL-Client-Verify $ssl_client_verify;

# Fingerprint (SHA1)
proxy_set_header X-SSL-Client-Fingerprint $ssl_client_fingerprint;

# Gueltigkeitsdatum
proxy_set_header X-SSL-Client-V-End $ssl_client_v_end;

# ============================================================================
# CRL (Certificate Revocation List) - Optional
# ============================================================================

# CRL-Datei fuer Zertifikats-Widerruf
# ssl_crl /etc/nginx/certs/ca.crl;

# ============================================================================
# OCSP Stapling fuer Client-Zertifikate - Optional
# ============================================================================

# Fuer Client-Zertifikate normalerweise nicht verwendet,
# aber verfuegbar wenn externe CA verwendet wird
# ssl_ocsp leaf;
# ssl_ocsp_responder http://ocsp.example.com;
