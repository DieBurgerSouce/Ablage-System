# Security Headers Snippet
# Include in server blocks with: include /etc/nginx/snippets/security-headers.conf;

# Prevent clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# XSS Protection
add_header X-XSS-Protection "1; mode=block" always;

# Referrer Policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Content Security Policy
# CSP-Haertung (G16): 'unsafe-inline' aus script-src ENTFERNT - der Production-Build enthaelt
# keine Inline-Scripts (Entry ist externes Modul, PWA-SW-Registrierung ueber gebundeltes JS,
# offline.html nutzt ausgelagertes /offline.js). style-src 'unsafe-inline' bleibt bewusst
# erhalten: React-Inline-Styles (style={{...}}) und Swagger-UI benoetigen Inline-CSS.
# base-uri 'self' + object-src 'none' als zusaetzliche Haertung.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'self'; base-uri 'self'; object-src 'none';" always;

# Permissions Policy (formerly Feature-Policy)
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

# HSTS (HTTP Strict Transport Security)
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Cross-Origin Policies (moderne Sicherheitsstandards)
# COOP - Isoliert browsing context von Cross-Origin Dokumenten
add_header Cross-Origin-Opener-Policy "same-origin" always;

# COEP - Erfordert CORS/CORP fuer Cross-Origin Ressourcen
# Hinweis: 'require-corp' kann externe Ressourcen blockieren, 'credentialless' ist flexibler
add_header Cross-Origin-Embedder-Policy "credentialless" always;

# CORP - Beschraenkt Ressourcen-Laden auf same-origin
add_header Cross-Origin-Resource-Policy "same-origin" always;

# Verhindert Adobe Cross-Domain Policy Probleme
add_header X-Permitted-Cross-Domain-Policies "none" always;

# Cache-Control fuer sensitive Daten (API responses)
# Hinweis: Wird in location blocks ueberschrieben wo noetig
add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
