# Upstream configuration for backend API
upstream backend {
    server backend:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# M-14 (Phase 0 Betriebsreife): HTTP -> HTTPS.
# Dieser :80-Block leitet ALLES per 301 auf HTTPS um — mit Ausnahme der
# Container-/Monitoring-Healthchecks (/health, /api/v1/monitoring/health),
# die weiterhin unverschluesselt beantwortet werden (Docker-Healthchecks
# duerfen keinem Redirect folgen muessen).
# Die eigentliche HTTPS-Site (443) liegt in ablage-system.conf
# (server_name ablage.firmenich.lan, Zertifikate aus /etc/nginx/ssl/,
# erzeugt via scripts/generate-lan-tls.sh); die Security-Header-Includes
# (inkl. CSP, W1-022-Nachtrag) wirken dort auf allen ausgelieferten Inhalten.
server {
    listen 80 default_server;
    server_name localhost ablage-system.local;

    # Nginx-/Container-Healthcheck (bleibt auf HTTP erreichbar)
    location = /health {
        proxy_pass http://backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Monitoring-Healthcheck (bleibt auf HTTP erreichbar)
    location = /api/v1/monitoring/health {
        proxy_pass http://backend/api/v1/monitoring/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Alles andere: permanenter Redirect auf HTTPS
    # ($host statt $server_name: behaelt den angefragten Hostnamen bei;
    # localhost + 127.0.0.1 sind als SAN im LAN-Zertifikat enthalten)
    location / {
        return 301 https://$host$request_uri;
    }
}

