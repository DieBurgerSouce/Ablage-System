# Ablage-System OCR - Main Site Configuration
# Production reverse proxy for API and frontend

# Rate limit zones for different endpoints
map $request_uri $is_upload {
    ~^/api/v1/documents/$ 1;
    default 0;
}

map $request_uri $is_auth {
    ~^/api/v1/auth/ 1;
    default 0;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name ablage-system.local www.ablage-system.local;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ablage-system.local www.ablage-system.local;

    # SSL certificates (will be configured by certbot)
    ssl_certificate /etc/letsencrypt/live/ablage-system.local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ablage-system.local/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/ablage-system.local/chain.pem;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:;" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Logging
    access_log /var/log/nginx/ablage-system-access.log detailed;
    error_log /var/log/nginx/ablage-system-error.log;

    # Root directory for static files
    root /var/www/ablage-system;
    index index.html;

    # Connection limiting
    limit_conn addr 50;

    # Frontend (SPA)
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # No cache for HTML
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        }
    }

    # API endpoints
    location /api/ {
        # Rate limiting (100 req/min per IP)
        limit_req zone=api_limit burst=20 nodelay;

        # Proxy to backend
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Keep-alive
        proxy_set_header Connection "";
    }

    # Document upload endpoint (higher limits, lower rate limit)
    location /api/v1/documents/ {
        # Rate limiting (10 uploads/min per IP)
        limit_req zone=upload_limit burst=5 nodelay;

        # Increased body size for document uploads
        client_max_body_size 50m;
        client_body_timeout 120s;

        # Proxy to backend
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (extended for large uploads)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Disable buffering for uploads
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Authentication endpoints (stricter rate limiting)
    location /api/v1/auth/ {
        # Rate limiting (5 req/min per IP)
        limit_req zone=auth_limit burst=3 nodelay;

        # Proxy to backend
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # WebSocket support (for real-time updates)
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (extended for long-lived connections)
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # WebSocket support for Chat Collaboration API
    location /api/v1/rag/ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (extended for long-lived connections)
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # API documentation (Swagger UI / ReDoc)
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Metrics endpoint (restrict access)
    location /metrics {
        # Only allow from internal networks
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Grafana (monitoring dashboard)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grafana.ablage-system.local;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/ablage-system.local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ablage-system.local/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Logging
    access_log /var/log/nginx/grafana-access.log;
    error_log /var/log/nginx/grafana-error.log;

    # Proxy to Grafana
    location / {
        proxy_pass http://grafana;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Grafana Live
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Prometheus (metrics)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name prometheus.ablage-system.local;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/ablage-system.local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ablage-system.local/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Logging
    access_log /var/log/nginx/prometheus-access.log;
    error_log /var/log/nginx/prometheus-error.log;

    # Basic auth (configure with htpasswd)
    auth_basic "Prometheus Access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Proxy to Prometheus
    location / {
        proxy_pass http://prometheus;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
