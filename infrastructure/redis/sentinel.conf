# Redis Sentinel Configuration - Ablage-System HA
# Aktivieren mit: docker-compose --profile ha up -d
#
# Sentinel ueberwacht den Redis-Master und fuehrt automatisches
# Failover durch, wenn der Master nicht erreichbar ist.

port 26379

# Master-Monitoring: sentinel monitor <master-name> <ip> <port> <quorum>
# Quorum = 2: Mindestens 2 von 3 Sentinels muessen zustimmen
sentinel monitor mymaster redis 6379 2

# Failover nach 10 Sekunden Nicht-Erreichbarkeit
sentinel down-after-milliseconds mymaster 10000

# Timeout fuer Failover-Prozess (3 Minuten)
sentinel failover-timeout mymaster 180000

# Nur 1 Replica gleichzeitig synchronisieren (weniger Last)
sentinel parallel-syncs mymaster 1

# Sentinel kann nicht von aussen erreicht werden
sentinel deny-scripts-reconfig yes
