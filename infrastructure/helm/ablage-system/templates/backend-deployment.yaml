{{- if .Values.backend.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ablage-system.fullname" . }}-backend
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ablage-system.backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ablage-system.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ablage-system.backend.selectorLabels" . | nindent 8 }}
        prometheus.io/scrape: "true"
      annotations:
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "ablage-system.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "ablage-system.fullname" . }}-postgresql 5432; do
                echo "Warte auf PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL ist bereit!"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "ablage-system.fullname" . }}-redis 6379; do
                echo "Warte auf Redis..."
                sleep 2
              done
              echo "Redis ist bereit!"
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: {{ include "ablage-system.databaseUrl" . | quote }}
            - name: REDIS_URL
              value: {{ include "ablage-system.redisUrl" . | quote }}
            - name: MINIO_ENDPOINT
              value: {{ include "ablage-system.minioEndpoint" . | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ablage-system.secretName" . }}
                  key: postgres-password
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ablage-system.secretName" . }}
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ablage-system.secretName" . }}
                  key: minio-secret-key
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ablage-system.secretName" . }}
                  key: app-secret-key
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.backend.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: outputs
              mountPath: /app/outputs
      volumes:
        - name: uploads
          {{- if .Values.persistence.uploads.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ablage-system.fullname" . }}-uploads
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: outputs
          {{- if .Values.persistence.outputs.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ablage-system.fullname" . }}-outputs
          {{- else }}
          emptyDir: {}
          {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "ablage-system.backend.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
{{- end }}
