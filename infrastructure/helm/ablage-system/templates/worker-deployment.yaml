{{- if .Values.worker.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ablage-system.fullname" . }}-worker
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ablage-system.worker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "ablage-system.worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ablage-system.worker.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ablage-system.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "ablage-system.fullname" . }}-backend 8000; do
                echo "Warte auf Backend..."
                sleep 2
              done
              echo "Backend ist bereit!"
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command:
            - celery
            - -A
            - app.workers.celery_app
            - worker
            - --loglevel=info
            - --concurrency=1
            - --pool=solo
          env:
            - name: DATABASE_URL
              value: {{ include "ablage-system.databaseUrl" . | quote }}
            - name: REDIS_URL
              value: {{ include "ablage-system.redisUrl" . | quote }}
            - name: MINIO_ENDPOINT
              value: {{ include "ablage-system.minioEndpoint" . | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ablage-system.secretName" . }}
                  key: postgres-password
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ablage-system.secretName" . }}
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ablage-system.secretName" . }}
                  key: minio-secret-key
            {{- range $key, $value := .Values.worker.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            requests:
              {{- toYaml .Values.worker.resources.requests | nindent 14 }}
              {{- if .Values.worker.gpu.enabled }}
              {{ .Values.worker.gpu.type }}: {{ .Values.worker.gpu.count | quote }}
              {{- end }}
            limits:
              {{- toYaml .Values.worker.resources.limits | nindent 14 }}
              {{- if .Values.worker.gpu.enabled }}
              {{ .Values.worker.gpu.type }}: {{ .Values.worker.gpu.count | quote }}
              {{- end }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: outputs
              mountPath: /app/outputs
            - name: model-cache
              mountPath: /app/models
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: uploads
          {{- if .Values.persistence.uploads.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ablage-system.fullname" . }}-uploads
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: outputs
          {{- if .Values.persistence.outputs.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ablage-system.fullname" . }}-outputs
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: model-cache
          {{- if .Values.persistence.modelCache.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ablage-system.fullname" . }}-model-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
{{- end }}
