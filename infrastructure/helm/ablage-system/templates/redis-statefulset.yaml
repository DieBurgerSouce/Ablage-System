{{- if and .Values.redis.enabled (not .Values.redis.external.enabled) }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ablage-system.fullname" . }}-redis
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ablage-system.redis.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "ablage-system.fullname" . }}-redis-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ablage-system.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ablage-system.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: cache
        {{- if .Values.monitoring.prometheus.scrape }}
        prometheus.io/scrape: "true"
        {{- end }}
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - /etc/redis/redis.conf
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.redis.master.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/redis
        {{- if .Values.redis.metrics.enabled }}
        - name: metrics
          image: oliver006/redis_exporter:v1.55.0
          ports:
            - containerPort: 9121
              name: metrics
          env:
            - name: REDIS_ADDR
              value: "redis://localhost:6379"
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "ablage-system.fullname" . }}-redis-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.master.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ablage-system.fullname" . }}-redis-headless
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ablage-system.redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 6379
      targetPort: redis
      name: redis
  selector:
    app.kubernetes.io/name: {{ include "ablage-system.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: cache
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ablage-system.fullname" . }}-redis-config
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ablage-system.redis.labels" . | nindent 4 }}
data:
  redis.conf: |
    # Ablage-System Redis Configuration
    bind 0.0.0.0
    port 6379

    # Persistence
    appendonly yes
    appendfsync everysec

    # Memory management
    maxmemory 1gb
    maxmemory-policy allkeys-lru

    # Performance
    tcp-keepalive 300
    timeout 0
{{- end }}
