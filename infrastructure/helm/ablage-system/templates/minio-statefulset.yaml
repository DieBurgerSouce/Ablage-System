{{- if and .Values.minio.enabled (not .Values.minio.external.enabled) }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ablage-system.fullname" . }}-minio
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ablage-system.minio.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "ablage-system.fullname" . }}-minio-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ablage-system.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: storage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ablage-system.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: storage
    spec:
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "ablage-system.secretName" . }}
                  key: minio-access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ablage-system.secretName" . }}
                  key: minio-secret-key
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.minio.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ablage-system.fullname" . }}-minio-headless
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ablage-system.minio.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 9000
      targetPort: api
      name: api
    - port: 9001
      targetPort: console
      name: console
  selector:
    app.kubernetes.io/name: {{ include "ablage-system.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: storage
{{- end }}
