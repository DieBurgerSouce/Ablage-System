# Docker Compose fuer Distributed Tracing Infrastructure
#
# Komponenten:
# - Jaeger: UI und Query Service
# - OpenTelemetry Collector: Trace-Sammlung und -Export
# - Tempo (optional): Langzeit-Speicherung
#
# Usage:
#   docker-compose -f docker-compose.yml -f infrastructure/tracing/docker-compose.tracing.yml up -d
#
# Ports:
#   - 16686: Jaeger UI
#   - 4317: OTLP gRPC (Traces)
#   - 4318: OTLP HTTP (Traces)
#   - 14250: Jaeger gRPC
#   - 14268: Jaeger HTTP

version: '3.8'

services:
  # =========================================================================
  # Jaeger All-in-One (Development/Staging)
  # =========================================================================
  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: ablage-jaeger
    restart: unless-stopped
    environment:
      # Collector Konfiguration
      COLLECTOR_OTLP_ENABLED: "true"
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"

      # Speicher (In-Memory fuer Development)
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key

      # Sampling
      SAMPLING_STRATEGIES_FILE: /etc/jaeger/sampling.json

      # UI Konfiguration
      JAEGER_DISABLED: "false"
      LOG_LEVEL: info

    ports:
      # Jaeger UI
      - "16686:16686"
      # OTLP gRPC
      - "4317:4317"
      # OTLP HTTP
      - "4318:4318"
      # Jaeger Thrift (compact)
      - "6831:6831/udp"
      # Jaeger Thrift (binary)
      - "6832:6832/udp"
      # Jaeger gRPC
      - "14250:14250"
      # Jaeger HTTP
      - "14268:14268"
      # Zipkin (kompatibel)
      - "9411:9411"

    volumes:
      - jaeger-data:/badger
      - ./jaeger/sampling.json:/etc/jaeger/sampling.json:ro

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - ablage-network

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jaeger.rule=Host(`jaeger.localhost`)"
      - "traefik.http.services.jaeger.loadbalancer.server.port=16686"

  # =========================================================================
  # OpenTelemetry Collector (Production-Ready)
  # =========================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.88.0
    container_name: ablage-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]

    volumes:
      - ./otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro

    ports:
      # OTLP gRPC receiver
      - "4319:4317"
      # OTLP HTTP receiver
      - "4320:4318"
      # Prometheus metrics
      - "8888:8888"
      # Health check
      - "13133:13133"

    depends_on:
      - jaeger

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - ablage-network

volumes:
  jaeger-data:
    driver: local

networks:
  ablage-network:
    external: true
