# Promtail Configuration - Ablage-System OCR
# Comprehensive log collection and processing for Loki
# German language support, security-focused logging

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: tenant1
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10
    external_labels:
      environment: production
      cluster: ablage-system

scrape_configs:
  # ============================================================================
  # Backend Application Logs (FastAPI/Uvicorn)
  # ============================================================================
  - job_name: ablage-backend
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/ablage-backend'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        target_label: container
        replacement: backend
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: logstream
      - action: labelmap
        regex: __meta_docker_container_label_(.+)
    pipeline_stages:
      # Parse JSON structured logs (structlog format)
      - json:
          expressions:
            level: level
            event: event
            logger: logger
            timestamp: timestamp
            request_id: request_id
            user_id: user_id
            document_id: document_id
            duration_ms: duration_ms
      # Extract labels from JSON fields
      - labels:
          level:
          event:
          logger:
      # Timestamp extraction
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - '2006-01-02T15:04:05.000Z'
            - '2006-01-02 15:04:05'
      # Security event detection
      - match:
          selector: '{container="backend"}'
          stages:
            - regex:
                expression: '(?i)(SQL.?injection|XSS|CSRF|unauthorized|forbidden|authentication.?fail)'
            - labels:
                security_event: 'true'
      # PII redaction for sensitive fields
      - replace:
          expression: '(email["\s:=]+)[^\s",}]+@[^\s",}]+'
          replace: '${1}[REDACTED_EMAIL]'
      - replace:
          expression: '(password|secret|token|api.?key)["\s:=]+[^\s",}]+'
          replace: '${1}[REDACTED]'

  # ============================================================================
  # Celery Worker Logs (OCR Processing)
  # ============================================================================
  - job_name: ablage-worker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/ablage-worker'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        target_label: container
        replacement: worker
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: logstream
    pipeline_stages:
      # Parse JSON structured logs
      - json:
          expressions:
            level: level
            event: event
            task_name: task_name
            task_id: task_id
            document_id: document_id
            ocr_backend: ocr_backend
            processing_time_ms: processing_time_ms
            gpu_memory_mb: gpu_memory_mb
            status: status
      - labels:
          level:
          task_name:
          ocr_backend:
          status:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - '2006-01-02T15:04:05.000Z'
      # OCR-specific metric extraction
      - metrics:
          ocr_processing_duration:
            type: Histogram
            description: "OCR processing time in milliseconds"
            source: processing_time_ms
            config:
              buckets: [100, 500, 1000, 2000, 5000, 10000, 30000]
          gpu_memory_usage:
            type: Gauge
            description: "GPU memory usage in MB"
            source: gpu_memory_mb
            config:
              action: set

  # ============================================================================
  # Nginx Access Logs
  # ============================================================================
  - job_name: nginx-access
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/ablage-nginx'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        target_label: container
        replacement: nginx
    pipeline_stages:
      # Parse combined log format
      - regex:
          expression: '^(?P<remote_addr>[\d.]+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<method>\w+) (?P<request_path>[^\s]+) (?P<protocol>[^"]+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'
      - labels:
          method:
          status:
          request_path:
      # Security: Detect suspicious request patterns
      - match:
          selector: '{container="nginx"}'
          stages:
            - regex:
                expression: '(?i)(union|select|insert|drop|delete|script|alert|onerror)'
            - labels:
                suspicious_request: 'true'
      # HTTP status metrics
      - metrics:
          http_requests_total:
            type: Counter
            description: "Total HTTP requests"
            source: status
            config:
              action: inc
              match_all: true

  # ============================================================================
  # PostgreSQL Logs
  # ============================================================================
  - job_name: postgres
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/ablage-postgres'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        target_label: container
        replacement: postgres
    pipeline_stages:
      # Parse PostgreSQL log format
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+ \w+) \[(?P<pid>\d+)\] (?P<level>\w+):  (?P<message>.*)'
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: '2006-01-02 15:04:05.000 MST'
      # Detect slow queries
      - match:
          selector: '{container="postgres"}'
          stages:
            - regex:
                expression: 'duration: (?P<duration_ms>[\d.]+) ms'
            - labels:
                slow_query:
            - template:
                source: slow_query
                template: '{{ if gt (float64 .duration_ms) 1000.0 }}true{{ else }}false{{ end }}'

  # ============================================================================
  # Redis Logs
  # ============================================================================
  - job_name: redis
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/ablage-redis'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        target_label: container
        replacement: redis
    pipeline_stages:
      - regex:
          expression: '^(?P<pid>\d+):(?P<role>\w) (?P<timestamp>\d{2} \w+ \d{4} \d{2}:\d{2}:\d{2}\.\d+) (?P<level>[\*#\-\.]) (?P<message>.*)'
      - labels:
          role:
          level:

  # ============================================================================
  # MinIO Logs
  # ============================================================================
  - job_name: minio
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/ablage-minio'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        target_label: container
        replacement: minio
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            api: api
            time: time
            remotehost: remotehost
            requestID: requestID
            bucket: bucket
            object: object
      - labels:
          level:
          api:
          bucket:

  # ============================================================================
  # Security Audit Logs (Special Handling)
  # ============================================================================
  - job_name: security-audit
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/ablage-backend'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        target_label: container
        replacement: security-audit
    pipeline_stages:
      - json:
          expressions:
            event: event
            user_id: user_id
            ip_address: ip_address
            action: action
            resource: resource
            result: result
            timestamp: timestamp
      # Only keep security-relevant events
      - match:
          selector: '{container="security-audit"}'
          stages:
            - regex:
                expression: '(login|logout|permission|access|auth|token|api.?key|password)'
            - labels:
                audit_event: 'true'
      - labels:
          event:
          action:
          result:

  # ============================================================================
  # A/B Testing Vector Search Logs
  # Erfasst alle Vector-Suchen fuer A/B Testing Analyse (Qdrant vs pgvector)
  # ============================================================================
  - job_name: ab-testing-vector
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/ablage-backend'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        target_label: container
        replacement: ab-testing
    pipeline_stages:
      # Parse JSON structured logs
      - json:
          expressions:
            event: event
            variant: variant
            backend: backend
            latency_ms: latency_ms
            success: success
            error: error
            traffic_split: traffic_split
            query_id: query_id
            results_count: results_count
            timestamp: timestamp
      # Nur A/B Testing Events behalten
      - match:
          selector: '{container="ab-testing"}'
          stages:
            - regex:
                expression: '(vector_search|ab_testing|variant_selection)'
            - labels:
                ab_testing_event: 'true'
      # Labels fuer Filterung
      - labels:
          event:
          variant:
          backend:
          success:
      # Timestamp extraction
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - '2006-01-02T15:04:05.000Z'
            - '2006-01-02 15:04:05'
      # Metriken aus Logs extrahieren (Backup fuer Prometheus)
      - metrics:
          ab_testing_search_duration:
            type: Histogram
            description: "A/B Testing Vector-Suche Latenz in Millisekunden"
            source: latency_ms
            config:
              buckets: [10, 25, 50, 100, 250, 500, 1000, 2500, 5000]
          ab_testing_results_count:
            type: Histogram
            description: "Anzahl der Suchergebnisse"
            source: results_count
            config:
              buckets: [0, 1, 5, 10, 20, 50, 100]

  # ============================================================================
  # A/B Testing Konfigurationsaenderungen (Audit Trail)
  # ============================================================================
  - job_name: ab-testing-config
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/ablage-backend'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        target_label: container
        replacement: ab-testing-config
    pipeline_stages:
      - json:
          expressions:
            event: event
            user_id: user_id
            user_email: user_email
            old_traffic_split: old_traffic_split
            new_traffic_split: new_traffic_split
            action: action
            timestamp: timestamp
      # Nur Konfigurationsaenderungen behalten
      - match:
          selector: '{container="ab-testing-config"}'
          stages:
            - regex:
                expression: '(traffic_split_changed|ab_testing_enabled|ab_testing_disabled|metrics_reset)'
            - labels:
                config_change: 'true'
      - labels:
          event:
          action:
          user_email:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  # ============================================================================
