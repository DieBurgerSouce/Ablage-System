# Alertmanager Configuration - Ablage-System OCR
# Minimale funktionierende Konfiguration ohne externe Webhooks
# Kann spaeter mit SMTP und Teams erweitert werden

global:
  resolve_timeout: 5m

# Routing tree
route:
  receiver: 'null-receiver'
  group_by: ['alertname', 'cluster', 'service', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  # Child routes based on severity
  routes:
    # Critical alerts
    - match:
        severity: critical
      receiver: 'null-receiver'
      group_wait: 10s
      repeat_interval: 15m

    # High severity alerts
    - match:
        severity: high
      receiver: 'null-receiver'
      group_wait: 1m
      repeat_interval: 1h

    # Warning severity
    - match:
        severity: warning
      receiver: 'null-receiver'
      group_wait: 5m
      repeat_interval: 4h

# Alert receivers - Null receiver (no external notifications)
# Add real receivers when SMTP/Teams is configured
receivers:
  - name: 'null-receiver'
    # Empty receiver - alerts are received but not forwarded
    # Configure email_configs or webhook_configs when ready

# Inhibition rules
inhibit_rules:
  # Critical alerts suppress warnings
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']

  # High alerts suppress warnings
  - source_match:
      severity: 'high'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
