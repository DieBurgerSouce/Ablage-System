# Prometheus Alerting Rules fuer OCR-Verarbeitung
# Alle Beschreibungen auf Deutsch fuer Betriebsteam

groups:
  - name: ocr_alerts
    rules:
      # Kritisch: OCR Backend nicht erreichbar
      - alert: OCRBackendDown
        expr: up{job="ablage-backend"} == 0
        for: 1m
        labels:
          severity: critical
          component: ocr
        annotations:
          summary: "OCR Backend nicht erreichbar"
          description: "Das OCR Backend ({{ $labels.instance }}) ist seit mehr als 1 Minute nicht erreichbar."
          runbook_url: "https://wiki.ablage-system.local/runbooks/ocr-backend-down"

      # Warnung: Hohe OCR-Verarbeitungszeit (95. Perzentil > 10s)
      - alert: OCRProcessingSlowHigh
        expr: histogram_quantile(0.95, rate(ablage_ocr_processing_duration_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
          component: ocr
        annotations:
          summary: "OCR Verarbeitung langsam"
          description: "95% der OCR-Verarbeitungen dauern laenger als 10 Sekunden. Aktuell: {{ $value | humanizeDuration }}"
          runbook_url: "https://wiki.ablage-system.local/runbooks/ocr-slow"

      # Kritisch: Sehr hohe OCR-Verarbeitungszeit (95. Perzentil > 30s)
      - alert: OCRProcessingVerySlow
        expr: histogram_quantile(0.95, rate(ablage_ocr_processing_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: critical
          component: ocr
        annotations:
          summary: "OCR Verarbeitung extrem langsam"
          description: "95% der OCR-Verarbeitungen dauern laenger als 30 Sekunden. System stark beeintraechtigt."
          runbook_url: "https://wiki.ablage-system.local/runbooks/ocr-very-slow"

      # Warnung: Hohe OCR Fehlerrate (>10%)
      - alert: OCRErrorRateHigh
        expr: |
          rate(ablage_ocr_requests_total{status="error"}[5m])
          / rate(ablage_ocr_requests_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          component: ocr
        annotations:
          summary: "Hohe OCR Fehlerrate"
          description: "Mehr als 10% der OCR-Anfragen schlagen fehl. Aktuelle Fehlerrate: {{ $value | humanizePercentage }}"
          runbook_url: "https://wiki.ablage-system.local/runbooks/ocr-error-rate"

      # Kritisch: Sehr hohe OCR Fehlerrate (>25%)
      - alert: OCRErrorRateCritical
        expr: |
          rate(ablage_ocr_requests_total{status="error"}[5m])
          / rate(ablage_ocr_requests_total[5m]) > 0.25
        for: 2m
        labels:
          severity: critical
          component: ocr
        annotations:
          summary: "KRITISCH: OCR Fehlerrate ueber 25%"
          description: "Mehr als 25% der OCR-Anfragen schlagen fehl. Sofortige Untersuchung erforderlich."
          runbook_url: "https://wiki.ablage-system.local/runbooks/ocr-error-critical"

      # Warnung: GPU Speicher hoch (>85%)
      # Verwendet DCGM-Metriken: FB_USED / (FB_USED + FB_FREE)
      - alert: GPUMemoryHigh
        expr: DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE) > 0.85
        for: 5m
        labels:
          severity: warning
          component: gpu
        annotations:
          summary: "GPU Speicher hoch (>85%)"
          description: "GPU Speicherauslastung bei {{ $value | humanizePercentage }}. Moegliche OOM-Gefahr."
          runbook_url: "https://wiki.ablage-system.local/runbooks/gpu-memory-high"

      # Kritisch: GPU Speicher kritisch (>95%)
      - alert: GPUMemoryCritical
        expr: DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE) > 0.95
        for: 2m
        labels:
          severity: critical
          component: gpu
        annotations:
          summary: "KRITISCH: GPU Speicher fast voll (>95%)"
          description: "GPU Speicher fast erschoepft. OOM-Fehler wahrscheinlich. Sofortige Massnahmen erforderlich."
          runbook_url: "https://wiki.ablage-system.local/runbooks/gpu-memory-critical"

      # Warnung: OCR Warteschlange zu lang
      - alert: OCRQueueBacklog
        expr: ablage_ocr_queue_length > 100
        for: 10m
        labels:
          severity: warning
          component: ocr
        annotations:
          summary: "OCR Warteschlange zu lang"
          description: "Die OCR-Warteschlange hat {{ $value }} wartende Dokumente. Verarbeitung verzögert."
          runbook_url: "https://wiki.ablage-system.local/runbooks/ocr-queue-backlog"

      # Warnung: Kein OCR-Traffic (moeglicher Ausfall)
      - alert: OCRNoTraffic
        expr: rate(ablage_ocr_requests_total[15m]) == 0
        for: 30m
        labels:
          severity: warning
          component: ocr
        annotations:
          summary: "Kein OCR-Traffic seit 30 Minuten"
          description: "Keine OCR-Anfragen in den letzten 30 Minuten. Moeglicherweise ein Systemausfall."
          runbook_url: "https://wiki.ablage-system.local/runbooks/ocr-no-traffic"

      # Info: OCR Backend Fallback aktiv (basierend auf Fallback-Rate)
      - alert: OCRFallbackActive
        expr: rate(ablage_ocr_fallbacks_total[5m]) > 0
        for: 5m
        labels:
          severity: info
          component: ocr
        annotations:
          summary: "OCR verwendet Fallback-Backend"
          description: "OCR-Fallbacks werden verwendet. Von {{ $labels.from_backend }} zu {{ $labels.to_backend }}. Grund: {{ $labels.reason }}"
          runbook_url: "https://wiki.ablage-system.local/runbooks/ocr-fallback"

      # ===================================================================
      # Backend Health Alerts
      # ===================================================================
      # HINWEIS: ocr_backend_healthy Metriken muessen noch implementiert werden.
      # Die folgenden Alerts werden aktiviert, sobald die Metriken verfuegbar sind.

      # Warnung: Hohe Fallback-Rate
      - alert: OCRHighFallbackRate
        expr: |
          rate(ablage_ocr_fallbacks_total[5m])
          / rate(ablage_ocr_requests_total[5m]) > 0.2
        for: 10m
        labels:
          severity: warning
          component: ocr
        annotations:
          summary: "Hohe OCR Fallback-Rate"
          description: "Mehr als 20% der OCR-Verarbeitungen verwenden Fallback-Backends. Aktuelle Rate: {{ $value | humanizePercentage }}"
          runbook_url: "https://wiki.ablage-system.local/runbooks/ocr-high-fallback"

      # TODO: Folgende Alerts erfordern neue Metriken (ocr_backend_healthy, ocr_backend_vram_available_gb)
      # Diese werden aktiviert, sobald die Metriken in app/core/telemetry.py implementiert sind:
      # - OCRBackendUnhealthy
      # - AllGPUBackendsUnhealthy
      # - NoOCRBackendAvailable
      # - OCRCPUFallbackPersistent
      # - DeepSeekVRAMCritical
      # - OCRHealthCheckFailures

      # ===================================================================
      # GPU THERMAL ALERTS (P2 Addition)
      # ===================================================================

      # Warnung: GPU Temperatur hoch (>75°C)
      - alert: GPUTemperatureHigh
        expr: DCGM_FI_DEV_GPU_TEMP > 75
        for: 5m
        labels:
          severity: warning
          component: gpu
        annotations:
          summary: "GPU Temperatur hoch (>75°C)"
          description: "GPU Temperatur bei {{ $value }}°C. Kuehlung pruefen."
          runbook_url: "https://wiki.ablage-system.local/runbooks/gpu-temperature-high"

      # Kritisch: GPU Thermal Throttling aktiv (>80°C)
      - alert: GPUThermalThrottling
        expr: DCGM_FI_DEV_GPU_TEMP > 80
        for: 2m
        labels:
          severity: critical
          component: gpu
        annotations:
          summary: "KRITISCH: GPU Thermal Throttling (>80°C)"
          description: "GPU bei {{ $value }}°C - Thermal Throttling aktiv. Performance reduziert. Kuehlung sofort pruefen!"
          runbook_url: "https://wiki.ablage-system.local/runbooks/gpu-thermal-throttling"

      # Kritisch: GPU Temperatur kritisch (>85°C)
      - alert: GPUTemperatureCritical
        expr: DCGM_FI_DEV_GPU_TEMP > 85
        for: 1m
        labels:
          severity: critical
          component: gpu
        annotations:
          summary: "KRITISCH: GPU Temperatur gefaehrlich hoch (>85°C)"
          description: "GPU bei {{ $value }}°C - Ueberhitzungsgefahr! Workload reduzieren oder System herunterfahren."
          runbook_url: "https://wiki.ablage-system.local/runbooks/gpu-temperature-critical"

      # Info: GPU Power Limit erreicht
      - alert: GPUPowerLimitReached
        expr: DCGM_FI_DEV_POWER_USAGE / DCGM_FI_DEV_POWER_LIMIT > 0.95
        for: 5m
        labels:
          severity: info
          component: gpu
        annotations:
          summary: "GPU Power Limit erreicht"
          description: "GPU Power bei {{ $value | humanizePercentage }} des Limits. Performance moeglicherweise begrenzt."
          runbook_url: "https://wiki.ablage-system.local/runbooks/gpu-power-limit"
