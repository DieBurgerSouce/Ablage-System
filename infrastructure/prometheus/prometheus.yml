# Prometheus Configuration for Ablage-System OCR
# GPU-beschleunigte Dokumentenverarbeitung

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ablage-system'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Rule files
rule_files:
  - "rules/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Ablage-System Backend API
  # Verwendet /internal Endpoint der ohne User-Auth funktioniert
  # Bei gesetztem METRICS_SCRAPE_TOKEN: bearer_token hinzufuegen
  - job_name: 'ablage-backend'
    metrics_path: '/api/v1/metrics/internal'
    static_configs:
      - targets: ['backend:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ablage-api'

  # Celery Worker Metrics
  - job_name: 'ablage-worker'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['worker:8001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ablage-worker'

  # PostgreSQL Metrics (via postgres_exporter)
  # ENTERPRISE FIX: Container-Name statt Service-Name fuer DNS-Aufloesung
  - job_name: 'postgres'
    static_configs:
      - targets: ['ablage-postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgres'

  # Redis Metrics (via redis_exporter)
  # ENTERPRISE FIX: Container-Name statt Service-Name fuer DNS-Aufloesung
  - job_name: 'redis'
    static_configs:
      - targets: ['ablage-redis-exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'redis'

  # MinIO Metrics
  # ENTERPRISE FIX: MinIO 2023+ erfordert MINIO_PROMETHEUS_AUTH_TYPE=public
  # Aktiviert: Env-Variable in docker-compose.yml gesetzt
  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs:
      - targets: ['minio:9000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'minio'

  # Node Exporter (Docker Container)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'host'

  # NVIDIA GPU Metrics (via dcgm-exporter Container)
  # ENTERPRISE FIX: dcgm-exporter erfordert --profile gpu
  # Aktiviere mit: docker-compose --profile gpu up -d
  - job_name: 'nvidia-gpu'
    static_configs:
      - targets: ['dcgm-exporter:9400']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'rtx4080'

  # Ablage-System Backup Metrics (separate registry)
  # Verwendet /internal/backup Endpoint mit Token-Auth (kein Superuser noetig)
  # Bei gesetztem METRICS_SCRAPE_TOKEN: bearer_token hinzufuegen
  - job_name: 'ablage-backup'
    metrics_path: '/api/v1/metrics/internal/backup'
    scrape_interval: 60s
    static_configs:
      - targets: ['backend:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ablage-backup'

  # Qdrant Vector Database Metrics
  # ENTERPRISE FIX: Qdrant /metrics Endpoint erfordert API-Key Header
  # API-Key wird via bearer_token_file injiziert (mounted in docker-compose.yml)
  # Fallback: Wenn kein API-Key gesetzt, funktioniert /metrics ohne Auth
  - job_name: 'qdrant'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['qdrant:6333']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'qdrant-vector-db'

  # A/B Testing Metrics (Vector Search)
  # Verwendet /internal/ab-testing Endpoint mit Token-Auth (kein Superuser noetig)
  # Bei gesetztem METRICS_SCRAPE_TOKEN: bearer_token hinzufuegen
  - job_name: 'ab-testing'
    metrics_path: '/api/v1/metrics/internal/ab-testing'
    scrape_interval: 30s
    static_configs:
      - targets: ['backend:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'vector-ab-testing'

  # Loki Log Aggregation Metrics
  # Wichtig fuer Retention-Monitoring und Disk-Usage-Alerts
  - job_name: 'loki'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['loki:3100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'loki-logs'
