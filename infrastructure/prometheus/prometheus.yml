# Prometheus Configuration for Ablage-System OCR
# GPU-beschleunigte Dokumentenverarbeitung

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ablage-system'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Rule files
rule_files:
  - "rules/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Ablage-System Backend API
  - job_name: 'ablage-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ablage-api'

  # Celery Worker Metrics
  - job_name: 'ablage-worker'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['worker:8001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ablage-worker'

  # PostgreSQL Metrics (via postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgres'

  # Redis Metrics (via redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'redis'

  # MinIO Metrics
  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs:
      - targets: ['minio:9000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'minio'

  # Node Exporter (Docker Container)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'host'

  # NVIDIA GPU Metrics (via dcgm-exporter Container)
  - job_name: 'nvidia-gpu'
    static_configs:
      - targets: ['dcgm-exporter:9400']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'rtx4080'

  # Ablage-System Backup Metrics (separate registry)
  - job_name: 'ablage-backup'
    metrics_path: '/api/v1/metrics/backup'
    scrape_interval: 60s
    static_configs:
      - targets: ['backend:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ablage-backup'

  # Qdrant Vector Database Metrics
  - job_name: 'qdrant'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['qdrant:6333']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'qdrant-vector-db'

  # A/B Testing Metrics (Vector Search)
  - job_name: 'ab-testing'
    metrics_path: '/api/v1/metrics/ab-testing'
    scrape_interval: 30s
    static_configs:
      - targets: ['backend:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'vector-ab-testing'
