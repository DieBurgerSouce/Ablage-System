# =============================================================================
# HAProxy Configuration for Ablage-System Cluster
# =============================================================================
# Load Balancer fuer hochverfuegbares Deployment
# Unterstuetzt: API Server, PostgreSQL (Read/Write Split), MinIO
# =============================================================================

# =============================================================================
# Global Settings
# =============================================================================
global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # Security: Disable SSLv3, TLSv1.0, TLSv1.1
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets
    ssl-default-server-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-server-options ssl-min-ver TLSv1.2 no-tls-tickets

    # Tune for performance
    maxconn 50000
    tune.ssl.default-dh-param 2048

# =============================================================================
# Default Settings
# =============================================================================
defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close

    timeout connect 5000
    timeout client  50000
    timeout server  50000
    timeout http-keep-alive 10s
    timeout http-request 10s
    timeout queue 30s

    # Retries bei Backend-Fehler
    retries 3
    option redispatch

    # Error Files
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# =============================================================================
# Frontend: HTTPS (Port 443)
# =============================================================================
frontend https_front
    bind *:443 ssl crt /etc/haproxy/certs/ablage.pem alpn h2,http/1.1

    # Security Headers
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    http-response set-header X-Frame-Options "SAMEORIGIN"
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header X-XSS-Protection "1; mode=block"
    http-response set-header Referrer-Policy "strict-origin-when-cross-origin"

    # Forward Proto Header
    http-request add-header X-Forwarded-Proto https
    http-request set-header X-Real-IP %[src]

    # Rate Limiting (basierend auf Source IP)
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 100 }

    # ACLs fuer Routing
    acl is_api path_beg /api
    acl is_minio path_beg /minio
    acl is_grafana path_beg /grafana
    acl is_health path /health
    acl is_websocket hdr(Upgrade) -i websocket

    # Backend-Routing
    use_backend api_servers if is_api
    use_backend api_servers if is_websocket
    use_backend minio_servers if is_minio
    use_backend grafana_servers if is_grafana

    # Default: Frontend
    default_backend frontend_servers

# =============================================================================
# Frontend: HTTP (Port 80) - Redirect zu HTTPS
# =============================================================================
frontend http_front
    bind *:80

    # ACME Challenge fuer Let's Encrypt
    acl is_acme path_beg /.well-known/acme-challenge/
    use_backend acme_servers if is_acme

    # Alles andere zu HTTPS umleiten
    http-request redirect scheme https code 301 unless is_acme

# =============================================================================
# Backend: API Server (FastAPI)
# =============================================================================
backend api_servers
    mode http
    balance roundrobin
    option httpchk GET /api/v1/health
    http-check expect status 200

    # Cookie-basierte Session Persistence (optional)
    # cookie SERVERID insert indirect nocache

    # Health Check Intervall
    default-server inter 5s fall 3 rise 2

    # API Server
    server node1-api 192.168.1.10:8000 check weight 100
    server node2-api 192.168.1.11:8000 check weight 100
    # server node3-api 192.168.1.12:8000 check weight 50  # Falls API auf GPU-Node

# =============================================================================
# Backend: Frontend Server (Nginx)
# =============================================================================
backend frontend_servers
    mode http
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200

    default-server inter 10s fall 3 rise 2

    server node1-frontend 192.168.1.10:80 check weight 100
    server node2-frontend 192.168.1.11:80 check weight 100

# =============================================================================
# Backend: MinIO Object Storage
# =============================================================================
backend minio_servers
    mode http
    balance roundrobin
    option httpchk GET /minio/health/live
    http-check expect status 200

    # MinIO Server (kann auf mehreren Nodes sein fuer Distributed Mode)
    server node3-minio 192.168.1.12:9000 check

# =============================================================================
# Backend: Grafana
# =============================================================================
backend grafana_servers
    mode http
    balance roundrobin
    option httpchk GET /api/health
    http-check expect status 200

    # URL Rewrite fuer /grafana Prefix
    http-request set-path %[path,regsub(^/grafana,/)]

    server node1-grafana 192.168.1.10:3002 check

# =============================================================================
# Backend: ACME Challenge (Let's Encrypt)
# =============================================================================
backend acme_servers
    mode http
    server acme-local 127.0.0.1:8888

# =============================================================================
# Frontend: PostgreSQL (TCP Mode)
# =============================================================================
frontend postgres_front
    bind *:5432
    mode tcp
    option tcplog

    # ACL fuer Read/Write Routing (basierend auf SQL)
    # Erfordert pgbouncer oder Anwendungslogik

    default_backend postgres_primary

# =============================================================================
# Backend: PostgreSQL Primary (Write)
# =============================================================================
backend postgres_primary
    mode tcp
    option tcp-check

    # TCP Health Check mit pg_isready
    tcp-check connect
    tcp-check send QUIT\r\n

    # Nur der aktuelle Primary (via Patroni REST API ermittelt)
    # In Produktion: Patroni-Konsul oder etcd fuer dynamische Konfiguration
    server pg-primary 192.168.1.10:5432 check port 8008

# =============================================================================
# Backend: PostgreSQL Replica (Read-Only)
# =============================================================================
backend postgres_replicas
    mode tcp
    balance roundrobin
    option tcp-check

    # Alle Replicas fuer Read-Queries
    server pg-replica1 192.168.1.11:5432 check port 8008

# =============================================================================
# Stats Page
# =============================================================================
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node
    stats admin if TRUE

    # Authentifizierung
    acl is_localhost src 127.0.0.1
    acl is_internal src 192.168.0.0/16 10.0.0.0/8
    http-request auth unless is_localhost or is_internal

# =============================================================================
# Prometheus Metrics Endpoint
# =============================================================================
frontend prometheus
    bind *:8405
    mode http
    http-request use-service prometheus-exporter if { path /metrics }
    no log

