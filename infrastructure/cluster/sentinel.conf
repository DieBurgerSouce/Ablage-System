# =============================================================================
# Redis Sentinel Configuration
# =============================================================================
# Ablage-System Cluster Deployment
# High Availability for Redis with automatic failover
# =============================================================================

# Sentinel Port
port 26379

# Bind to all interfaces
bind 0.0.0.0

# Daemon mode (set to no for Docker)
daemonize no

# =============================================================================
# Master Monitoring
# =============================================================================

# Monitor the Redis master
# sentinel monitor <master-name> <ip> <port> <quorum>
# Quorum: Anzahl der Sentinels die zustimmen muessen bevor Failover
sentinel monitor ablage-redis node1 6379 2

# Master-Passwort (AUTH)
sentinel auth-pass ablage-redis REDIS_PASSWORD_PLACEHOLDER

# =============================================================================
# Failover Configuration
# =============================================================================

# Zeit in Millisekunden nach der ein Master als ausgefallen gilt
# wenn keine Antwort auf PING kommt
sentinel down-after-milliseconds ablage-redis 5000

# Maximale Zeit fuer Failover-Prozess
sentinel failover-timeout ablage-redis 60000

# Anzahl der Replicas die gleichzeitig rekonfiguriert werden
# Bei 1: Nacheinander (sicherer, langsamer)
sentinel parallel-syncs ablage-redis 1

# =============================================================================
# Notification Script (Optional)
# =============================================================================

# Script das bei Warning-Events ausgefuehrt wird
# sentinel notification-script ablage-redis /etc/redis/sentinel-notify.sh

# Script das bei Failover ausgefuehrt wird
# sentinel client-reconfig-script ablage-redis /etc/redis/sentinel-reconfig.sh

# =============================================================================
# Security
# =============================================================================

# Sentinel-Passwort (fuer Sentinel-zu-Sentinel Kommunikation)
# requirepass SENTINEL_PASSWORD_PLACEHOLDER

# ACL fuer erweiterte Zugriffskontrolle (Redis 6+)
# aclfile /etc/redis/sentinel-users.acl

# =============================================================================
# Logging
# =============================================================================

# Log-Level: debug, verbose, notice, warning
loglevel notice

# Log-Datei (leer fuer stdout, gut fuer Docker)
logfile ""

# =============================================================================
# Known Replicas and Sentinels
# =============================================================================
# Diese werden automatisch durch Sentinel-Discovery gefuellt
# Manuelle Konfiguration nur bei Bedarf:

# sentinel known-replica ablage-redis node2 6379
# sentinel known-replica ablage-redis node3 6379
# sentinel known-sentinel ablage-redis node2 26379 <sentinel-id>
# sentinel known-sentinel ablage-redis node3 26379 <sentinel-id>

# =============================================================================
# Advanced Settings
# =============================================================================

# Announce IP (wichtig fuer NAT/Docker)
# sentinel announce-ip <ip>
# sentinel announce-port <port>

# Deny Scripts (Sicherheit)
sentinel deny-scripts-reconfig yes

# Resolve Hostnames (fuer Docker Networking)
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

# =============================================================================
# Replica Priority
# =============================================================================
# Niedrigere Werte = hoehere Prioritaet fuer Master-Wahl
# 0 = Niemals zum Master machen
# Standard ist 100

# Diese werden in der redis.conf der jeweiligen Instanzen gesetzt:
# replica-priority 100  # node1 (aktueller Master)
# replica-priority 100  # node2 (Replica, kann Master werden)
# replica-priority 0    # node3 (Replica, soll nie Master werden - z.B. GPU-Node)
